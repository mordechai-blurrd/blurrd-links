      <div class="home-stat-chip ripple" onclick="navigate('tasks')">
        <span class="ms" style="color:var(--c-primary)">task_alt</span>
        <div><div class="home-stat-chip-count">${allMyTasks.length}</div><div class="home-stat-chip-label">Total</div></div>
      </div>
    </div>

    <!-- Focus Tasks -->
    ${focusList.length > 0 ? `
    <div class="home-section">
      <div class="home-section-header">
        <div class="home-section-title"><span class="ms" style="color:var(--c-error)">bolt</span> Focus Now</div>
        <div class="home-section-link" onclick="navigate('mytasks')">See all →</div>
      </div>
      ${focusList.map(homeTaskCard).join('')}
    </div>` : `
    <div class="home-section">
      <div style="text-align:center;padding:32px 16px;background:var(--c-surf1);border-radius:var(--r-2xl);border:1px solid var(--c-outline-var)">
        <div style="font-size:48px;margin-bottom:8px">⛳</div>
        <div style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:6px">Hole in one!</div>
        <div style="color:var(--c-on-surf-var);font-size:14px">Nothing urgent. Enjoy the fairway.</div>
      </div>
    </div>`}

    <!-- Recent Messages -->
    ${recentMsgs.length > 0 ? `
    <div class="home-section">
      <div class="home-section-header">
        <div class="home-section-title"><span class="ms">chat</span> Recent Activity</div>
        <div class="home-section-link" onclick="navigate('messages')">Open chat →</div>
      </div>
      ${recentMsgs.map(m => {
        const u = getUser(m.userId);
        const ch = getChannel(m.channelId);
        return `
        <div class="home-recent-msg ripple" onclick="navigate('messages');S.selectedChannelId='${m.channelId}';render()">
          ${u ? `<div class="avatar sm" style="background:${u.color||userColor(u.name)};flex-shrink:0">${escHtml(u.initials||initials(u.name))}</div>` : ''}
          <div class="home-msg-content">
            <div class="home-msg-sender">${escHtml(u?.name||'?')} <span style="font-weight:400;color:var(--c-on-surf-var)">in #${escHtml(ch?.name||'?')}</span></div>
            <div class="home-msg-text">${escHtml(m.content.slice(0,80))}</div>
          </div>
          <div class="home-msg-time">${timeAgo(m.timestamp)}</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Quick Actions -->
    <div class="home-quick-actions">
      <div class="home-quick-action ripple" onclick="openNewTaskModal()">
        <span class="ms">add_task</span> New Task
      </div>
      <div class="home-quick-action secondary ripple" onclick="navigate('kanban')">
        <span class="ms">view_kanban</span> Board
      </div>
      <div class="home-quick-action secondary ripple" onclick="navigate('messages')">
        <span class="ms">forum</span> Chat
      </div>
    </div>

    <!-- bottom padding -->
    <div style="height:24px"></div>
  </div>`;
}

function focusOmnibox() {
  document.getElementById('home-omnibox')?.classList.add('focused');
  document.getElementById('home-search-input')?.focus();
}

function clearSearch() {
  S.searchQuery = '';
  document.getElementById('home-search-input') && (document.getElementById('home-search-input').value = '');
  renderOmniboxResults('');
  renderPageContent();
}

function renderOmniboxResults(q) {
  const container = document.getElementById('omnibox-results-dropdown');
  if (!container) return;
  if (!q || q.length < 2) { container.innerHTML = ''; return; }

  const ql = q.toLowerCase();
  const tasks = S.tasks.filter(t =>
    t.title.toLowerCase().includes(ql) || t.description?.toLowerCase().includes(ql)
  ).slice(0,5);
  const msgs = S.messages.filter(m => m.content.toLowerCase().includes(ql)).slice(0,3);

  if (!tasks.length && !msgs.length) {
    container.innerHTML = `<div class="omnibox-results"><div style="padding:20px;text-align:center;color:var(--c-on-surf-var);font-size:14px">No results for "${escHtml(q)}"</div></div>`;
    return;
  }

  let html = '<div class="omnibox-results">';
  if (tasks.length) {
    html += `<div class="omnibox-result-section"><div class="omnibox-result-label">Tasks</div>`;
    html += tasks.map(t => `
      <div class="omnibox-result-item ripple" onclick="openTaskModal('${t.id}');clearSearch()">
        <span class="ms" style="color:${{todo:'#78909C',in_progress:'#FF9800',blocked:'#BA1A1A',review:'#0057B8',done:'#4CAF50'}[t.status]}">${STATUS_ICONS[t.status]}</span>
        <div><div style="font-size:14px;font-weight:500">${escHtml(t.title)}</div><div style="font-size:12px;color:var(--c-on-surf-var)">${STATUS_LABELS[t.status]} · ${PRIORITY_LABELS[t.priority]}</div></div>
      </div>`).join('');
    html += '</div>';
  }
  if (msgs.length) {
    html += `<div class="omnibox-result-section"><div class="omnibox-result-label">Messages</div>`;
    html += msgs.map(m => {
      const u = getUser(m.userId);
      const ch = getChannel(m.channelId);
      return `
      <div class="omnibox-result-item ripple" onclick="navigate('messages');S.selectedChannelId='${m.channelId}';render();clearSearch()">
        <span class="ms">forum</span>
        <div><div style="font-size:14px;font-weight:500">${escHtml(m.content.slice(0,60))}</div><div style="font-size:12px;color:var(--c-on-surf-var)">${escHtml(u?.name||'?')} · #${escHtml(ch?.name||'?')}</div></div>
      </div>`;
    }).join('');
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function hideOmniboxResults() {
  const el = document.getElementById('omnibox-results-dropdown');
  if (el) el.innerHTML = '';
}

function openNewTaskModal() {
  if (!canEdit()) return;
  S.modal = { type: 'task', taskId: null };
  render();
}

// ═══════════════════════════
// MY TASKS PAGE
// ═══════════════════════════
function renderMyTasksPage() {
  const uid = S.currentUser?.id;
  const myTasks = S.tasks.filter(t => t.assignees?.includes(uid) && t.status !== 'done');

  const today = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];

  const overdue = myTasks.filter(t => t.dueDate && t.dueDate < today);
  const dueToday = myTasks.filter(t => t.dueDate === today);
  const dueTomorrow = myTasks.filter(t => t.dueDate === tomorrow);
  const upcoming = myTasks.filter(t => t.dueDate && t.dueDate > tomorrow);
  const noDate = myTasks.filter(t => !t.dueDate);

  const totalMine = S.tasks.filter(t => t.assignees?.includes(uid)).length;
  const doneMine = S.tasks.filter(t => t.assignees?.includes(uid) && t.status === 'done').length;
  const pct = totalMine > 0 ? Math.round((doneMine / totalMine) * 100) : 0;

  function group(label, tasks, cls = '', icon = 'schedule') {
    if (!tasks.length) return '';
    return `
    <div class="mytasks-group">
      <div class="mytasks-group-label ${cls}">
        <span class="ms">${icon}</span> ${label}
        <span style="background:var(--c-surf2);border-radius:var(--r-full);padding:1px 8px;font-size:11px">${tasks.length}</span>
      </div>
      ${tasks.map(t => renderMyTaskRow(t)).join('')}
    </div>`;
  }

  return `
  <div class="page-mytasks">
    <!-- Hero card -->
    <div class="mytasks-hero">
      <div class="mytasks-hero-golf">⛳</div>
      <div class="avatar" style="background:rgba(255,255,255,.25);color:#fff;flex-shrink:0">
        ${S.currentUser.avatar
          ? `<img src="${escHtml(S.currentUser.avatar)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
          : escHtml(S.currentUser.initials || initials(S.currentUser.name))}
      </div>
      <div>
        <h2>${escHtml(S.currentUser.name.split(' ')[0])}'s Tasks</h2>
        <p>${myTasks.length} open · ${doneMine}/${totalMine} complete (${pct}%)</p>
      </div>
    </div>

    ${overdue.length + dueToday.length + dueTomorrow.length + upcoming.length + noDate.length === 0 ? `
      <div class="mytasks-empty">
        <span class="ms">golf_course</span>
        <div class="headline-sm" style="margin-bottom:8px">Hole in one! 🏆</div>
        <div class="body-md" style="color:var(--c-on-surf-var)">No open tasks assigned to you right now.</div>
      </div>
    ` : `
      ${group('Overdue', overdue, 'overdue', 'warning')}
      ${group('Due Today', dueToday, 'today', 'today')}
      ${group('Due Tomorrow', dueTomorrow, '', 'event')}
      ${group('Upcoming', upcoming, 'upcoming', 'calendar_month')}
      ${group('No Due Date', noDate, '', 'radio_button_unchecked')}
    `}
  </div>`;
}

function renderMyTaskRow(t) {
  const overdue = isOverdue(t.dueDate) && t.status !== 'done';
  const today = isDueToday(t.dueDate);
  return `
  <div class="task-card ripple" onclick="openTaskModal('${t.id}')" style="margin-bottom:8px">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <span class="priority-dot ${getPriorityClass(t.priority)}" style="margin-top:6px;flex-shrink:0"></span>
      <div style="flex:1;min-width:0">
        <div class="task-title">${escHtml(t.title)}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap">
          <span class="badge ${getStatusColor(t.status)}">${STATUS_LABELS[t.status]}</span>
          ${t.dueDate ? `<span class="task-due${overdue?' overdue':today?' warn':''}" style="display:flex;align-items:center;gap:3px;font-size:12px">
            <span class="ms" style="font-size:14px">schedule</span>${overdue ? 'Overdue' : today ? 'Today' : formatDateShort(t.dueDate)}
          </span>` : ''}
        </div>
      </div>
      <span class="ms sm" style="color:var(--c-on-surf-var)">chevron_right</span>
    </div>
  </div>`;
}

// ═══════════════════════════
// ACCOUNTABILITY PAGE
// ═══════════════════════════
function renderAccountabilityPage() {
  const today = new Date().toISOString().split('T')[0];

  const userData = S.users.map(u => {
    const allTasks = S.tasks.filter(t => t.assignees?.includes(u.id));
    const done = allTasks.filter(t => t.status === 'done');
    const open = allTasks.filter(t => t.status !== 'done');
    const overdueItems = open.filter(t => t.dueDate && t.dueDate < today);
    const pct = allTasks.length > 0 ? Math.round((done.length / allTasks.length) * 100) : 0;
    return { u, allTasks, done, open, overdueItems, pct };
  }).sort((a, b) => b.pct - a.pct || b.done.length - a.done.length);

  const maxPct = Math.max(...userData.map(d => d.pct), 1);

  return `
  <div class="page-accountability">
    <div class="accountability-leaderboard">
      <h3><span class="ms">leaderboard</span> Completion Leaderboard</h3>
      ${userData.map((d, i) => `
        <div class="leaderboard-row">
          <div class="leaderboard-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
          ${renderAvatar(d.u.id, 'sm')}
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;margin-bottom:3px">${escHtml(d.u.name)}</div>
            <div class="leaderboard-bar">
              <div class="leaderboard-bar-fill" style="width:${d.pct}%"></div>
            </div>
          </div>
          <div class="leaderboard-pct" style="color:${d.pct>=80?'#1A5C2A':d.pct>=50?'var(--c-primary)':'var(--c-on-surf-var)'}">${d.pct}%</div>
        </div>
      `).join('')}
    </div>

    <div class="accountability-grid">
      ${userData.map(d => `
        <div class="accountability-card">
          <div class="accountability-card-header">
            ${renderAvatar(d.u.id)}
            <div>
              <div class="accountability-card-name">${escHtml(d.u.name)}</div>
              <div class="accountability-card-role">${escHtml(d.u.role)}</div>
            </div>
          </div>

          <div class="accountability-stats">
            <div class="accountability-stat">
              <div class="accountability-stat-num">${d.allTasks.length}</div>
              <div class="accountability-stat-label">Total</div>
            </div>
            <div class="accountability-stat">
              <div class="accountability-stat-num success">${d.done.length}</div>
              <div class="accountability-stat-label">Done</div>
            </div>
            <div class="accountability-stat">
              <div class="accountability-stat-num${d.overdueItems.length>0?' error':''}">${d.overdueItems.length}</div>
              <div class="accountability-stat-label">Overdue</div>
            </div>
          </div>

          <div class="accountability-bar-wrap">
            <div class="accountability-bar-label">
              <span>Completion</span>
              <span style="font-weight:600;color:${d.pct>=80?'#1A5C2A':d.pct>=50?'var(--c-primary)':'var(--c-error)'}">${d.pct}%</span>
            </div>
            <div class="accountability-bar-track">
              <div class="accountability-bar-fill" style="width:${d.pct}%;background:${d.pct>=80?'#22C55E':d.pct>=50?'var(--c-primary)':'var(--c-error)'}"></div>
            </div>
          </div>

          ${d.open.length > 0 ? `
            <div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--c-on-surf-var);margin-bottom:6px">Open Tasks</div>
            <div class="accountability-tasks-list">
              ${d.open.slice(0,5).map(t => {
                const od = t.dueDate && t.dueDate < today;
                return `<div class="accountability-task-item" onclick="openTaskModal('${t.id}')">
                  <span class="ms">radio_button_unchecked</span>
                  <span class="accountability-task-title" title="${escHtml(t.title)}">${escHtml(t.title)}</span>
                  ${t.dueDate ? `<span class="accountability-task-due${od?' overdue':''}">${od ? 'Late' : formatDateShort(t.dueDate)}</span>` : ''}
                </div>`;
              }).join('')}
              ${d.open.length > 5 ? `<div style="font-size:12px;color:var(--c-on-surf-var);padding:4px 8px">+${d.open.length - 5} more…</div>` : ''}
            </div>
          ` : `
            <div style="text-align:center;padding:12px;color:var(--c-on-surf-var);font-size:13px">
              <span class="ms" style="font-size:24px;display:block;opacity:.4;margin-bottom:4px">golf_course</span>
              All clear! ⛳
            </div>
          `}
        </div>
      `).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════
// CHANGELOG PAGE
// ═══════════════════════════
function renderChangelogPage() {
  function typeIcon(type) {
    return { new: 'add_circle', improved: 'arrow_upward', fixed: 'build' }[type] || 'circle';
  }
  function typeBadge(type) {
    const labels = { new: 'New', improved: 'Improved', fixed: 'Fixed' };
    return `<span class="changelog-tag ${type}">${labels[type] || type}</span>`;
  }
  const types = entry => [...new Set(entry.items.map(i => i.type))];

  return `
  <div class="page-changelog">
    <div style="margin-bottom:28px">
      <div class="headline-md" style="margin-bottom:4px">Changelog</div>
      <div class="body-md" style="color:var(--c-on-surf-var)">Every update, improvement, and fix — in one place. ⛳</div>
    </div>
    <div class="changelog-timeline">
      ${CHANGELOG.map(entry => `
        <div class="changelog-entry">
          <div class="changelog-dot${entry.latest?' latest':''}"></div>
          <div class="card elevated" style="padding:20px 22px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
              <div class="changelog-version">v${entry.version}</div>
              ${entry.latest ? `<span class="badge success" style="font-size:11px">Latest</span>` : ''}
            </div>
            <div class="changelog-date">${entry.date}</div>
            <div class="changelog-tags">${types(entry).map(typeBadge).join('')}</div>
            <div class="changelog-items">
              ${entry.items.map(item => `
                <div class="changelog-item ${item.type}">
                  <span class="ms">${typeIcon(item.type)}</span>
                  <span>${escHtml(item.text)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════
// WHAT'S NEW MODAL
// ═══════════════════════════
function showWhatsNew() {
  const container = document.createElement('div');
  container.id = 'whats-new-overlay';
  container.className = 'whats-new-overlay';
  container.innerHTML = renderWhatsNewModal();
  document.body.appendChild(container);
}

function closeWhatsNew() {
  const el = document.getElementById('whats-new-overlay');
  if (el) el.remove();
  localStorage.setItem('blurrd_seen_version', APP_VERSION);
}

function renderWhatsNewModal() {
  const latest = CHANGELOG[0];
  const newItems = latest.items.filter(i => i.type === 'new').slice(0, 5);
  function featureIcon(text) {
    if (text.toLowerCase().includes('task')) return 'task_alt';
    if (text.toLowerCase().includes('message')) return 'forum';
    if (text.toLowerCase().includes('memory') || text.toLowerCase().includes('data')) return 'save';
    if (text.toLowerCase().includes('profile') || text.toLowerCase().includes('avatar')) return 'person';
    if (text.toLowerCase().includes('password')) return 'lock';
    if (text.toLowerCase().includes('golf') || text.toLowerCase().includes('animation')) return 'sports_golf';
    if (text.toLowerCase().includes('changelog')) return 'history';
    if (text.toLowerCase().includes('accountability')) return 'leaderboard';
    return 'new_releases';
  }
  return `
  <div class="whats-new-card" onclick="event.stopPropagation()">
    <div class="whats-new-header">
      <div class="whats-new-golf-bg">⛳</div>
      <div class="whats-new-badge"><span class="ms sm">new_releases</span> Version ${latest.version}</div>
      <h2>What's New in BLURRD Links</h2>
      <p>${latest.date} — here's what landed in this update</p>
    </div>
    <div class="whats-new-body">
      <div class="whats-new-features">
        ${newItems.map(item => `
          <div class="whats-new-feature">
            <div class="whats-new-feature-icon"><span class="ms">${featureIcon(item.text)}</span></div>
            <div>
              <div class="whats-new-feature-title">${escHtml(item.text.split(' — ')[0] || item.text.slice(0,40))}</div>
              <div class="whats-new-feature-desc">${escHtml(item.text)}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="whats-new-footer">
        <button class="btn btn-text btn-sm ripple" onclick="closeWhatsNew();navigate('changelog')">See full changelog</button>
        <button class="btn btn-filled btn-sm ripple" onclick="closeWhatsNew()">Let's go! ⛳</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════
// GOLF ANIMATIONS & EFFECTS
// ═══════════════════════════
const GOLF_ACHIEVEMENTS = [
  { icon: '⛳', title: 'Hole in One!', text: 'Task completed — straight in the cup!' },
  { icon: '🏌️', title: 'Birdie!', text: 'Under par — one task down!' },
  { icon: '🦅', title: 'Eagle!', text: 'Outstanding! Task crushed.' },
  { icon: '🏆', title: 'Ace!', text: 'Perfect shot — task done!' },
  { icon: '🎯', title: 'On the Green!', text: 'Task marked complete!' },
];

function golfCelebrate(type = 'task') {
  if (type === 'task') {
    const ach = GOLF_ACHIEVEMENTS[Math.floor(Math.random() * GOLF_ACHIEVEMENTS.length)];
    showGolfAchievement(ach);
    spawnGolfConfetti();
  }
}

function showGolfAchievement(ach) {
  // Remove any existing
  document.querySelectorAll('.golf-achievement').forEach(el => el.remove());
  const el = document.createElement('div');
  el.className = 'golf-achievement';
  el.innerHTML = `
    <div class="golf-achievement-icon">${ach.icon}</div>
    <div>
      <div class="golf-achievement-title">${ach.title}</div>
      <div class="golf-achievement-text">${ach.text}</div>
    </div>
    <button class="icon-btn" onclick="this.parentElement.remove()" style="color:rgba(255,255,255,.7)"><span class="ms sm">close</span></button>`;
  document.body.appendChild(el);
  setTimeout(() => {
    el.classList.add('hiding');
    setTimeout(() => el.remove(), 400);
  }, 3500);
}

function spawnGolfConfetti() {
  const colors = ['#0057B8','#4CAF50','#FF9800','#E91E63','#9C27B0','#F59E0B','#fff'];
  const shapes = ['⛳','🏌️','⚪','🟢','🔵'];
  for (let i = 0; i < 28; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'golf-confetti-piece';
      const useEmoji = Math.random() > 0.7;
      if (useEmoji) {
        el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
        el.style.cssText = `left:${10 + Math.random() * 80}%;top:-20px;font-size:${14+Math.random()*12}px;background:none;width:auto;height:auto;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
      } else {
        el.style.cssText = `left:${10 + Math.random() * 80}%;top:-20px;background:${colors[Math.floor(Math.random() * colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
      }
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 50);
  }
}

// Hook into task status changes to trigger golf celebration
const _origSaveTask = typeof saveTask !== 'undefined' ? saveTask : null;

// ═══════════════════════════
// PWA + INSTALL
// ═══════════════════════════
let _deferredInstall = null;

function setupPWA() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredInstall = e;
    const btn = document.getElementById('install-btn');
    const status = document.getElementById('install-status');
    if (btn) btn.style.display = 'flex';
    if (status) status.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => {
    toast('BLURRD Links installed! ⛳');
    _deferredInstall = null;
  });
}

function triggerInstall() {
  if (!_deferredInstall) { toast('Host the app to enable installation', 'info'); return; }
  _deferredInstall.prompt();
  _deferredInstall.userChoice.then(r => {
    if (r.outcome === 'accepted') toast('Installing BLURRD Links… ⛳');
    _deferredInstall = null;
  });
}

// ═══════════════════════════
// INIT
// ═══════════════════════════
loadState();
applyTheme(S.theme);

// Watch system color scheme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (S.theme.mode === 'auto') applyTheme(S.theme);
});

render();
setupPWA();
requestNotifPermission();

// Scroll to bottom of messages on load
setTimeout(() => {
  const feed = document.getElementById('msg-feed');
  if (feed) feed.scrollTop = feed.scrollHeight;
}, 100);

// Close notification panel on outside click
document.addEventListener('click', e => {
  if (S.notifPanelOpen && !e.target.closest('#notif-panel') && !e.target.closest('.icon-btn[onclick*="toggleNotifPanel"]')) {
    S.notifPanelOpen = false;
    const panel = document.getElementById('notif-panel');
    if (panel) panel.remove();
  }
  if (S.emojiTarget && !e.target.closest('#emoji-picker') && !e.target.closest('.msg-action-btn')) {
    S.emojiTarget = null;
  }
  if (S.composeEmojiChannel && !e.target.closest('#compose-emoji-picker') && !e.target.closest('.msg-input-tool')) {
    S.composeEmojiChannel = null;
    document.getElementById('compose-emoji-picker')?.remove();
  }
  if (S.snoozeTarget && !e.target.closest('.snooze-popup') && !e.target.closest('.icon-btn[onclick*="openSnooze"]')) {
    S.snoozeTarget = null;
  }
});

</script>
