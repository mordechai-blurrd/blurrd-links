.accountability-bar-fill { height: 100%; border-radius: var(--r-full); background: var(--c-primary); transition: width .6s var(--ease-out); }
.accountability-tasks-list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
.accountability-task-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  background: var(--c-surf2); border-radius: var(--r-md); cursor: pointer; transition: background var(--dur-fast);
}
.accountability-task-item:hover { background: var(--c-surf3); }
.accountability-task-item .ms { font-size: 14px; color: var(--c-on-surf-var); flex-shrink: 0; }
.accountability-task-title { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.accountability-task-due { font-size: 11px; color: var(--c-on-surf-var); flex-shrink: 0; }
.accountability-task-due.overdue { color: var(--c-error); font-weight: 600; }
.accountability-leaderboard { background: var(--c-surf1); border-radius: var(--r-2xl); padding: 20px 22px; border: 1px solid var(--c-outline-var); }
.accountability-leaderboard h3 { font-family: var(--font-display); font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.leaderboard-row {
  display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--c-outline-var);
}
.leaderboard-row:last-child { border-bottom: none; }
.leaderboard-rank { font-family: var(--font-display); font-size: 18px; font-weight: 700; width: 28px; text-align: center; color: var(--c-on-surf-var); }
.leaderboard-rank.gold { color: #F59E0B; }
.leaderboard-rank.silver { color: #9CA3AF; }
.leaderboard-rank.bronze { color: #B45309; }
.leaderboard-bar { flex: 1; height: 6px; background: var(--c-outline-var); border-radius: var(--r-full); overflow: hidden; }
.leaderboard-bar-fill { height: 100%; border-radius: var(--r-full); background: var(--c-primary); transition: width .8s var(--ease-out); }
.leaderboard-pct { font-size: 13px; font-weight: 600; width: 40px; text-align: right; }

/* ══════════════════════════════════════
   CHANGELOG PAGE
══════════════════════════════════════ */
.page-changelog { padding: 24px; max-width: 760px; margin: 0 auto; }
.changelog-timeline { position: relative; padding-left: 32px; }
.changelog-timeline::before {
  content: ''; position: absolute; left: 10px; top: 8px; bottom: 8px; width: 2px;
  background: var(--c-outline-var); border-radius: 1px;
}
.changelog-entry { position: relative; margin-bottom: 32px; }
.changelog-dot {
  position: absolute; left: -28px; top: 4px; width: 16px; height: 16px;
  border-radius: 50%; background: var(--c-primary); border: 3px solid var(--c-surface);
  box-shadow: 0 0 0 2px var(--c-primary);
}
.changelog-dot.latest { width: 20px; height: 20px; left: -30px; top: 2px; background: var(--c-primary); animation: pulse 2s ease-in-out infinite; }
.changelog-version { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.changelog-date { font-size: 12px; color: var(--c-on-surf-var); margin-bottom: 12px; }
.changelog-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.changelog-tag {
  font-size: 11px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
  padding: 2px 8px; border-radius: var(--r-full);
}
.changelog-tag.new { background: #C8F5D0; color: #1A5C2A; }
.changelog-tag.improved { background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.changelog-tag.fixed { background: var(--c-error-cont); color: var(--c-error); }
.changelog-items { display: flex; flex-direction: column; gap: 6px; }
.changelog-item { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; line-height: 1.5; }
.changelog-item .ms { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.changelog-item.new .ms { color: #1A5C2A; }
.changelog-item.improved .ms { color: var(--c-primary); }
.changelog-item.fixed .ms { color: var(--c-error); }

/* ══════════════════════════════════════
   WHAT'S NEW MODAL
══════════════════════════════════════ */
.whats-new-overlay {
  position: fixed; inset: 0; background: var(--bg-modal); z-index: 300;
  display: flex; align-items: center; justify-content: center; padding: 24px;
  animation: fadeIn var(--dur-fast) ease;
}
.whats-new-card {
  background: var(--c-surface); border-radius: var(--r-3xl); padding: 0;
  max-width: 520px; width: 100%; box-shadow: var(--el3); overflow: hidden;
  animation: slideUp var(--dur-slow) var(--ease-out);
}
.whats-new-header {
  background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-tertiary-cont) 100%);
  padding: 28px 32px 24px; color: var(--c-on-primary); position: relative; overflow: hidden;
}
.whats-new-golf-bg {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-size: 80px; opacity: .15; pointer-events: none; line-height: 1;
}
.whats-new-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,.2); border-radius: var(--r-full); padding: 4px 12px;
  font-size: 12px; font-weight: 600; margin-bottom: 12px;
}
.whats-new-header h2 { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.whats-new-header p { font-size: 14px; opacity: .85; }
.whats-new-body { padding: 24px 32px; }
.whats-new-features { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.whats-new-feature { display: flex; align-items: flex-start; gap: 14px; }
.whats-new-feature-icon {
  width: 40px; height: 40px; border-radius: var(--r-lg); background: var(--c-primary-cont);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--c-on-primary-cont);
}
.whats-new-feature-title { font-family: var(--font-ui); font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.whats-new-feature-desc { font-size: 13px; color: var(--c-on-surf-var); line-height: 1.5; }
.whats-new-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 0 32px 24px; }

/* ══════════════════════════════════════
   PROFILE / AVATAR EDITOR
══════════════════════════════════════ */
.profile-modal-body { padding: 0 4px; display: flex; flex-direction: column; gap: 16px; }
.avatar-edit-zone {
  display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px;
  background: var(--c-surf1); border-radius: var(--r-2xl); border: 2px dashed var(--c-outline-var);
  position: relative; transition: border-color var(--dur-fast);
}
.avatar-edit-zone:hover { border-color: var(--c-primary); }
.avatar-preview-lg {
  width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 28px; font-weight: 700; color: #fff; position: relative; overflow: hidden;
  box-shadow: var(--el2);
}
.avatar-preview-lg img { width: 100%; height: 100%; object-fit: cover; }
.avatar-edit-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.4); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity var(--dur-fast); cursor: pointer;
}
.avatar-edit-zone:hover .avatar-edit-overlay { opacity: 1; }
.avatar-edit-overlay .ms { color: #fff; font-size: 24px; }
.avatar-url-input { width: 100%; }
.avatar-color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
.avatar-color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent;
  transition: transform var(--dur-fast), border-color var(--dur-fast);
}
.avatar-color-swatch:hover { transform: scale(1.15); }
.avatar-color-swatch.active { border-color: var(--c-on-surface); transform: scale(1.1); }
.nav-user { cursor: pointer; position: relative; }
.nav-user-edit-hint {
  position: absolute; bottom: -2px; right: 12px; background: var(--c-primary); color: var(--c-on-primary);
  border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; opacity: 0; transition: opacity var(--dur-fast);
}
.nav-user:hover .nav-user-edit-hint { opacity: 1; }

/* ══════════════════════════════════════
   GOLF ANIMATIONS & EFFECTS
══════════════════════════════════════ */
@keyframes golfSwing {
  0% { transform: rotate(-30deg) translateY(0); }
  30% { transform: rotate(10deg) translateY(-4px); }
  60% { transform: rotate(-5deg) translateY(2px); }
  100% { transform: rotate(0deg) translateY(0); }
}
@keyframes ballArc {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  50% { transform: translate(120px, -80px) scale(.8); opacity: 1; }
  100% { transform: translate(240px, 20px) scale(.6); opacity: 0; }
}
@keyframes flagWave {
  0%, 100% { transform: skewX(0deg); }
  25% { transform: skewX(4deg); }
  75% { transform: skewX(-4deg); }
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes holeSink {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(0) translateY(20px); opacity: 0; }
}
@keyframes putt {
  0% { transform: translateX(0); }
  20% { transform: translateX(8px); }
  40% { transform: translateX(-4px); }
  60% { transform: translateX(6px); }
  80% { transform: translateX(-2px); }
  100% { transform: translateX(0); }
}
.golf-confetti-piece {
  position: fixed; width: 10px; height: 10px; border-radius: 2px;
  animation: confettiFall linear forwards; pointer-events: none; z-index: 9999;
}
.golf-achievement {
  position: fixed; top: 80px; right: 24px; z-index: 500;
  background: linear-gradient(135deg, var(--c-primary), var(--c-tertiary-cont));
  color: var(--c-on-primary); border-radius: var(--r-2xl); padding: 16px 20px;
  box-shadow: var(--el3); display: flex; align-items: center; gap: 12px; min-width: 280px;
  animation: slideInRight var(--dur-med) var(--ease-out);
  font-family: var(--font-ui);
}
.golf-achievement.hiding { animation: slideInRight var(--dur-med) var(--ease-in) reverse forwards; }
.golf-achievement-icon { font-size: 32px; flex-shrink: 0; }
.golf-achievement-title { font-size: 13px; font-weight: 600; opacity: .8; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.golf-achievement-text { font-size: 15px; font-weight: 500; }

/* ══════════════════════════════════════
   DATA MANAGEMENT (ADMIN)
══════════════════════════════════════ */
.data-mgmt-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

/* ══════════════════════════════════════
   HOME / FOCUS DASHBOARD PAGE
══════════════════════════════════════ */
.page-home { padding: 0; display: flex; flex-direction: column; gap: 0; overflow-x: hidden; }
.home-omnibox-wrap {
  padding: 16px 24px 12px;
  position: sticky; top: 0; z-index: 10;
  background: var(--c-surface);
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.home-omnibox-wrap.scrolled { border-color: var(--c-outline-var); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.home-omnibox {
  display: flex; align-items: center; gap: 12px;
  background: var(--c-surf2); border-radius: var(--r-full);
  padding: 12px 20px; cursor: pointer;
  border: 1.5px solid transparent;
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast), background var(--dur-fast);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.home-omnibox:hover { border-color: var(--c-primary); box-shadow: 0 2px 12px rgba(0,87,184,.12); }
.home-omnibox.focused { border-color: var(--c-primary); background: var(--c-surface); box-shadow: 0 4px 20px rgba(0,87,184,.16); }
.home-omnibox input {
  flex: 1; border: none; background: transparent; outline: none;
  font-size: 16px; font-family: var(--font-ui); color: var(--c-on-surface);
}
.home-omnibox input::placeholder { color: var(--c-on-surf-var); }
.home-omnibox-icon { color: var(--c-on-surf-var); font-size: 22px !important; }
.home-omnibox-avatar { flex-shrink: 0; }

.home-greeting-section { padding: 20px 24px 0; }
.home-greeting { font-family: var(--font-display); font-size: 24px; font-weight: 500; color: var(--c-on-surface); }
.home-subgreeting { font-size: 14px; color: var(--c-on-surf-var); margin-top: 4px; }

.home-stats-row {
  display: flex; gap: 12px; padding: 16px 24px 0;
  overflow-x: auto; scrollbar-width: none;
}
.home-stats-row::-webkit-scrollbar { display: none; }
.home-stat-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: var(--r-xl);
  background: var(--c-surf1); border: 1px solid var(--c-outline-var);
  cursor: pointer; transition: box-shadow var(--dur-fast), transform var(--dur-fast);
  white-space: nowrap;
}
.home-stat-chip:hover { box-shadow: var(--el1); transform: translateY(-1px); }
.home-stat-chip.urgent { background: #FFF0F0; border-color: #FFCDD2; }
.home-stat-chip.today { background: #FFF8E7; border-color: #FFE082; }
.home-stat-chip.done { background: #E8F5E9; border-color: #A5D6A7; }
.home-stat-chip .ms { font-size: 18px; }
.home-stat-chip-count { font-family: var(--font-display); font-size: 20px; font-weight: 700; line-height: 1; }
.home-stat-chip-label { font-size: 12px; color: var(--c-on-surf-var); font-weight: 500; }

.home-section { padding: 20px 24px 0; }
.home-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.home-section-title {
  font-family: var(--font-ui); font-size: 13px; font-weight: 700;
  letter-spacing: .6px; text-transform: uppercase; color: var(--c-on-surf-var);
  display: flex; align-items: center; gap: 8px;
}
.home-section-title .ms { font-size: 16px; }
.home-section-link { font-size: 13px; color: var(--c-primary); font-weight: 500; cursor: pointer; }

.home-task-card {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--c-surf1); border-radius: var(--r-xl);
  margin-bottom: 8px; cursor: pointer;
  border: 1px solid var(--c-outline-var);
  transition: box-shadow var(--dur-fast), transform var(--dur-fast);
}
.home-task-card:hover { box-shadow: var(--el1); transform: translateY(-1px); }
.home-task-card:active { transform: scale(.98); }
.home-task-card.urgent-border { border-left: 3px solid var(--c-error); }
.home-task-card.today-border { border-left: 3px solid #F59E0B; }
.home-task-card-icon { font-size: 20px !important; flex-shrink: 0; }
.home-task-card-title { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.home-task-card-meta { font-size: 11px; color: var(--c-on-surf-var); margin-top: 2px; white-space: nowrap; }
.home-task-card-chevron { font-size: 18px !important; color: var(--c-on-surf-var); flex-shrink: 0; }

.home-recent-msg {
  display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px;
  background: var(--c-surf1); border-radius: var(--r-xl); margin-bottom: 8px;
  cursor: pointer; border: 1px solid var(--c-outline-var);
  transition: box-shadow var(--dur-fast);
}
.home-recent-msg:hover { box-shadow: var(--el1); }
.home-msg-content { flex: 1; min-width: 0; }
.home-msg-sender { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.home-msg-text { font-size: 13px; color: var(--c-on-surf-var); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.home-msg-time { font-size: 11px; color: var(--c-on-surf-var); flex-shrink: 0; margin-top: 2px; }

.home-quick-actions { display: flex; gap: 10px; flex-wrap: wrap; padding: 20px 24px; }
.home-quick-action {
  display: flex; align-items: center; gap: 8px; padding: 12px 18px;
  border-radius: var(--r-xl); background: var(--c-primary-cont);
  color: var(--c-on-primary-cont); font-size: 14px; font-weight: 500;
  cursor: pointer; flex: 1; min-width: 140px; justify-content: center;
  transition: box-shadow var(--dur-fast), transform var(--dur-fast);
}
.home-quick-action:hover { box-shadow: var(--el1); transform: translateY(-1px); }
.home-quick-action .ms { font-size: 20px; }
.home-quick-action.secondary { background: var(--c-surf2); color: var(--c-on-surf-var); }

/* ══════════════════════════════════════
   OMNIBOX DROPDOWN RESULTS
══════════════════════════════════════ */
.omnibox-results {
  position: absolute; left: 24px; right: 24px; top: calc(100% + 4px); z-index: 200;
  background: var(--c-surface); border-radius: var(--r-2xl);
  box-shadow: var(--el3); border: 1px solid var(--c-outline-var);
  overflow: hidden; max-height: 480px; overflow-y: auto;
  animation: slideUp var(--dur-fast) var(--ease-out);
}
.omnibox-result-section { padding: 8px 0; }
.omnibox-result-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
  color: var(--c-on-surf-var); padding: 8px 20px 4px;
}
.omnibox-result-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer;
  transition: background var(--dur-fast);
}
.omnibox-result-item:hover, .omnibox-result-item.selected { background: var(--c-surf2); }
.omnibox-result-item .ms { font-size: 20px; color: var(--c-primary); flex-shrink: 0; }

/* ══════════════════════════════════════
   MOBILE KANBAN CAROUSEL
══════════════════════════════════════ */
.kanban-mobile-carousel {
  display: none;
  overflow-x: auto; scroll-snap-type: x mandatory;
  scrollbar-width: none; padding: 0 16px 16px;
  gap: 12px; -webkit-overflow-scrolling: touch;
}
.kanban-mobile-carousel::-webkit-scrollbar { display: none; }
.kanban-mobile-carousel .kanban-col {
  scroll-snap-align: start; flex-shrink: 0;
  width: calc(100vw - 96px); min-width: 280px; max-width: 360px;
}
.kanban-mobile-tabs {
  display: none; gap: 8px; padding: 12px 16px 0;
  overflow-x: auto; scrollbar-width: none;
}
.kanban-mobile-tabs::-webkit-scrollbar { display: none; }
.kanban-mobile-tab {
  flex-shrink: 0; padding: 6px 16px; border-radius: var(--r-full);
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: var(--c-surf2); color: var(--c-on-surf-var);
  transition: background var(--dur-fast), color var(--dur-fast);
  white-space: nowrap;
}
.kanban-mobile-tab.active { background: var(--c-primary-cont); color: var(--c-on-primary-cont); }

@media (max-width: 600px) {
  .kanban-mobile-carousel { display: flex; }
  .kanban-mobile-tabs { display: flex; }
  .kanban-board { display: none; }
  .page-home .home-omnibox-wrap { padding: 12px 16px 8px; }
  .home-greeting-section { padding: 12px 16px 0; }
  .home-section { padding: 16px 16px 0; }
  .home-stats-row { padding: 12px 16px 0; }
  .home-quick-actions { padding: 16px 16px; }
  .home-greeting { font-size: 20px; }
}

/* ══════════════════════════════════════
   INLINE EDITING
══════════════════════════════════════ */
.inline-edit-input {
  border: none; background: transparent; outline: none; width: 100%;
  font-family: inherit; font-size: inherit; font-weight: inherit;
  color: inherit; padding: 0; cursor: text;
  border-bottom: 2px solid var(--c-primary);
}
.inline-edit-input:focus { background: rgba(0,87,184,.04); border-radius: 4px 4px 0 0; padding: 2px 4px; }

/* ══════════════════════════════════════
   GOOGLE DRIVE PICKER
══════════════════════════════════════ */
.drive-picker-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: var(--r-lg);
  background: #1A73E8; color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; border: none; font-family: var(--font-ui);
  transition: background var(--dur-fast), box-shadow var(--dur-fast);
  box-shadow: 0 1px 4px rgba(26,115,232,.3);
}
.drive-picker-btn:hover { background: #1557B0; box-shadow: 0 3px 8px rgba(26,115,232,.4); }
.drive-picker-btn .ms { font-size: 18px; }

/* ══════════════════════════════════════
   TASKS PAGE — TOOLBAR & FILTER PANEL
══════════════════════════════════════ */
.tasks-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 0 0 4px; flex-wrap: wrap;
}
.tasks-toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
.tasks-toolbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.tasks-filter-btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: var(--r-lg); border: 1.5px solid var(--c-outline-var);
  background: var(--c-surface); cursor: pointer; font-size: 14px; font-weight: 500;
  font-family: var(--font-ui); color: var(--c-on-surface);
  transition: border-color var(--dur-fast), background var(--dur-fast);
}
.tasks-filter-btn:hover, .tasks-filter-btn.has-filters { border-color: var(--c-primary); background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.tasks-filter-badge {
  background: var(--c-primary); color: var(--c-on-primary);
  border-radius: var(--r-full); font-size: 11px; font-weight: 700;
  min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0 4px;
}
.tasks-filter-summary {
  font-size: 13px; color: var(--c-on-surf-var); background: var(--c-surf2);
  padding: 4px 10px; border-radius: var(--r-full); border: 1px solid var(--c-outline-var);
  max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.task-filter-panel {
  background: var(--c-surf1); border: 1px solid var(--c-outline-var);
  border-radius: var(--r-2xl); padding: 16px 20px; display: flex; flex-direction: column; gap: 14px;
  animation: slideUp var(--dur-fast) var(--ease-out);
}
.filter-panel-section { display: flex; flex-direction: column; gap: 8px; }
.filter-panel-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .6px; color: var(--c-on-surf-var);
}
.filter-panel-chips { display: flex; flex-wrap: wrap; gap: 6px; }

.tasks-stats-row {
  display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap;
}
.tasks-stats-row::-webkit-scrollbar { display: none; }
.tasks-stat-pill {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: var(--r-full); border: 1.5px solid var(--c-outline-var);
  background: var(--c-surface); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: border-color var(--dur-fast), background var(--dur-fast);
  font-size: 13px;
}
.tasks-stat-pill:hover { border-color: var(--c-primary); }
.tasks-stat-pill.active { border-color: var(--c-primary); background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.tasks-stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tasks-stat-label { font-weight: 500; }
.tasks-stat-count {
  background: var(--c-surf2); color: var(--c-on-surf-var);
  border-radius: var(--r-full); font-size: 11px; font-weight: 700;
  min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0 4px;
}

/* ══════════════════════════════════════
   KANBAN BOARD HEADER (multi-board)
══════════════════════════════════════ */
.kanban-board-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px 0; gap: 8px; flex-wrap: wrap;
}
.kanban-board-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: var(--r-full);
  border: 1.5px solid var(--c-outline-var); background: var(--c-surface);
  cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font-ui);
  transition: border-color var(--dur-fast), background var(--dur-fast), color var(--dur-fast);
  white-space: nowrap;
}
.kanban-board-tab:hover { border-color: var(--c-primary); }
.kanban-board-tab.active { border-color: var(--c-primary); background: var(--c-primary); color: var(--c-on-primary); }

@media (max-width: 600px) {
  .kanban-board-header { padding: 10px 16px 0; }
  .tasks-toolbar { flex-direction: column; align-items: flex-start; gap: 8px; }
  .tasks-toolbar-right { align-self: flex-end; }
  .task-filter-panel { padding: 12px 14px; }
}

/* ══════════════════════════════════════
   FIREBASE STATUS BAR
══════════════════════════════════════ */
.firebase-status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px; font-size: 12px; font-weight: 500;
  border-bottom: 1px solid var(--c-outline-var);
  background: var(--c-surf1); flex-shrink: 0;
}
.firebase-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  transition: background var(--dur-fast);
}
.firebase-status-dot.connected { background: #34A853; }
.firebase-status-dot.connecting { background: #FBBC04; animation: pulse 1.2s infinite; }
.firebase-status-dot.offline { background: var(--c-outline); }
.firebase-status-text { color: var(--c-on-surf-var); }
@keyframes pulse {
  0%, 100% { opacity: 1; } 50% { opacity: .3; }
}

/* ══════════════════════════════════════
   TYPING INDICATOR
══════════════════════════════════════ */
#typing-indicator {
  min-height: 24px; padding: 0 16px 4px;
  font-size: 13px; color: var(--c-on-surf-var); font-style: italic;
  display: flex; align-items: center; gap: 6px;
}
.typing-dots {
  display: inline-flex; align-items: center; gap: 3px;
}
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c-on-surf-var); display: inline-block;
  animation: typingBounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: .4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ══════════════════════════════════════
   REPLY BANNER (inline reply composer)
══════════════════════════════════════ */
.reply-banner {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px 8px 16px;
  background: var(--c-surf2); border-top: 2px solid var(--c-primary);
  flex-shrink: 0; animation: slideUp var(--dur-fast) var(--ease-out);
}
.reply-banner-content { flex: 1; min-width: 0; }
.reply-banner-label {
  font-size: 11px; font-weight: 700; color: var(--c-primary);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px;
}
.reply-banner-text {
  font-size: 13px; color: var(--c-on-surf-var);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.reply-banner-close {
  padding: 4px; cursor: pointer; border-radius: var(--r-full);
  color: var(--c-on-surf-var); transition: background var(--dur-fast);
  display: flex; align-items: center; flex-shrink: 0;
}
.reply-banner-close:hover { background: var(--c-surf3); }

/* ══════════════════════════════════════
   MESSAGE REPLY QUOTE & READ RECEIPTS
══════════════════════════════════════ */
.msg-bubble-wrap { display: flex; flex-direction: column; }
.msg-reply-quote {
  background: rgba(0,87,184,.08); border-left: 3px solid var(--c-primary);
  border-radius: var(--r-lg) var(--r-lg) 0 0; padding: 6px 10px;
  cursor: pointer; margin-bottom: 2px; max-width: 100%;
  transition: background var(--dur-fast);
}
.msg-reply-quote:hover { background: rgba(0,87,184,.14); }
.msg-reply-quote-author { font-size: 11px; font-weight: 700; color: var(--c-primary); margin-bottom: 2px; }
.msg-reply-quote-text { font-size: 12px; color: var(--c-on-surf-var); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.msg-read-receipts {
  display: flex; align-items: center; gap: -4px;
  margin-top: 3px; align-self: flex-end;
}
.msg-read-avatar {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid var(--c-surface); margin-left: -4px;
  font-size: 8px; display: flex; align-items: center; justify-content: center;
  background: var(--c-secondary); color: var(--c-on-secondary);
  font-weight: 700; overflow: hidden;
}
.msg-read-avatar:first-child { margin-left: 0; }
.msg-read-avatar img { width: 100%; height: 100%; object-fit: cover; }

.msg-inline-reply-btn {
  opacity: 0; transition: opacity var(--dur-fast);
  background: var(--c-surf2); border: 1px solid var(--c-outline-var);
  border-radius: var(--r-full); padding: 3px 8px; font-size: 12px;
  cursor: pointer; color: var(--c-on-surf-var); display: flex; align-items: center; gap: 4px;
  font-family: var(--font-ui);
}
.msg-row:hover .msg-inline-reply-btn { opacity: 1; }
.msg-actions-row {
  display: flex; align-items: center; gap: 4px; margin-top: 2px;
}

/* ══════════════════════════════════════
   AI PANEL
══════════════════════════════════════ */
.ai-fab {
  position: fixed; bottom: calc(148px + env(safe-area-inset-bottom));
  right: 20px; z-index: 490;
  width: 52px; height: 52px; border-radius: var(--r-full);
  background: linear-gradient(135deg, var(--c-primary), #8B5CF6);
  color: #fff; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,87,184,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; transition: transform var(--dur-fast), box-shadow var(--dur-fast);
}
.ai-fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,87,184,.5); }
.ai-fab:active { transform: scale(.96); }
@media (min-width: 601px) {
  .ai-fab { bottom: 96px; }
}

.ai-panel {
  position: fixed; bottom: calc(72px + env(safe-area-inset-bottom) + 8px);
  right: 20px; width: 380px; max-width: calc(100vw - 32px);
  height: 540px; max-height: calc(100vh - 120px);
  background: var(--c-surface); border-radius: var(--r-2xl);
  box-shadow: var(--el3); border: 1px solid var(--c-outline-var);
  display: flex; flex-direction: column; z-index: 490;
  animation: slideUp var(--dur-std) var(--ease-out);
  overflow: hidden;
}
@media (min-width: 601px) {
  .ai-panel { bottom: 88px; }
}
.ai-panel-header {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  border-bottom: 1px solid var(--c-outline-var); flex-shrink: 0;
  background: linear-gradient(135deg, rgba(0,87,184,.06), rgba(139,92,246,.06));
}
.ai-panel-title { font-size: 15px; font-weight: 700; flex: 1; }
.ai-panel-subtitle { font-size: 11px; color: var(--c-on-surf-var); margin-top: 1px; }
.ai-panel-close {
  padding: 6px; border-radius: var(--r-full); cursor: pointer;
  transition: background var(--dur-fast); display: flex; align-items: center;
}
.ai-panel-close:hover { background: var(--c-surf2); }

.ai-feed {
  flex: 1; overflow-y: auto; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 10px;
  scrollbar-width: thin; scrollbar-color: var(--c-outline-var) transparent;
}
.ai-welcome {
  text-align: center; padding: 24px 16px; color: var(--c-on-surf-var);
}
.ai-welcome-icon { font-size: 40px; margin-bottom: 8px; opacity: .6; }
.ai-welcome-text { font-size: 13px; line-height: 1.5; }
.ai-suggestion-chips {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 10px;
}
.ai-chip {
  padding: 6px 14px; border-radius: var(--r-full);
  background: var(--c-primary-cont); color: var(--c-on-primary-cont);
  font-size: 12px; font-weight: 500; cursor: pointer; border: none;
  font-family: var(--font-ui); transition: box-shadow var(--dur-fast);
}
.ai-chip:hover { box-shadow: var(--el1); }

.ai-msg { display: flex; gap: 8px; align-items: flex-start; }
.ai-msg.user { flex-direction: row-reverse; }
.ai-msg-icon {
  width: 28px; height: 28px; border-radius: var(--r-full); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.ai-msg.assistant .ai-msg-icon {
  background: linear-gradient(135deg, var(--c-primary), #8B5CF6); color: #fff;
}
.ai-msg.user .ai-msg-icon { background: var(--c-secondary); color: var(--c-on-secondary); }
.ai-msg-bubble {
  max-width: 82%; padding: 9px 13px; border-radius: var(--r-2xl);
  font-size: 13px; line-height: 1.5;
}
.ai-msg.assistant .ai-msg-bubble {
  background: var(--c-surf2); color: var(--c-on-surface);
  border-radius: 4px var(--r-2xl) var(--r-2xl) var(--r-2xl);
}
.ai-msg.user .ai-msg-bubble {
  background: var(--c-primary); color: var(--c-on-primary);
  border-radius: var(--r-2xl) 4px var(--r-2xl) var(--r-2xl);
}
.ai-msg-action-card {
  margin-top: 6px; padding: 8px 12px; border-radius: var(--r-lg);
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
  font-size: 12px; font-weight: 500;
}
.ai-msg-loading .ai-msg-bubble {
  background: var(--c-surf2); padding: 12px 16px;
}

.ai-input-area {
  padding: 10px 12px; border-top: 1px solid var(--c-outline-var);
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
.ai-input {
  flex: 1; border: 1.5px solid var(--c-outline-var); border-radius: var(--r-xl);
  padding: 9px 13px; font-family: var(--font-ui); font-size: 14px;
  background: var(--c-surface); color: var(--c-on-surface); resize: none;
  max-height: 100px; line-height: 1.4; outline: none;
  transition: border-color var(--dur-fast);
}
.ai-input:focus { border-color: var(--c-primary); }
.ai-send-btn {
  width: 38px; height: 38px; border-radius: var(--r-full); flex-shrink: 0;
  background: var(--c-primary); color: var(--c-on-primary);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background var(--dur-fast), transform var(--dur-fast);
}
.ai-send-btn:hover { background: var(--c-primary-dark, #0046A8); transform: scale(1.05); }
.ai-send-btn:disabled { background: var(--c-outline); cursor: not-allowed; transform: none; }

/* ══════════════════════════════════════
   ADMIN SECTION BADGES
══════════════════════════════════════ */
.admin-section-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: var(--r-full);
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
}
.admin-section-badge.new { background: #D1FAE5; color: #065F46; }
.admin-section-badge.beta { background: #EDE9FE; color: #5B21B6; }
.admin-section-badge.live { background: #DBEAFE; color: #1E40AF; }

/* ══════════════════════════════════════
   MESSAGE SIDEBAR — SEARCH + COMPOSE
══════════════════════════════════════ */
.msg-sidebar-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 12px 10px; border-bottom: 1px solid var(--c-outline-var);
  flex-shrink: 0;
}
.msg-sidebar-search-wrap {
  display: flex; align-items: center; gap: 6px; flex: 1;
  background: var(--c-surf2); border-radius: var(--r-lg);
  padding: 6px 10px; border: 1.5px solid transparent;
  transition: border-color var(--dur-fast);
}
.msg-sidebar-search-wrap:focus-within { border-color: var(--c-primary); }
.msg-sidebar-search {
  flex: 1; border: none; background: transparent; outline: none;
  font-family: var(--font-ui); font-size: 13px; color: var(--c-on-surface);
  min-width: 0;
}
.msg-sidebar-search::placeholder { color: var(--c-on-surf-var); }
.msg-compose-btn { background: var(--c-primary-cont); border-radius: var(--r-lg) !important; color: var(--c-on-primary-cont); }
.msg-search-results-header {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  font-size: 12px; font-weight: 600; color: var(--c-on-surf-var);
  border-bottom: 1px solid var(--c-outline-var);
  background: var(--c-surf1);
}
.msg-sidebar-results { overflow-y: auto; flex: 1; }
.msg-search-result-item {
  padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--c-outline-var);
  transition: background var(--dur-fast);
}
.msg-search-result-item:hover { background: var(--c-surf2); }
.msg-search-result-channel { font-size: 11px; font-weight: 700; color: var(--c-primary); margin-bottom: 2px; }
.msg-search-result-sender { font-size: 11px; color: var(--c-on-surf-var); margin-bottom: 3px; }
.msg-search-result-text { font-size: 13px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* Presence dots & sidebar avatars */
.sidebar-avatar-wrap { position: relative; flex-shrink: 0; }
.presence-dot {
  width: 9px; height: 9px; border-radius: 50%;
  position: absolute; bottom: -1px; right: -1px;
  border: 2px solid var(--c-surface);
}
.presence-dot.online { background: #34A853; }
.presence-dot.offline { background: var(--c-outline); }

/* MESSAGE SEARCH (in-feed match highlight) */
.msg-search-match {
  background: #FEF08A; color: #713F12; border-radius: 2px; padding: 0 1px;
}
.msg-timestamp-tooltip {
  font-size: 10px; color: var(--c-on-surf-var);
  opacity: 0; transition: opacity var(--dur-fast);
  position: absolute; bottom: 100%; right: 0; white-space: nowrap;
  background: var(--c-surf3); padding: 2px 8px; border-radius: var(--r-full);
  pointer-events: none; margin-bottom: 2px;
}
.msg-bubble-wrap:hover .msg-timestamp-tooltip { opacity: 1; }

/* Compose modal rows */
.compose-user-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--c-outline-var); cursor: pointer;
  border-radius: var(--r-lg); transition: background var(--dur-fast);
  padding: 10px 8px;
}
.compose-user-row:hover { background: var(--c-surf2); }
.compose-user-row:last-child { border-bottom: none; }

/* Invite link box */
.invite-link-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--c-surf2); border: 1.5px solid var(--c-outline-var);
  border-radius: var(--r-lg); padding: 8px 10px;
  overflow: hidden;
}

/* ══════════════════════════════════════
   MESSAGE ATTACHMENTS
══════════════════════════════════════ */
.msg-attachment-img-wrap {
  max-width: 280px; cursor: pointer; margin-bottom: 4px;
}
.msg-attachment-img {
  max-width: 100%; max-height: 260px; border-radius: var(--r-lg);
  display: block; object-fit: cover;
  transition: opacity var(--dur-fast);
}
.msg-attachment-img:hover { opacity: .88; }
.msg-attachment-label {
  font-size: 11px; color: var(--c-on-surf-var);
  margin-top: 3px; padding: 0 2px;
}
.msg-attachment-file {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--r-xl);
  background: var(--c-surf2); border: 1px solid var(--c-outline-var);
  cursor: pointer; max-width: 280px; min-width: 200px;
  transition: box-shadow var(--dur-fast);
}
.msg-attachment-file:hover { box-shadow: var(--el1); }
.msg-attachment-file-name {
  font-size: 13px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.msg-attachment-file-meta { font-size: 11px; color: var(--c-on-surf-var); margin-top: 1px; }
.msg-attachment-file-info { flex: 1; min-width: 0; }

/* ══════════════════════════════════════
   LINK PREVIEW CARD
══════════════════════════════════════ */
.msg-link-preview {
  display: flex; gap: 10px; max-width: 320px;
  border: 1px solid var(--c-outline-var); border-radius: var(--r-xl);
  overflow: hidden; cursor: pointer; margin-top: 6px;
  background: var(--c-surf1);
  transition: box-shadow var(--dur-fast), transform var(--dur-fast);
}
.msg-link-preview:hover { box-shadow: var(--el1); transform: translateY(-1px); }
.msg-link-preview-img {
  width: 80px; height: 80px; object-fit: cover; flex-shrink: 0;
}
.msg-link-preview-body { padding: 10px 10px 10px 0; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.msg-link-preview-domain { font-size: 10px; color: var(--c-on-surf-var); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.msg-link-preview-title { font-size: 13px; font-weight: 600; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.msg-link-preview-desc { font-size: 11px; color: var(--c-on-surf-var); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* ══════════════════════════════════════
   IMAGE LIGHTBOX
══════════════════════════════════════ */
.img-lightbox {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
}
.img-lightbox-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
}
.img-lightbox-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 24px;
}

/* ══════════════════════════════════════
   EMOJI PICKER (reactions)
══════════════════════════════════════ */
.emoji-picker {
  position: absolute; z-index: 300;
  background: var(--c-surface); border-radius: var(--r-2xl);
  box-shadow: var(--el3); border: 1px solid var(--c-outline-var);
  padding: 10px; display: flex; flex-wrap: wrap; gap: 4px;
  max-width: 300px; animation: slideUp var(--dur-fast) var(--ease-out);
}
.emoji-opt {
  font-size: 22px; cursor: pointer; padding: 4px 5px;
  border-radius: var(--r-lg); transition: background var(--dur-fast), transform var(--dur-fast);
  line-height: 1;
}
.emoji-opt:hover { background: var(--c-surf2); transform: scale(1.2); }

/* ══════════════════════════════════════
   COMPOSE EMOJI PICKER
══════════════════════════════════════ */
.compose-emoji-picker {
  position: absolute; bottom: calc(100% + 8px); left: 0;
  background: var(--c-surface); border-radius: var(--r-2xl);
  box-shadow: var(--el3); border: 1px solid var(--c-outline-var);
  width: 320px; max-height: 360px;
  display: flex; flex-direction: column;
  animation: slideUp var(--dur-fast) var(--ease-out);
  z-index: 100; overflow: hidden;
}
@media (max-width: 600px) {
  .compose-emoji-picker { width: calc(100vw - 32px); left: 0; }
}
.compose-emoji-search-wrap {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-bottom: 1px solid var(--c-outline-var);
  background: var(--c-surf2); flex-shrink: 0;
}
.compose-emoji-search {
  flex: 1; border: none; outline: none;
  background: transparent; font-family: var(--font-ui);
  font-size: 13px; color: var(--c-on-surface);
}
.compose-emoji-search::placeholder { color: var(--c-on-surf-var); }
.compose-emoji-cats {
  display: flex; overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid var(--c-outline-var); padding: 0 4px;
  flex-shrink: 0;
}
.compose-emoji-cats::-webkit-scrollbar { display: none; }
.compose-emoji-cat-btn {

</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toasts"></div>
<script>
/* ═══════════════════════════════════════════════
   BLURRD LINKS — JavaScript Part 2
   State, Default Data, Utils, Login, Shell, Tasks
═══════════════════════════════════════════════ */

// ═══════════════════════════
// VERSION & CHANGELOG
// ═══════════════════════════
const APP_VERSION = '1.5.0';
const STATE_SCHEMA_VERSION = 3;

// ═══════════════════════════
// INTEGRATIONS CONFIG
// ═══════════════════════════
const INTEGRATIONS_KEY = 'blurrd_integrations';

function loadIntegrations() {
  try { return JSON.parse(localStorage.getItem(INTEGRATIONS_KEY) || '{}'); } catch(e) { return {}; }
}
function saveIntegrations(cfg) {
  try { localStorage.setItem(INTEGRATIONS_KEY, JSON.stringify(cfg)); } catch(e) {}
}
function getIntegration(key) { return loadIntegrations()[key] || {}; }
function setIntegration(key, data) {
  const cfg = loadIntegrations();
  cfg[key] = { ...cfg[key], ...data };
  saveIntegrations(cfg);
}

// ═══════════════════════════════════════════
// FIREBASE FIRESTORE — REAL-TIME MESSAGING
// ═══════════════════════════════════════════
let _firebaseApp = null;
let _firestore  = null;
let _firebaseUser = null;
let _threadUnsub  = null;   // onSnapshot unsubscriber for messages
let _typingUnsub  = null;   // onSnapshot unsubscriber for typing
let _typingTimer  = null;   // debounce timer for clearing typing state

function isFirestoreEnabled() {
  return !!(S._firestoreReady && _firestore);
}

async function loadFirebaseSDK() {
  if (window.firebase?.firestore) return;
  const sdks = [
    'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js',
    'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js',
  ];
  await Promise.all(sdks.map(src => new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  })));
}

async function initFirestore() {
  // Merge: prefer blurrd_integrations['firebase'], fall back to Push Notifications config (blurrd_firebase)
  let cfg = getIntegration('firebase');
  if (!cfg.apiKey || !cfg.projectId) {
    const fcmCfg = loadFirebaseConfig();
    if (fcmCfg.apiKey && fcmCfg.projectId) {
      cfg = { ...fcmCfg, ...cfg };          // push-notif cfg fills gaps
      setIntegration('firebase', cfg);       // sync so Firestore section sees it
    }
  }
  if (!cfg.apiKey || !cfg.projectId) {
    toast('Add Firebase config in Admin → Integrations → Firebase Push Notifications first', 'error');
    return false;
  }
  try {
    await loadFirebaseSDK();
    if (!window.firebase) throw new Error('Firebase SDK failed to load');

    if (!firebase.apps.length) {
      _firebaseApp = firebase.initializeApp({
        apiKey:            cfg.apiKey,
        authDomain:        cfg.authDomain   || `${cfg.projectId}.firebaseapp.com`,
        projectId:         cfg.projectId,
        storageBucket:     cfg.storageBucket|| `${cfg.projectId}.appspot.com`,
        messagingSenderId: cfg.messagingSenderId || '',
        appId:             cfg.appId        || '',
        databaseURL:       cfg.databaseURL  || `https://${cfg.projectId}-default-rtdb.firebaseio.com`,
      });
    } else {
      _firebaseApp = firebase.apps[0];
    }

    _firestore = firebase.firestore();

    // Anonymous auth — maps to blurrd user profile
    const auth = firebase.auth();
    const result = await auth.signInAnonymously();
    _firebaseUser = result.user;

    // Write/update user document
    if (S.currentUser) {
      await _firestore.collection('users').doc(S.currentUser.id).set({
        displayName: S.currentUser.name,
        email:       S.currentUser.email || '',
        avatarUrl:   S.currentUser.avatar || '',
        color:       S.currentUser.color  || '#0057B8',
        initials:    S.currentUser.initials || '',
        isOnline:    true,
        lastSeen:    firebase.firestore.FieldValue.serverTimestamp(),
        firebaseUid: _firebaseUser.uid,
      }, { merge: true });
    }

    // Realtime Presence via Firebase Realtime Database
    try {
      const presenceRef = firebase.database().ref(`presence/${S.currentUser?.id}`);
      await presenceRef.set({ isOnline: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
      presenceRef.onDisconnect().update({ isOnline: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });

      // Listen for all users' presence
      firebase.database().ref('presence').on('value', snap => {
        const data = snap.val() || {};
        S.users.forEach(u => { if (data[u.id] !== undefined) u.online = !!data[u.id].isOnline; });
        // Update presence dots in DOM without full re-render
        document.querySelectorAll('[data-presence-uid]').forEach(el => {
          const uid = el.dataset.presenceUid;
          el.style.background = data[uid]?.isOnline ? '#4CAF50' : '#9E9E9E';
        });
      });
    } catch(e) { console.warn('Realtime DB presence failed (check databaseURL config):', e.message); }

    S._firestoreReady = true;

    // Subscribe to current channel
    if (S.selectedChannelId) fsSubscribeThread(S.selectedChannelId);

    toast('🔥 Firebase connected — real-time sync active!');
    render();
    return true;
  } catch(e) {
    console.error('Firebase init error:', e);
    toast('Firebase error: ' + e.message, 'error');
    return false;
  }
}

function fsSubscribeThread(channelId) {
  if (!_firestore || !channelId) return;
  // Unsubscribe from previous thread
  if (_threadUnsub) { _threadUnsub(); _threadUnsub = null; }
  if (_typingUnsub) { _typingUnsub(); _typingUnsub = null; }

  // Messages sub-collection: ordered by timestamp, last 120
  const msgsQuery = _firestore
    .collection('threads').doc(channelId)
    .collection('messages')
    .orderBy('timestamp', 'asc')
    .limitToLast(120);

  _threadUnsub = msgsQuery.onSnapshot(snapshot => {
    let changed = false;
    snapshot.docChanges().forEach(change => {
      const data = change.doc.data();
      const ts = data.timestamp?.toMillis?.() || Date.now();
      if (change.type === 'added') {
        if (!S.messages.find(m => m.id === change.doc.id)) {
          S.messages.push({
            id: change.doc.id, channelId,
            userId:    data.senderId,
            content:   data.text || '',
            timestamp: ts,
            reactions: data.reactions || {},
            threadId:  data.replyToId || null,
            edited:    data.isEdited  || false,
            readBy:    data.readBy    || [],
            _fs: true,
          });
          changed = true;
          // Auto mark read if user is viewing this channel
          if (S.page === 'messages' && S.selectedChannelId === channelId && S.currentUser)
            fsMarkRead(channelId, change.doc.id);
        }
      } else if (change.type === 'modified') {
        const m = S.messages.find(m => m.id === change.doc.id);
        if (m) {
          m.readBy    = data.readBy    || m.readBy;
          m.reactions = data.reactions || m.reactions;
          m.content   = data.text      || m.content;
          m.edited    = data.isEdited  || false;
          changed = true;
        }
      }
    });
    if (changed && S.page === 'messages' && S.selectedChannelId === channelId) {
      const wasAtBottom = (() => { const f = document.getElementById('msg-feed'); return f && (f.scrollHeight - f.scrollTop - f.clientHeight < 80); })();
      renderPageContent();
      if (wasAtBottom) setTimeout(() => { const f = document.getElementById('msg-feed'); if (f) f.scrollTop = f.scrollHeight; }, 40);
    }
  }, e => console.warn('Thread snapshot error:', e));

  // Typing indicator listener on the thread document
  _typingUnsub = _firestore.collection('threads').doc(channelId).onSnapshot(snap => {
    const typing = snap.data()?.typing || {};
    const now = Date.now();
    S._typingUsers = Object.entries(typing)
      .filter(([uid, ts]) => uid !== S.currentUser?.id && (now - ts) < 5000)
      .map(([uid]) => uid);
    updateTypingIndicatorDOM();
  }, () => {});
}

function updateTypingIndicatorDOM() {
  const el = document.getElementById('typing-indicator');
  if (!el) return;
  const names = (S._typingUsers || [])
    .map(uid => getUser(uid)?.name?.split(' ')[0]).filter(Boolean);
  if (!names.length) { el.innerHTML = ''; el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = `
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span style="font-size:13px;color:var(--c-on-surf-var)">${escHtml(names.join(', '))} ${names.length === 1 ? 'is' : 'are'} typing…</span>`;
}

async function fsSendMessage(channelId, content, replyToId = null) {
  if (!_firestore || !S.currentUser) return false;
  try {
    const ch = getChannel(channelId);
    // Upsert thread document
    await _firestore.collection('threads').doc(channelId).set({
      threadName:          ch?.name || channelId,
      type:                ch?.type === 'dm' ? 'direct' : 'global',
      participantIds:      ch?.members || [],
      lastMessageSnippet:  content.slice(0, 80),
      lastUpdatedAt:       firebase.firestore.FieldValue.serverTimestamp(),
    }, { merge: true });

    await _firestore.collection('threads').doc(channelId)
      .collection('messages').add({
        senderId:  S.currentUser.id,
        text:      content,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        isEdited:  false,
        readBy:    [S.currentUser.id],
        reactions: {},
        replyToId: replyToId || null,
      });

    // Clear typing
    fsSetTyping(channelId, false);
    return true;
  } catch(e) {
    console.error('fsSendMessage error:', e);
    return false;
  }
}

async function fsMarkRead(channelId, messageId) {
  if (!_firestore || !S.currentUser) return;
  try {
    await _firestore.collection('threads').doc(channelId)
      .collection('messages').doc(messageId)
      .update({ readBy: firebase.firestore.FieldValue.arrayUnion(S.currentUser.id) });
  } catch(e) {}
}

function fsSetTyping(channelId, isTyping) {
  if (!_firestore || !S.currentUser) return;
  clearTimeout(_typingTimer);
  const threadRef = _firestore.collection('threads').doc(channelId);
  if (isTyping) {
    threadRef.set({ typing: { [S.currentUser.id]: Date.now() } }, { merge: true }).catch(() => {});
    _typingTimer = setTimeout(() => fsSetTyping(channelId, false), 4000);
  } else {
    threadRef.update({ [`typing.${S.currentUser.id}`]: firebase.firestore.FieldValue.delete() }).catch(() => {});
  }
}

async function fsMarkAllRead(channelId) {
  if (!_firestore || !S.currentUser) return;
  try {
    const snap = await _firestore.collection('threads').doc(channelId)
      .collection('messages').where('readBy', 'not-in', [[S.currentUser.id]])
      .limit(50).get();
    const batch = _firestore.batch();
    snap.docs.forEach(d => batch.update(d.ref, { readBy: firebase.firestore.FieldValue.arrayUnion(S.currentUser.id) }));
    await batch.commit();
  } catch(e) {}
}

// ═══════════════════════════════════════════
// CLAUDE AI ASSISTANT
// ═══════════════════════════════════════════
function formatAIContent(content) {
  // Strip action blocks, escape HTML, then apply light markdown
  const stripped = content.replace(/```action[\s\S]*?```/g, '').trim();
  return escHtml(stripped)
    .replace(/\n/g, '<br>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--c-surf2);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
}

async function callClaudeAPI(messages) {
  const cfg = getIntegration('claude');
  if (!cfg.apiKey) {
    toast('Add Claude API key in Admin → Integrations', 'error');
    return null;
  }
  // Use a CORS proxy or direct call (works when hosted, requires proxy in dev)
  const endpoint = cfg.proxyUrl
    ? `${cfg.proxyUrl}/v1/messages`
    : 'https://api.anthropic.com/v1/messages';
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': cfg.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: cfg.model || 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: buildAISystemPrompt(),
        messages,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch(e) {
    console.error('Claude API error:', e);
    throw e;
  }
}

function buildAISystemPrompt() {
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const myTasks = S.tasks.filter(t => t.assignees?.includes(S.currentUser?.id) && t.status !== 'done');
  const overdue = myTasks.filter(t => t.dueDate && t.dueDate < new Date().toISOString().split('T')[0]);
  const members = S.users.map(u => `${u.name} (${u.role})`).join(', ');
  return `You are an intelligent work assistant embedded in BLURRD Links, a team task management and communication platform used by a creative/e-commerce team.

Today is ${today}.
Current user: ${S.currentUser?.name} (${S.currentUser?.role})
Team members: ${members}
Open tasks assigned to current user: ${myTasks.length} (${overdue.length} overdue)
Total tasks in system: ${S.tasks.length}

Your capabilities:
- Answer questions about tasks, deadlines, and team workload
- Summarize what's happening across the project
- Help draft messages, task descriptions, or emails
- Create tasks when asked (respond with JSON action blocks)
- Suggest priorities and next steps
- Answer general work and productivity questions

When creating a task, include a JSON block in your response:
\`\`\`action
{"type":"create_task","title":"...","priority":"medium","assignees":[],"dueDate":"YYYY-MM-DD"}
\`\`\`

Be concise, friendly, and focused on helping the team move faster. You understand the BLURRD Links interface.`;
}

async function sendAIMessage(userMessage) {
  if (!userMessage.trim() || S._aiLoading) return;
  S._aiMessages.push({ role: 'user', content: userMessage });
  S._aiLoading = true;
  renderAIPanel();
  try {
    const reply = await callClaudeAPI(
      S._aiMessages.map(m => ({ role: m.role, content: m.content }))
    );
    if (reply) {
      S._aiMessages.push({ role: 'assistant', content: reply });
      // Parse action blocks
      const actionMatch = reply.match(/```action\n([\s\S]+?)\n```/);
      if (actionMatch) {
        try {
          const action = JSON.parse(actionMatch[1]);
          if (action.type === 'create_task' && canEdit()) {
            const newTask = {
              id: uid(), title: action.title || 'New Task',
              description: action.description || '', status: 'todo',
              priority: action.priority || 'medium',
              dueDate: action.dueDate || '',
              assignees: (action.assignees || []).length ? action.assignees : [S.currentUser.id],
              tags: [], notes: 'Created by AI assistant',
              attachments: [], comments: [], subtasks: [],
              timeEstimate: 0, timeLogs: [],
              activityLog: [{ id: uid(), userId: S.currentUser.id, action:'created', details:'Task created by AI', timestamp: Date.now() }],
              createdBy: S.currentUser.id, createdAt: Date.now(), updatedAt: Date.now(),
            };
            S.tasks.unshift(newTask);
            saveState();
            toast(`✅ AI created task: "${newTask.title}"`);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    S._aiMessages.push({ role: 'assistant', content: `Sorry, I ran into an error: ${e.message}. Check your API key in Admin → Integrations.` });
  }
  S._aiLoading = false;
  renderAIPanel();
}

function renderAIPanel() {
  const container = document.getElementById('ai-panel-container');
  if (!container) return;
  container.innerHTML = S._aiPanelOpen ? buildAIPanelHTML() : '';
  if (S._aiPanelOpen) {
    setTimeout(() => {
      const feed = document.getElementById('ai-feed');
      if (feed) feed.scrollTop = feed.scrollHeight;
      document.getElementById('ai-input')?.focus();
    }, 50);
  }
}

function buildAIPanelHTML() {
  const cfg = getIntegration('claude');
  const hasKey = !!cfg.apiKey;
  return `
  <div class="ai-panel" id="ai-panel">
    <div class="ai-panel-header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="ai-panel-icon">✦</div>
        <div>
          <div style="font-weight:700;font-size:15px">BLURRD AI</div>
          <div style="font-size:11px;color:var(--c-on-surf-var)">Powered by Claude ${cfg.model || 'claude-sonnet-4-6'}</div>
        </div>
      </div>
      <div style="display:flex;gap:4px">
        <div class="icon-btn ripple" onclick="S._aiMessages=[];renderAIPanel()" title="Clear chat"><span class="ms sm">restart_alt</span></div>
        <div class="icon-btn ripple" onclick="S._aiPanelOpen=false;renderAIPanel()" title="Close"><span class="ms sm">close</span></div>
      </div>
    </div>

    ${!hasKey ? `
    <div style="padding:20px;text-align:center">
      <div style="font-size:32px;margin-bottom:12px">🔑</div>
      <div style="font-weight:600;margin-bottom:6px">API Key Required</div>
      <div style="font-size:13px;color:var(--c-on-surf-var);margin-bottom:16px">Add your Claude API key in Admin → Integrations to enable AI.</div>
      <button class="btn filled ripple" onclick="navigate('admin')">Go to Admin</button>
    </div>` : `
    <div class="ai-feed" id="ai-feed">
      ${S._aiMessages.length === 0 ? `
      <div class="ai-welcome">
        <div style="font-size:36px;margin-bottom:10px">✦</div>
        <div style="font-weight:600;font-size:15px;margin-bottom:6px">Hi ${escHtml(S.currentUser?.name?.split(' ')[0] || 'there')}!</div>
        <div style="font-size:13px;color:var(--c-on-surf-var);line-height:1.5">I can help you manage tasks, draft messages, summarize your workload, and more.</div>
        <div class="ai-suggestion-chips">
          <div class="ai-chip ripple" onclick="document.getElementById('ai-input').value='What are my most urgent tasks?';sendAIFromInput()">What are my urgent tasks?</div>
          <div class="ai-chip ripple" onclick="document.getElementById('ai-input').value='Summarize today\\'s workload for the team';sendAIFromInput()">Summarize team workload</div>
          <div class="ai-chip ripple" onclick="document.getElementById('ai-input').value='Draft a status update for my tasks';sendAIFromInput()">Draft a status update</div>
          <div class="ai-chip ripple" onclick="document.getElementById('ai-input').value='Create a task to review the Q2 campaign brief tomorrow';sendAIFromInput()">Create a task for me</div>
        </div>
      </div>` :
      S._aiMessages.map(m => `
      <div class="ai-msg ${m.role === 'user' ? 'ai-msg-user' : 'ai-msg-assistant'}">
        ${m.role === 'assistant' ? '<div class="ai-msg-icon">✦</div>' : ''}
        <div class="ai-msg-bubble">
          ${m.role === 'assistant'
            ? formatAIContent(m.content)
            : escHtml(m.content)}
        </div>
      </div>`).join('')}
      ${S._aiLoading ? `

// Cloud storage URL detection
function detectCloudService(url) {
  if (!url) return null;
  try { new URL(url); } catch(e) { return null; }
  if (/drive\.google\.com|docs\.google\.com|sheets\.google\.com|slides\.google\.com/.test(url)) {
    const t = /\/document\//i.test(url) ? 'Google Doc' : /\/spreadsheets\//i.test(url) ? 'Google Sheet' : /\/presentation\//i.test(url) ? 'Google Slides' : 'Google Drive';
    return { service:'Google Drive', icon:'📄', type:t, color:'#FEF3C7' };
  }
  if (/dropbox\.com/.test(url)) return { service:'Dropbox', icon:'📦', type:'Dropbox File', color:'#DBEAFE' };
  if (/onedrive\.live\.com|1drv\.ms|sharepoint\.com/.test(url)) return { service:'OneDrive', icon:'☁️', type:'OneDrive File', color:'#EDE9FE' };
  if (/figma\.com/.test(url)) return { service:'Figma', icon:'🎨', type:'Figma File', color:'#FFE4E6' };
  if (/notion\.so/.test(url)) return { service:'Notion', icon:'📝', type:'Notion Page', color:'#F1F5F9' };
  if (/loom\.com/.test(url)) return { service:'Loom', icon:'🎥', type:'Loom Video', color:'#FEF3C7' };
  return { service:'Link', icon:'🔗', type:'External Link', color:'var(--c-surf2)' };
}

function extractLinkName(url, cloudInfo) {
  try {
    const u = new URL(url);
    // Try to extract a readable name from the URL
    const segments = u.pathname.split('/').filter(Boolean);
    const last = segments[segments.length - 1];
    if (last && last.length > 3 && !last.match(/^[a-f0-9-]{8,}$/i)) return decodeURIComponent(last);
    return cloudInfo?.type || u.hostname;
  } catch(e) { return url.slice(0, 40); }
}

// ── Calendar Export ──
function generateICS(task) {
  if (!task.dueDate) { toast('Task has no due date', 'error'); return null; }
  const dtStart = task.dueDate.replace(/-/g, '') + 'T090000Z';
  const dtEnd = task.dueDate.replace(/-/g, '') + 'T100000Z';
  const created = new Date(task.createdAt || Date.now()).toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
  const ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'CALSCALE:GREGORIAN',
    'PRODID:-//BLURRD Links//EN', 'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${task.id}@blurrd-links`,
    `DTSTAMP:${created}`,
    `DTSTART;VALUE=DATE:${task.dueDate.replace(/-/g,'')}`,
    `DTEND;VALUE=DATE:${task.dueDate.replace(/-/g,'')}`,
    `SUMMARY:${task.title}`,
    `DESCRIPTION:${(task.description || task.notes || '').replace(/\n/g,'\\n').slice(0,500)}`,
    `STATUS:${task.status === 'done' ? 'COMPLETED' : 'NEEDS-ACTION'}`,
    `PRIORITY:${({urgent:1,high:5,medium:5,low:9})[task.priority]||5}`,
    'END:VEVENT', 'END:VCALENDAR'
  ].join('\r\n');
  return ics;
}

function exportTaskToICS(taskId) {
  const t = getTask(taskId);
  if (!t) return;
  const ics = generateICS(t);
  if (!ics) return;
  const blob = new Blob([ics], { type:'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${t.title.slice(0,40).replace(/[^a-z0-9]/gi,'_')}.ics`;
  a.click(); URL.revokeObjectURL(url);
  toast('Calendar event downloaded! 📅');
}

function exportAllTasksToICS() {
  const tasks = S.tasks.filter(t => t.dueDate && t.assignees?.includes(S.currentUser?.id));
  if (!tasks.length) { toast('No tasks with due dates assigned to you', 'error'); return; }
  const events = tasks.map(generateICS).filter(Boolean);
  // Merge into single ICS
  const merged = events.map(e => e.split('\r\n').filter(l => !l.startsWith('BEGIN:VCALENDAR') && !l.startsWith('END:VCALENDAR') && !l.startsWith('VERSION') && !l.startsWith('CALSCALE') && !l.startsWith('PRODID') && !l.startsWith('METHOD')).join('\r\n')).join('\r\n');
  const full = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nCALSCALE:GREGORIAN\r\nPRODID:-//BLURRD Links//EN\r\n${merged}\r\nEND:VCALENDAR`;
  const blob = new Blob([full], { type:'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'blurrd-links-my-tasks.ics'; a.click(); URL.revokeObjectURL(url);
  toast(`Exported ${tasks.length} tasks to calendar! 📅`);
}

function googleCalendarUrl(task) {
  if (!task.dueDate) return '#';
  const d = task.dueDate.replace(/-/g,'');
  const title = encodeURIComponent(task.title);
  const details = encodeURIComponent(task.description || task.notes || 'BLURRD Links task');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${d}/${d}&details=${details}`;
}

function outlookCalendarUrl(task) {
  if (!task.dueDate) return '#';
  const title = encodeURIComponent(task.title);
  const body = encodeURIComponent(task.description || task.notes || '');
  const start = task.dueDate + 'T09:00:00';
  const end = task.dueDate + 'T10:00:00';
  return `https://outlook.live.com/calendar/0/deeplink/compose?subject=${title}&body=${body}&startdt=${start}&enddt=${end}`;
}

// ── Email Digest ──
function generateDigest() {
  const today = new Date().toISOString().split('T')[0];
  const myId = S.currentUser?.id;
  const overdue = S.tasks.filter(t => t.assignees?.includes(myId) && t.status !== 'done' && t.dueDate && t.dueDate < today);
  const dueToday = S.tasks.filter(t => t.assignees?.includes(myId) && t.status !== 'done' && t.dueDate === today);
  const upcoming = S.tasks.filter(t => t.assignees?.includes(myId) && t.status !== 'done' && t.dueDate && t.dueDate > today).slice(0,5);
  return { overdue, dueToday, upcoming };
}

function digestToText() {
  const d = generateDigest();
  const name = S.currentUser?.name?.split(' ')[0] || 'there';
  const date = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  let lines = [`BLURRD Links — Daily Digest for ${name}`, date, ''];
  if (d.overdue.length) {
    lines.push(`⚠️ OVERDUE (${d.overdue.length})`);
    d.overdue.forEach(t => lines.push(`  • ${t.title} — was due ${formatDate(t.dueDate)}`));
    lines.push('');
  }
  if (d.dueToday.length) {
    lines.push(`🎯 DUE TODAY (${d.dueToday.length})`);
    d.dueToday.forEach(t => lines.push(`  • ${t.title}`));
    lines.push('');
  }
  if (d.upcoming.length) {
    lines.push(`📅 COMING UP`);
    d.upcoming.forEach(t => lines.push(`  • ${t.title} — due ${formatDate(t.dueDate)}`));
    lines.push('');
  }
  if (!d.overdue.length && !d.dueToday.length && !d.upcoming.length) {
    lines.push("⛳ All clear — no tasks due soon. Hole in one!");
  }
  return lines.join('\n');
}

// ── Email to Task ──
function createTaskFromEmail(subject, body) {
  if (!subject) return;
  const t = {
    id: uid(), title: subject.slice(0, 120),
    description: body || '',
    status: 'todo', priority: 'medium',
    dueDate: '', assignees: [S.currentUser.id],
    tags: [], notes: 'Imported from email',
    attachments: [], comments: [], subtasks: [],
    timeEstimate: 0, timeLogs: [],
    activityLog: [{ id: uid(), userId: S.currentUser.id, action:'created', details:'Task created from email', timestamp: Date.now() }],
    createdBy: S.currentUser.id, createdAt: Date.now(), updatedAt: Date.now()
  };
  S.tasks.unshift(t);
  saveState();
  return t;
}

function saveState() {
  try {
    const toSave = {
      _schemaVersion: STATE_SCHEMA_VERSION,
      _appVersion: APP_VERSION,
      users: S.users, tasks: S.tasks, channels: S.channels,
      messages: S.messages, notifications: S.notifications,
      tags: S.tags, boards: S.boards, theme: S.theme,
      currentUserId: S.currentUser?.id,
      selectedChannelId: S.selectedChannelId,
      selectedBoardId: S.selectedBoardId
    };
    localStorage.setItem('blurrd_state', JSON.stringify(toSave));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('blurrd_state');
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.users?.length) {
      S.users = d.users.map(u => ({ avatar: null, password: '', ...u }));
    }
    if (d.tasks?.length) {
      // Forward-migrate tasks — ensure new fields exist
      S.tasks = d.tasks.map(t => ({
        subtasks: [], tags: [], timeEstimate: 0, timeLogs: [], activityLog: [], ...t
      }));
    }
    if (d.channels?.length) S.channels = d.channels;
    if (d.messages?.length) {
      // Strip old demo messages on first load after v1.5
      S.messages = d.messages.filter(m => !DEMO_MSG_IDS.has(m.id));
    }
    if (d.notifications?.length) S.notifications = d.notifications;
    if (d.tags?.length) S.tags = d.tags;
    if (d.boards?.length) S.boards = d.boards;
    if (d.selectedBoardId) S.selectedBoardId = d.selectedBoardId;
    if (d.theme) S.theme = { ...S.theme, ...d.theme };
    if (d.selectedChannelId) S.selectedChannelId = d.selectedChannelId;
    if (d.currentUserId) {
      const u = S.users.find(u => u.id === d.currentUserId);
      if (u) S.currentUser = u;
    }
    if (d._appVersion !== APP_VERSION) S._showWhatsNew = true;
  } catch(e) {
    console.warn('State load failed, using defaults', e);
  }
}

function exportData() {
  const data = {
    _export: 'BLURRD Links', _version: APP_VERSION, _exported: new Date().toISOString(),
    users: S.users, tasks: S.tasks, channels: S.channels,
    messages: S.messages, theme: S.theme
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `blurrd-links-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Data exported! ⛳');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d._export || d._export !== 'BLURRD Links') { toast('Invalid backup file', 'error'); return; }
      if (d.users?.length) S.users = d.users;
      if (d.tasks?.length) S.tasks = d.tasks;
      if (d.channels?.length) S.channels = d.channels;
      if (d.messages?.length) S.messages = d.messages;
      if (d.theme) S.theme = d.theme;
      S.currentUser = null;
      saveState();
      applyTheme(S.theme);
      render();
      toast('Data imported successfully! 🎉');
    } catch(err) { toast('Failed to import — check file format', 'error'); }
  };
  reader.readAsText(file);
}
