function renderCalendarPage() {
  const d = S.calDate;
  const year = d.getFullYear(), month = d.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];
  const monthName = d.toLocaleDateString('en-US', { month:'long', year:'numeric' });

  // Build grid cells
  let cells = [];
  // Previous month padding
  const prevDays = new Date(year, month, 0).getDate();
  for (let i = firstDay-1; i >= 0; i--) cells.push({ day: prevDays-i, other: true, date: null });
  // Current month
  for (let i = 1; i <= daysInMonth; i++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    cells.push({ day: i, other: false, date: dateStr, isToday: dateStr === today, selected: S.calSelectedDate === dateStr });
  }
  // Next month padding
  const remaining = 42 - cells.length;
  for (let i = 1; i <= remaining; i++) cells.push({ day: i, other: true, date: null });

  const tasksByDate = {};
  S.tasks.filter(t => t.dueDate).forEach(t => {
    if (!tasksByDate[t.dueDate]) tasksByDate[t.dueDate] = [];
    tasksByDate[t.dueDate].push(t);
  });

  const selectedTasks = S.calSelectedDate ? (tasksByDate[S.calSelectedDate] || []) : [];

  return `
  <div class="page-calendar">
    <div class="cal-header">
      <div class="cal-nav-btn ripple" onclick="calPrevMonth()"><span class="ms">chevron_left</span></div>
      <div class="cal-month-year">${monthName}</div>
      <div class="cal-nav-btn ripple" onclick="calNextMonth()"><span class="ms">chevron_right</span></div>
      <button class="btn btn-tonal btn-sm ripple" onclick="calGoToday()">Today</button>
    </div>

    <div class="cal-grid">
      <div class="cal-day-labels">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-day-label">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
        ${cells.map(cell => {
          const tasks = cell.date ? (tasksByDate[cell.date] || []) : [];
          return `<div class="cal-day${cell.other?' other-month':''}${cell.isToday?' today':''}${cell.selected?' selected':''}"
            ${cell.date ? `onclick="calSelectDate('${cell.date}')"` : ''}>
            <div class="cal-day-num">${cell.day}</div>
            <div class="cal-task-dots">
              ${tasks.slice(0,3).map(t => `<div class="cal-task-dot${isOverdue(t.dueDate) && t.status!=='done'?' overdue':''}">${escHtml(t.title.slice(0,12))}${t.title.length>12?'…':''}</div>`).join('')}
              ${tasks.length > 3 ? `<div class="cal-task-dot">+${tasks.length-3} more</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${S.calSelectedDate ? `
    <div class="cal-selected-tasks">
      <div class="cal-selected-header">
        Tasks for ${formatDate(S.calSelectedDate)} (${selectedTasks.length})
      </div>
      ${selectedTasks.length === 0 ?
        `<div style="font-size:14px;color:var(--c-on-surf-var)">No tasks due on this date.</div>` :
        `<div class="task-list">${selectedTasks.map(t => renderTaskCard(t)).join('')}</div>`}
    </div>` : ''}
  </div>

  <div class="fab ripple" onclick="openTaskModal(null)">
    <span class="ms">add</span> New Task
  </div>`;
}

function calPrevMonth() {
  S.calDate = new Date(S.calDate.getFullYear(), S.calDate.getMonth()-1, 1);
  renderPageContent();
}
function calNextMonth() {
  S.calDate = new Date(S.calDate.getFullYear(), S.calDate.getMonth()+1, 1);
  renderPageContent();
}
function calGoToday() {
  S.calDate = new Date();
  S.calSelectedDate = new Date().toISOString().split('T')[0];
  renderPageContent();
}
function calSelectDate(date) {
  S.calSelectedDate = S.calSelectedDate === date ? null : date;
  renderPageContent();
}

// ═══════════════════════════
// MESSAGES PAGE
// ═══════════════════════════
function renderMessagesPage() {
  const ch = getChannel(S.selectedChannelId);
  // On mobile (≤600px) use S.mobileShowChannelList to toggle single-pane view.
  // We detect mobile via window.innerWidth; the flag is also used in CSS visibility.
  const isMobile = typeof window !== 'undefined' && window.innerWidth <= 600;

  if (isMobile && S.mobileShowChannelList) {
    // Show channel/DM list only
    return `<div class="page-messages">${renderMsgSidebar(true)}</div>`;
  }

  if (isMobile && !S.mobileShowChannelList) {
    // Show chat view only (no sidebar)
    return `
    <div class="page-messages">
      ${ch ? renderMsgMain(ch) : renderMsgSidebarMobileFallback()}
    </div>`;
  }

  // Desktop: full two-pane layout
  return `
  <div class="page-messages">
    ${renderMsgSidebar(false)}
    ${ch ? renderMsgMain(ch) : '<div class="empty-state" style="flex:1"><span class="ms">forum</span><h3>Select a channel</h3></div>'}
    ${S.activeThreadMsgId ? renderThreadPanel() : ''}
  </div>`;
}

function renderMsgSidebarMobileFallback() {
  return `
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 24px">
    <span class="ms" style="font-size:56px;color:var(--c-primary)">forum</span>
    <div style="text-align:center">
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">Pick a Channel</div>
      <div style="font-size:14px;color:var(--c-on-surf-var)">Tap below to choose a channel or DM</div>
    </div>
    <button class="btn filled ripple" onclick="mobileShowChannels()" style="padding:14px 28px;font-size:15px">
      <span class="ms">list</span> Browse Channels
    </button>
  </div>`;
}

function renderMsgSidebar(mobileMode = false) {
  const sq = (S.sidebarSearchQuery || '').toLowerCase().trim();
  const channels = S.channels.filter(c => c.type === 'channel');
  const dms = S.channels.filter(c => c.type === 'dm');

  // If sidebar search is active, show search results instead of normal list
  if (sq) {
    const results = [];
    S.messages.forEach(m => {
      if (!m.content.toLowerCase().includes(sq)) return;
      const ch = getChannel(m.channelId);
      const sender = getUser(m.userId);
      if (!ch || !sender) return;
      results.push({ msg: m, ch, sender });
    });

    return `
    <div class="msg-sidebar${mobileMode ? ' mobile-visible' : ''}">
      ${renderSidebarHeader(mobileMode, sq)}
      <div class="msg-search-results-header">
        <span class="ms sm">search</span> ${results.length} message${results.length!==1?'s':''} found
      </div>
      <div class="msg-sidebar-results">
        ${results.length === 0 ? `<div style="padding:24px 16px;text-align:center;color:var(--c-on-surf-var);font-size:13px">No messages match "${escHtml(sq)}"</div>` :
          results.slice(0,40).map(({msg, ch, sender}) => `
          <div class="msg-search-result-item ripple" onclick="openSearchedMessage('${ch.id}','${msg.id}')">
            <div class="msg-search-result-channel">${ch.type==='dm'?'👤':'#'}${escHtml(ch.name)}</div>
            <div class="msg-search-result-sender">${escHtml(sender.name)} · ${formatTime(msg.timestamp)}</div>
            <div class="msg-search-result-text">${highlightText(escHtml(msg.content.slice(0,100)), sq)}${msg.content.length>100?'…':''}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  return `
  <div class="msg-sidebar${mobileMode ? ' mobile-visible' : ''}">
    ${renderSidebarHeader(mobileMode, sq)}
    <div class="msg-sidebar-section">
      <div class="msg-sidebar-title">
        Channels
        <div class="icon-btn ripple" onclick="openAddChannelPrompt()" title="New channel" style="width:24px;height:24px">
          <span class="ms sm">add</span>
        </div>
      </div>
      ${channels.map(ch => {
        const uc = unreadCount(ch.id);
        return `<div class="msg-channel-item ripple${ch.id===S.selectedChannelId?' active':''}" onclick="selectChannel('${ch.id}')">
          <span class="ms sm" style="opacity:.7">tag</span>
          <span class="msg-channel-name">${escHtml(ch.name)}</span>
          ${uc > 0 ? `<span class="msg-unread">${uc > 9 ? '9+' : uc}</span>` : ''}
        </div>`;
      }).join('')}
    </div>
    <div class="msg-sidebar-section">
      <div class="msg-sidebar-title">
        Direct Messages
        <div class="icon-btn ripple" onclick="openComposeModal()" title="New message" style="width:24px;height:24px">
          <span class="ms sm">edit</span>
        </div>
      </div>
      ${dms.filter(ch => getUser(ch.partnerId)).map(ch => {
        const partner = getUser(ch.partnerId);
        const uc = unreadCount(ch.id);
        return `<div class="msg-channel-item ripple${ch.id===S.selectedChannelId?' active':''}" onclick="selectChannel('${ch.id}')">
          <div class="sidebar-avatar-wrap">
            <div class="avatar sm" style="background:${partner.color||userColor(partner.name)}">${escHtml(partner.initials||initials(partner.name))}</div>
            <div class="presence-dot ${partner.online?'online':'offline'}"></div>
          </div>
          <span class="msg-channel-name">${escHtml(partner.name)}</span>
          ${uc > 0 ? `<span class="msg-unread">${uc > 9 ? '9+' : uc}</span>` : ''}
        </div>`;
      }).join('')}
      ${S.users.filter(u => u.id !== S.currentUser.id && !dms.find(d => d.partnerId === u.id)).map(u => `
        <div class="msg-channel-item ripple" onclick="startDM('${u.id}')" title="Message ${escHtml(u.name)}">
          <div class="sidebar-avatar-wrap">
            <div class="avatar sm" style="background:${u.color||userColor(u.name)}">${escHtml(u.initials||initials(u.name))}</div>
            <div class="presence-dot ${u.online?'online':'offline'}"></div>
          </div>
          <span class="msg-channel-name" style="color:var(--c-on-surf-var)">${escHtml(u.name)}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderSidebarHeader(mobileMode, sq) {
  return `
  <div class="msg-sidebar-header">
    ${mobileMode ? `<span class="ms filled" style="color:var(--c-primary);font-size:20px">forum</span>` : ''}
    <div class="msg-sidebar-search-wrap">
      <span class="ms sm" style="color:var(--c-on-surf-var);flex-shrink:0">search</span>
      <input class="msg-sidebar-search" type="text" placeholder="Search messages…"
        value="${escHtml(sq)}"
        oninput="onSidebarSearch(this.value)"
        onkeydown="if(event.key==='Escape'){this.value='';onSidebarSearch('')}" />
      ${sq ? `<div class="icon-btn ripple" style="width:20px;height:20px;flex-shrink:0" onclick="onSidebarSearch('');document.querySelector('.msg-sidebar-search').value=''"><span class="ms sm">close</span></div>` : ''}
    </div>
    <div class="icon-btn ripple msg-compose-btn" onclick="openComposeModal()" title="New message or DM" style="width:36px;height:36px;flex-shrink:0">
      <span class="ms sm">edit_note</span>
    </div>
  </div>`;
}

function onSidebarSearch(val) {
  S.sidebarSearchQuery = val;
  clearTimeout(window._sidebarSearchTimer);
  window._sidebarSearchTimer = setTimeout(() => {
    renderPageContent();
    // Restore focus + cursor position after re-render (the input gets replaced)
    const input = document.querySelector('.msg-sidebar-search');
    if (input) {
      input.focus();
      input.setSelectionRange(val.length, val.length);
    }
  }, 80);
}

function openSearchedMessage(channelId, msgId) {
  S.sidebarSearchQuery = '';
  selectChannel(channelId);
  setTimeout(() => {
    document.getElementById('msg-' + msgId)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Flash highlight
    const el = document.getElementById('msg-' + msgId);
    if (el) {
      el.style.transition = 'background .3s';
      el.style.background = 'rgba(0,87,184,.18)';
      setTimeout(() => { el.style.background = ''; }, 1200);
    }
  }, 400);
}

// ── Direct Messages ─────────────────────────
function startDM(userId) {
  if (userId === S.currentUser.id) return;
  // Check if DM already exists
  let ch = S.channels.find(c => c.type === 'dm' && c.partnerId === userId);
  if (!ch) {
    const partner = getUser(userId);
    if (!partner) return;
    ch = {
      id: 'dm-' + userId,
      name: partner.name,
      type: 'dm',
      partnerId: userId,
      members: [S.currentUser.id, userId],
      description: ''
    };
    S.channels.push(ch);
    saveState();
  }
  navigate('messages');
  S.mobileShowChannelList = false;
  selectChannel(ch.id);
}

// ── Compose Modal ────────────────────────────
function openComposeModal() {
  S.modal = { type: 'compose' };
  render();
}

function renderComposeModal() {
  const channels = S.channels.filter(c => c.type === 'channel');
  const others = S.users.filter(u => u.id !== S.currentUser.id);
  return `
  <div class="modal-backdrop" id="modal-backdrop" onclick="backdropClick(event)">
    <div class="modal" id="compose-modal" style="max-width:420px">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title">New Message</h2>
        <div class="modal-close ripple" onclick="closeModal()"><span class="ms">close</span></div>
      </div>
      <div style="padding:0 20px 8px">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--c-on-surf-var);margin-bottom:8px">Direct Message</div>
        ${others.map(u => `
          <div class="compose-user-row ripple" onclick="startDM('${u.id}');closeModal()">
            <div class="sidebar-avatar-wrap">
              <div class="avatar sm" style="background:${u.color||userColor(u.name)}">${escHtml(u.initials||initials(u.name))}</div>
              <div class="presence-dot ${u.online?'online':'offline'}"></div>
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:500">${escHtml(u.name)}</div>
              ${u.role ? `<div style="font-size:11px;color:var(--c-on-surf-var)">${u.role}</div>` : ''}
            </div>
            <span class="ms sm" style="color:var(--c-primary)">chat</span>
          </div>`).join('')}
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--c-on-surf-var);margin:16px 0 8px">Post to Channel</div>
        ${channels.map(ch => `
          <div class="compose-user-row ripple" onclick="selectChannel('${ch.id}');closeModal()">
            <span class="ms sm" style="color:var(--c-primary)">tag</span>
            <div style="flex:1;font-size:14px;font-weight:500">${escHtml(ch.name)}</div>
            <span class="ms sm" style="color:var(--c-on-surf-var)">chevron_right</span>
          </div>`).join('')}
      </div>
      <div style="height:env(safe-area-inset-bottom)"></div>
    </div>
  </div>`;
}

function renderMsgMain(ch) {
  const q = (S.msgSearchQuery || '').toLowerCase().trim();
  let msgs = S.messages.filter(m => m.channelId === ch.id && !m.threadId);
  if (q) msgs = msgs.filter(m => m.content.toLowerCase().includes(q) || m.attachment?.name?.toLowerCase().includes(q));
  S.messages.filter(m => m.channelId === ch.id).forEach(m => m._read = true);

  const groups = [];
  let lastDay = null, lastUserId = null, lastGroup = null;
  msgs.forEach(m => {
    const day = new Date(m.timestamp).toDateString();
    if (day !== lastDay) {
      groups.push({ type:'day', label: formatDayLabel(m.timestamp) });
      lastDay = day; lastUserId = null; lastGroup = null;
    }
    const isMine = m.userId === S.currentUser.id;
    if (m.userId !== lastUserId || q) {
      lastGroup = { type:'group', userId: m.userId, isMine, msgs: [] };
      groups.push(lastGroup);
      lastUserId = m.userId;
    }
    lastGroup.msgs.push(m);
  });

  const firestoreStatus = isFirestoreEnabled()
    ? `<div class="firebase-status-bar"><span class="firebase-status-dot connected"></span><span class="firebase-status-text">Live</span></div>`
    : '';

  // DM header: show partner name + online status
  const headerRight = ch.type === 'dm' ? (() => {
    const partner = getUser(ch.partnerId);
    return partner ? `
      <div class="sidebar-avatar-wrap" style="margin-right:4px">
        <div class="avatar sm" style="background:${partner.color||userColor(partner.name)}">${escHtml(partner.initials||initials(partner.name))}</div>
        <div class="presence-dot ${partner.online?'online':'offline'}"></div>
      </div>` : '';
  })() : '';

  return `
  <div class="msg-main">
    <div class="msg-header">
      ${headerRight}
      <span class="ms sm" style="color:var(--c-primary)">${ch.type==='dm'?'person':'tag'}</span>
      <div style="flex:1;min-width:0">
        <div class="msg-header-name">${escHtml(ch.name)}</div>
        ${ch.description ? `<div class="msg-header-desc">${escHtml(ch.description)}</div>` : ''}
      </div>
      ${firestoreStatus}
      <div class="icon-btn ripple" onclick="openChannelInfo('${ch.id}')" title="Info"><span class="ms sm">info</span></div>
    </div>
    <div class="msg-feed" id="msg-feed">
      ${groups.length === 0 ? `<div class="empty-state" style="flex:1;padding:60px 24px;text-align:center">
        <span class="ms" style="font-size:48px;color:var(--c-outline)">chat_bubble_outline</span>
        <p style="margin-top:12px;color:var(--c-on-surf-var)">No messages yet. Say hello! 👋</p>
      </div>` :
        groups.map(g => g.type === 'day' ?
          `<div class="msg-day-divider"><span class="msg-day-text">${g.label}</span></div>` :
          renderMsgGroup(g)
        ).join('')}
    </div>
    <div id="typing-indicator" class="typing-indicator" style="display:none"></div>
    ${renderMsgInput(ch.id)}
  </div>`;
}

function formatDayLabel(ts) {
  const d = new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (d >= today) return 'Today';
  if (d >= yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

function renderMsgGroup(g, searchQuery) {
  const u = getUser(g.userId);
  return `
  <div class="msg-group${g.isMine?' mine':''}">
    <div class="msg-group-avatar">${g.isMine ? '' : renderAvatar(g.userId)}</div>
    <div class="msg-group-content">
      ${!g.isMine ? `<div class="msg-sender">${escHtml(u?.name||'?')}<span class="msg-time-label">${formatTime(g.msgs[0].timestamp)}</span></div>` : ''}
      ${g.msgs.map(m => renderMsgBubble(m, g.isMine, searchQuery)).join('')}
    </div>
    ${g.isMine ? `<div class="msg-group-avatar">${renderAvatar(g.userId)}</div>` : ''}
  </div>`;
}

function renderMsgBubble(m, isMine, searchQuery) {
  const threadReplies = S.messages.filter(r => r.threadId === m.id);
  const reactions = m.reactions || {};
  const emojiHtml = Object.entries(reactions).filter(([,ids]) => ids.length).map(([emoji, ids]) =>
    `<div class="msg-reaction${ids.includes(S.currentUser.id)?' mine':''} ripple" onclick="toggleReaction('${m.id}','${emoji}')" title="${ids.map(id=>getUser(id)?.name).join(', ')}">${emoji}<span class="msg-reaction-count">${ids.length}</span></div>`
  ).join('');

  // Inline reply quote
  const replyQuote = m.replyTo ? (() => {
    const orig = S.messages.find(x => x.id === m.replyTo);
    if (!orig) return '';
    const origUser = getUser(orig.userId);
    const origContent = orig.attachment ? orig.attachment.name : orig.content;
    return `<div class="msg-reply-quote" onclick="document.getElementById('msg-${orig.id}')?.scrollIntoView({behavior:'smooth',block:'center'})">
      <div class="msg-reply-quote-author">${escHtml(origUser?.name||'?')}</div>
      <div class="msg-reply-quote-text">${orig.attachment ? '📎 ' : ''}${escHtml(origContent.slice(0,80))}${origContent.length>80?'…':''}</div>
    </div>`;
  })() : '';

  // Read receipts
  const readBy = (m.readBy || []).filter(uid => uid !== S.currentUser.id);
  const readAvatars = isMine && readBy.length
    ? `<div class="msg-read-receipts" title="Seen by ${readBy.map(uid=>getUser(uid)?.name).filter(Boolean).join(', ')}">
        ${readBy.slice(0,4).map(uid => {
          const u = getUser(uid);
          return u ? `<div class="avatar" style="width:14px;height:14px;font-size:7px;background:${u.color||'#666'}">${escHtml(u.initials||initials(u.name))}</div>` : '';
        }).join('')}
        ${readBy.length > 4 ? `<span style="font-size:10px;color:var(--c-on-surf-var)">+${readBy.length-4}</span>` : ''}
      </div>`
    : '';

  // Attachment rendering
  const attachHtml = m.attachment ? renderMsgAttachment(m.attachment) : '';

  // Link preview rendering
  const linkPreviewHtml = m.linkPreview ? renderLinkPreview(m.linkPreview) : '';

  // Search highlight
  const contentHtml = searchQuery
    ? highlightText(parseMessageContent(m.content), searchQuery)
    : parseMessageContent(m.content);

  return `
  <div class="msg-bubble-wrap${isMine?' mine':''}" id="msgwrap-${m.id}">
    ${replyQuote}
    <div class="msg-bubble${m._optimistic?' optimistic':''}${searchQuery?' search-highlight':''}" id="msg-${m.id}">
      ${attachHtml}
      ${m.content ? `<span>${contentHtml}</span>` : ''}
      ${m.edited?'<span style="font-size:11px;opacity:.6;margin-left:6px">(edited)</span>':''}
    </div>
    ${linkPreviewHtml}
    ${emojiHtml ? `<div class="msg-reactions">${emojiHtml}</div>` : ''}
    ${readAvatars}
    ${threadReplies.length ? `<div class="msg-thread-count" onclick="openThread('${m.id}')"><span class="ms">forum</span>${threadReplies.length} ${threadReplies.length===1?'reply':'replies'} · View thread</div>` : ''}
    <div class="msg-actions">
      <div class="msg-action-btn ripple" onclick="startInlineReply('${m.id}')" title="Reply"><span class="ms sm">reply</span></div>
      <div class="msg-action-btn ripple" onclick="openEmojiPicker('${m.id}')" title="React"><span style="font-size:15px">😊</span></div>
      <div class="msg-action-btn ripple" onclick="openThread('${m.id}')" title="Thread"><span class="ms sm">forum</span></div>
      ${isMine ? `<div class="msg-action-btn ripple" onclick="startInlineEdit('msgwrap-${m.id}','${m.id}')" title="Edit"><span class="ms sm">edit</span></div>` : ''}
      ${(isMine || S.currentUser?.role === 'admin') ? `
        <div class="msg-action-btn ripple" onclick="deleteMessage('${m.id}')" title="${isMine ? 'Delete' : 'Delete (Admin)'}">
          <span class="ms sm" style="color:var(--c-error)">delete</span>
        </div>` : ''}
    </div>
    <div class="msg-timestamp-tooltip">${formatTime(m.timestamp)}</div>
  </div>`;
}

function renderMsgAttachment(att) {
  if (!att) return '';
  if (att.type && att.type.startsWith('image/')) {
    return `<div class="msg-attachment-img-wrap">
      <img class="msg-attachment-img" src="${escHtml(att.dataUrl||att.url||'')}" alt="${escHtml(att.name)}"
        onclick="openImageLightbox('${escHtml(att.dataUrl||att.url||'')}','${escHtml(att.name)}')"
        loading="lazy" />
      <div class="msg-attachment-label">${escHtml(att.name)} · ${formatSize(att.size||0)}</div>
    </div>`;
  }
  const icon = getFileIcon(att.name);
  return `<div class="msg-attachment-file ripple" onclick="downloadAttachment('${escHtml(att.dataUrl||att.url||'')}','${escHtml(att.name)}')">
    <span class="ms" style="font-size:28px;color:var(--c-primary)">${icon}</span>
    <div class="msg-attachment-file-info">
      <div class="msg-attachment-file-name">${escHtml(att.name)}</div>
      <div class="msg-attachment-file-meta">${formatSize(att.size||0)}</div>
    </div>
    <span class="ms sm" style="color:var(--c-on-surf-var);margin-left:auto">download</span>
  </div>`;
}

function renderLinkPreview(preview) {
  if (!preview || !preview.title) return '';
  return `<div class="msg-link-preview" onclick="window.open('${escHtml(preview.url)}','_blank')">
    ${preview.image ? `<img class="msg-link-preview-img" src="${escHtml(preview.image)}" alt="" loading="lazy" onerror="this.style.display='none'" />` : ''}
    <div class="msg-link-preview-body">
      <div class="msg-link-preview-domain">${escHtml(preview.domain||new URL(preview.url).hostname)}</div>
      <div class="msg-link-preview-title">${escHtml(preview.title)}</div>
      ${preview.description ? `<div class="msg-link-preview-desc">${escHtml(preview.description.slice(0,120))}${preview.description.length>120?'…':''}</div>` : ''}
    </div>
  </div>`;
}

function highlightText(html, query) {
  if (!query) return html;
  // Only highlight in text nodes (simple approach: use a regex on the final HTML)
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\</body>');
  return html.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark class="msg-search-match">$1</mark>');
}

function getFileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  const map = { pdf:'picture_as_pdf', doc:'description', docx:'description', xls:'table_chart', xlsx:'table_chart',
    ppt:'slideshow', pptx:'slideshow', zip:'folder_zip', rar:'folder_zip', mp4:'videocam', mov:'videocam',
    mp3:'music_note', wav:'music_note', txt:'article', csv:'table_chart' };
  return map[ext] || 'attach_file';
}

function downloadAttachment(dataUrl, name) {
  if (!dataUrl) return;
  const a = document.createElement('a');
  a.href = dataUrl; a.download = name;
  a.click();
}

function openImageLightbox(src, name) {

    <div class="img-lightbox-backdrop" onclick="this.parentElement.remove()"></div>

function toggleComposeEmoji(channelId) {
  S.composeEmojiChannel = S.composeEmojiChannel === channelId ? null : channelId;
  S._composeEmojiCat = S._composeEmojiCat || 0;
  S._composeEmojiSearch = '';
  const inputArea = document.querySelector('.msg-input-area');
  if (inputArea) {
    const existing = inputArea.querySelector('.compose-emoji-picker');
    if (existing) { existing.remove(); S.composeEmojiChannel = null; return; }
    if (S.composeEmojiChannel) {
      inputArea.insertAdjacentHTML('afterbegin', renderComposeEmojiPicker(channelId));
      setTimeout(() => inputArea.querySelector('.compose-emoji-search')?.focus(), 50);
    }
  } else {
    renderPageContent();
  }
}

function renderComposeEmojiPicker(channelId) {
  const cat = S._composeEmojiCat || 0;
  const searchQ = (S._composeEmojiSearch || '').toLowerCase();
  const cats = EMOJI_CATEGORIES;
  const allEmojis = cats.flatMap(c => c.emojis);
  const displayEmojis = searchQ
    ? allEmojis.filter(e => e.toLowerCase().includes(searchQ) || true).slice(0, 80)
    : cats[cat]?.emojis || [];
  // When searching, just show all emojis filtered by search (since emojis don't have text names in this impl, show all)
  const emojiList = searchQ ? allEmojis : displayEmojis;

  return `<div class="compose-emoji-picker" id="compose-emoji-picker" onmousedown="event.preventDefault()">
    <div class="compose-emoji-search-wrap">
      <span class="ms sm" style="color:var(--c-on-surf-var);font-size:16px">search</span>
      <input class="compose-emoji-search" placeholder="Search emoji…" value="${escHtml(S._composeEmojiSearch||'')}"
        oninput="composeEmojiSearch(this.value,'${channelId}')" autocomplete="off" />
      ${S._composeEmojiSearch ? `<span class="ms sm" style="cursor:pointer;color:var(--c-on-surf-var)" onclick="composeEmojiSearch('','${channelId}')">close</span>` : ''}
    </div>
    ${!searchQ ? `<div class="compose-emoji-cats">
      ${cats.map((c,i) => `<div class="compose-emoji-cat-btn${i===cat?' active':''}" onmousedown="event.preventDefault();setComposeEmojiCat(${i},'${channelId}')" title="${c.name}">${c.icon}</div>`).join('')}
    </div>` : ''}
    <div class="compose-emoji-grid">
      ${emojiList.map(e => `<div class="compose-emoji-item" onmousedown="event.preventDefault();insertEmojiIntoCompose('${channelId}','${e}')" title="${e}">${e}</div>`).join('')}
    </div>

}

function composeEmojiSearch(val, channelId) {
  S._composeEmojiSearch = val;
  const picker = document.getElementById('compose-emoji-picker');
  if (picker) { picker.outerHTML = renderComposeEmojiPicker(channelId); }

  const inputArea = document.querySelector('.msg-input-area');
  if (inputArea) {

function setComposeEmojiCat(idx, channelId) {
  S._composeEmojiCat = idx;
  const inputArea = document.querySelector('.msg-input-area');
  if (inputArea) {
    const old = inputArea.querySelector('.compose-emoji-picker');
    if (old) old.outerHTML = renderComposeEmojiPicker(channelId);
  }
}

function insertEmojiIntoCompose(channelId, emoji) {
  const input = document.getElementById('msg-input-' + channelId);
  if (input) {
    const start = input.selectionStart;
    const end = input.selectionEnd;
    const before = input.value.slice(0, start);
    const after = input.value.slice(end);
    input.value = before + emoji + after;
    S.msgInput[channelId] = input.value;
    const pos = start + emoji.length;
    input.setSelectionRange(pos, pos);
    input.focus();
    // Enable send
    const sendBtn = input.closest('.msg-input-area')?.querySelector('.msg-send-btn');
    if (sendBtn) sendBtn.disabled = !input.value.trim();
  }
}

function insertEmoji(channelId) {
  // Legacy: kept for compatibility, now opens proper picker
  toggleComposeEmoji(channelId);
}

function renderTaskPicker() {

function selectChannel(channelId) {
  S.selectedChannelId = channelId;
  S.activeThreadMsgId = null;
  S.notifPanelOpen = false;
  S.mobileShowChannelList = false;
  S._typingUsers = [];
  saveState();
  // Subscribe to new Firestore thread
  if (isFirestoreEnabled()) fsSubscribeThread(channelId);
  render();
  setTimeout(() => {
    const feed = document.getElementById('msg-feed');
    if (feed) feed.scrollTop = feed.scrollHeight;
    // Mark read in Firestore
    if (isFirestoreEnabled()) fsMarkAllRead(channelId);
  }, 80);

function msgInput(e, channelId) {
  const val = e.target.value;
  S.msgInput[channelId] = val;
  const sendBtn = e.target.closest('.msg-input-area')?.querySelector('.msg-send-btn');
  if (sendBtn) sendBtn.disabled = !val.trim();
  // Typing indicator
  if (isFirestoreEnabled() && val.trim()) fsSetTyping(channelId, true);

  const cursor = e.target.selectionStart;
  const textBefore = val.slice(0, cursor);

  // @mention detection
  const atMatch = textBefore.match(/@([\w ]*)$/);
  if (atMatch) {
    S.mentionQuery = atMatch[1];
    S.mentionIndex = 0;
    S.taskPickerQuery = null;
    const inputArea = e.target.closest('.msg-input-area');
    if (inputArea) {
      document.getElementById('task-picker')?.remove();
      const existing = inputArea.querySelector('.mention-popup');
      if (!existing) inputArea.insertAdjacentHTML('afterbegin', renderMentionPopup());
      else existing.outerHTML = renderMentionPopup();
    }
    return;
  }
  S.mentionQuery = null;
  document.querySelector('.mention-popup')?.remove();

  // # task picker detection (match # at word boundary)
  const hashMatch = textBefore.match(/#([\w ]*)$/);
  if (hashMatch) {
    S.taskPickerQuery = hashMatch[1];
    S.taskPickerIndex = 0;
    const inputArea = e.target.closest('.msg-input-area');
    if (inputArea) {
      const existing = document.getElementById('task-picker');
      const newEl = document.createElement('div');
      newEl.innerHTML = renderTaskPicker();
      if (!existing) inputArea.insertAdjacentHTML('afterbegin', renderTaskPicker());
      else existing.outerHTML = renderTaskPicker();
    }
    return;
  }
  S.taskPickerQuery = null;
  document.getElementById('task-picker')?.remove();
}

function msgKeyDown(e, channelId) {
  // Handle @mention navigation
  if (S.mentionQuery !== null) {
    const filtered = S.users.filter(u => u.name.toLowerCase().includes(S.mentionQuery.toLowerCase()) && u.id !== S.currentUser.id);
    if (filtered.length) {
      if (e.key === 'ArrowDown') { e.preventDefault(); S.mentionIndex = (S.mentionIndex+1) % filtered.length; document.querySelector('.mention-popup')?.replaceWith(htmlToEl(renderMentionPopup())); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); S.mentionIndex = (S.mentionIndex-1+filtered.length) % filtered.length; document.querySelector('.mention-popup')?.replaceWith(htmlToEl(renderMentionPopup())); return; }
      if ((e.key === 'Enter' || e.key === 'Tab') && filtered.length) { e.preventDefault(); insertMention(filtered[S.mentionIndex]?.id); return; }
    }
    if (e.key === 'Escape') { S.mentionQuery = null; document.querySelector('.mention-popup')?.remove(); return; }
  }
  // Handle # task picker navigation
  if (S.taskPickerQuery !== null) {
    const q = S.taskPickerQuery.toLowerCase();
    const filtered = S.tasks.filter(t => t.status !== 'done' && (q === '' || t.title.toLowerCase().includes(q))).slice(0, 7);
    if (filtered.length) {
      if (e.key === 'ArrowDown') { e.preventDefault(); S.taskPickerIndex = (S.taskPickerIndex+1) % filtered.length; document.getElementById('task-picker')?.replaceWith(htmlToEl(renderTaskPicker())); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); S.taskPickerIndex = (S.taskPickerIndex-1+filtered.length) % filtered.length; document.getElementById('task-picker')?.replaceWith(htmlToEl(renderTaskPicker())); return; }
      if ((e.key === 'Enter' || e.key === 'Tab') && filtered.length) { e.preventDefault(); insertTaskRef(filtered[S.taskPickerIndex]?.id); return; }
    }
    if (e.key === 'Escape') { S.taskPickerQuery = null; document.getElementById('task-picker')?.remove(); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(channelId);
  }
}

function htmlToEl(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstChild;
}

function insertMention(userId) {
  const u = getUser(userId);
  if (!u) return;
  S.mentionQuery = null;
  document.querySelector('.mention-popup')?.remove();
  const input = document.querySelector('[id^="msg-input-"]');
  if (!input) return;
  const val = input.value;
  const cursor = input.selectionStart;
  const textBefore = val.slice(0, cursor);
  const textAfter = val.slice(cursor);
  const replaced = textBefore.replace(/@[\w ]*$/, `@${u.name} `);
  input.value = replaced + textAfter;
  S.msgInput[S.selectedChannelId] = input.value;
  input.focus();
}

function insertAtMention(channelId) {
  const input = document.getElementById('msg-input-'+channelId);
  if (!input) return;
  input.value += '@';
  input.dispatchEvent(new Event('input'));
  input.focus();
}

function insertTaskTrigger(channelId) {
  const input = document.getElementById('msg-input-'+channelId);
  if (!input) return;
  input.value += '#';
  input.dispatchEvent(new Event('input'));
  input.focus();
}

function insertTaskRef(taskId) {
  if (!taskId) return;
  const t = getTask(taskId);
  if (!t) return;
  S.taskPickerQuery = null;
  document.getElementById('task-picker')?.remove();
  const input = document.querySelector('[id^="msg-input-"]');
  if (!input) return;
  const val = input.value;
  const cursor = input.selectionStart;
  const textBefore = val.slice(0, cursor);
  const textAfter = val.slice(cursor);
  // Replace the #query trigger with the task token
  const replaced = textBefore.replace(/#[\w ]*$/, `[task:${t.id}] `);
  input.value = replaced + textAfter;
  S.msgInput[S.selectedChannelId] = input.value;
  // Enable send
  const sendBtn = input.closest('.msg-input-area')?.querySelector('.msg-send-btn');
  if (sendBtn) sendBtn.disabled = !input.value.trim();
  input.focus();
  input.selectionStart = input.selectionEnd = replaced.length;
}


function closeMentionPopup() {
  setTimeout(() => { S.mentionQuery = null; document.querySelector('.mention-popup')?.remove(); }, 150);
}

function closeAllPopups() {
  setTimeout(() => {
    S.mentionQuery = null;
    S.taskPickerQuery = null;
    document.querySelector('.mention-popup')?.remove();
    document.getElementById('task-picker')?.remove();
  }, 150);

function sendMessage(channelId) {
  const input = document.getElementById('msg-input-'+channelId);
  const content = (input?.value || S.msgInput[channelId] || '').trim();
  if (!content) return;

  // If Firestore is enabled, send via Firebase (onSnapshot will add to S.messages)
  if (isFirestoreEnabled()) {
    const replyToId = S._replyToMsgId;
    S._replyToMsgId = null;
    document.querySelector('.reply-banner')?.remove();
    S.msgInput[channelId] = '';
    if (input) input.value = '';
    fsSendMessage(channelId, content, replyToId).catch(e => toast('Send failed: ' + e.message, 'error'));
    // Optimistic local append
    const msg = { id: uid(), channelId, userId: S.currentUser.id, content, timestamp: Date.now(), reactions: {}, threadId: null, replyTo: replyToId, edited: false, readBy: [S.currentUser.id], _read: true, _optimistic: true };
    S.messages.push(msg);
    const feed = document.getElementById('msg-feed');
    if (feed) { renderPageContent(); feed.scrollTop = feed.scrollHeight; }
    notifyMentions(channelId, content);
    triggerLinkUnfurl(msg);
    enableUndoSend(msg.id, channelId);
    return;
  }

  // Offline / localStorage path
  const replyToIdLocal = S._replyToMsgId;
  S._replyToMsgId = null;
  document.querySelector('.reply-banner')?.remove();
  const msg = {
    id: uid(), channelId, userId: S.currentUser.id,
    content, timestamp: Date.now(), reactions: {}, threadId: null,
    replyTo: replyToIdLocal || null, edited: false, readBy: [S.currentUser.id], _read: true
  };
  S.messages.push(msg);
  S.msgInput[channelId] = '';
  if (input) input.value = '';
  saveState();
  enableUndoSend(msg.id, channelId);
  // Detect task refs and log them
  const taskRefs = [...content.matchAll(/\[task:([a-z0-9]+)\]/gi)].map(m => m[1]);
  if (taskRefs.length) {
    taskRefs.forEach(tid => {
      const t = getTask(tid);
      if (t) addInAppNotif(`${S.currentUser.name} linked task "${t.title}" in #${getChannel(channelId)?.name}`, 'task', channelId);
    });
  }

  // Notify mentioned users (in-app + browser + FCM)
  const mentionedNames = [...content.matchAll(/@([\w]+(?:\s[\w]+)?)/g)].map(m => m[1]);
  mentionedNames.forEach(name => {
    const u = S.users.find(u => u.name.toLowerCase().startsWith(name.toLowerCase()) && u.id !== S.currentUser.id);
    if (u) {
      const notifText = `${S.currentUser.name} mentioned you in #${getChannel(channelId)?.name}`;
      addInAppNotif(notifText, 'mention', channelId);
      sendBrowserNotif(`${S.currentUser.name} mentioned you`, content, 'mention-'+u.id);
      // FCM push — sends to the current device token (in a real app, you'd look up the user's token from DB)
      if (window._fcmToken) {
        sendFCMPush(window._fcmToken, `${S.currentUser.name} mentioned you`, content.slice(0,100), { type:'mention', channelId });
      }
    }
  });
  // Re-render messages area
  const feed = document.getElementById('msg-feed');
  if (feed) { renderPageContent(); feed.scrollTop = feed.scrollHeight; }
  triggerLinkUnfurl(msg);
  notifyMentions(channelId, content);
}

function startInlineEdit(wrapId, msgId) {
  const m = S.messages.find(x => x.id === msgId);
  if (!m || m.userId !== S.currentUser.id) return;
  const bubble = document.getElementById('msg-' + msgId);
  if (!bubble) return;

  const original = m.content;
  const actions = bubble.parentElement?.querySelector('.msg-actions');
  if (actions) actions.style.display = 'none';

  bubble.innerHTML = `
    <div class="msg-inline-edit-wrap">
      <textarea class="msg-inline-edit-input" id="inline-edit-${msgId}">${escHtml(original)}</textarea>
      <div class="msg-inline-edit-actions">
        <span style="font-size:11px;color:var(--c-on-surf-var)">Enter to save · Esc to cancel</span>
        <button class="btn btn-text btn-sm ripple" onclick="cancelInlineEdit('${msgId}','${escHtml(original).replace(/'/g,'\\\'')}')" style="padding:4px 10px">Cancel</button>
        <button class="btn btn-tonal btn-sm ripple" onclick="commitInlineEdit('${msgId}')" style="padding:4px 10px">Save</button>
      </div>
    </div>`;

  const ta = document.getElementById('inline-edit-' + msgId);
  if (ta) {
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitInlineEdit(msgId); }
      if (e.key === 'Escape') { cancelInlineEdit(msgId, original); }
    });
    // Auto-resize
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
    ta.style.height = ta.scrollHeight + 'px';
  }
}

function cancelInlineEdit(msgId, original) {
  const m = S.messages.find(x => x.id === msgId);
  const bubble = document.getElementById('msg-' + msgId);
  if (!bubble) return;
  bubble.innerHTML = `<span>${parseMessageContent(original || (m && m.content) || '')}</span>${m?.edited ? '<span style="font-size:11px;opacity:.6;margin-left:6px">(edited)</span>' : ''}`;
  const actions = bubble.parentElement?.querySelector('.msg-actions');
  if (actions) actions.style.display = '';
}

function commitInlineEdit(msgId) {
  const m = S.messages.find(x => x.id === msgId);
  if (!m) return;
  const ta = document.getElementById('inline-edit-' + msgId);
  if (!ta) return;
  const trimmed = ta.value.trim();
  if (!trimmed) { cancelInlineEdit(msgId, m.content); return; }
  if (trimmed === m.content) { cancelInlineEdit(msgId, m.content); return; }

  m.content = trimmed;
  m.edited = true;
  saveState();

  const bubble = document.getElementById('msg-' + msgId);
  if (bubble) {
    bubble.innerHTML = `<span>${parseMessageContent(trimmed)}</span><span style="font-size:11px;opacity:.6;margin-left:6px">(edited)</span>`;
    const actions = bubble.parentElement?.querySelector('.msg-actions');
    if (actions) actions.style.display = '';
  }

  if (isFirestoreEnabled() && _firestore) {
    try {
      _firestore.collection('threads').doc(m.channelId)
        .collection('messages').doc(m.id)
        .update({ content: trimmed, edited: true });
    } catch(e) {}
  }
  toast('Message updated ✓', 'success', 1500);
}

// Undo send — called from sendMessage/sendMessageWithAttachment
const _undoSendRegistry = {};

function enableUndoSend(msgId, channelId) {
  _undoSendRegistry[msgId] = false;

function notifyMentions(channelId, content) {
  const mentionedNames = [...content.matchAll(/@([\w]+(?:\s[\w]+)?)/g)].map(m => m[1]);
  mentionedNames.forEach(name => {
    const u = S.users.find(u => u.name.toLowerCase().startsWith(name.toLowerCase()) && u.id !== S.currentUser.id);
    if (u) {
      const notifText = `${S.currentUser.name} mentioned you in #${getChannel(channelId)?.name}`;
      addInAppNotif(notifText, 'mention', channelId);
      sendBrowserNotif(`${S.currentUser.name} mentioned you`, content, 'mention-'+u.id);
      if (window._fcmToken) sendFCMPush(window._fcmToken, `${S.currentUser.name} mentioned you`, content.slice(0,100), { type:'mention', channelId });
    }
  });
}

function toggleReaction(msgId, emoji) {
  const m = S.messages.find(x => x.id === msgId);
  if (!m) return;
  if (!m.reactions[emoji]) m.reactions[emoji] = [];
  const idx = m.reactions[emoji].indexOf(S.currentUser.id);
  if (idx >= 0) m.reactions[emoji].splice(idx, 1);
  else m.reactions[emoji].push(S.currentUser.id);
  saveState();
  renderPageContent();
}

function deleteMessage(msgId) {
  const m = S.messages.find(x => x.id === msgId);
  if (!m) return;
  const isAdmin = S.currentUser?.role === 'admin';
  if (m.userId !== S.currentUser.id && !isAdmin) return;

  // Soft-delete: stash message then show undo toast
  const idx = S.messages.indexOf(m);
  const stashed = JSON.parse(JSON.stringify(m));
  const threadStash = S.messages.filter(x => x.threadId === msgId).map(x => JSON.parse(JSON.stringify(x)));

  S.messages = S.messages.filter(x => x.id !== msgId && x.threadId !== msgId);
  saveState();
  renderPageContent();

  // Sync deletion to Firestore if enabled
  if (isFirestoreEnabled() && _firestore) {
    try {
      _firestore.collection('threads').doc(m.channelId).collection('messages').doc(msgId).delete();
    } catch(e) {}
  }

  let undone = false;
  const toastId = 'del-' + msgId;
  showUndoToast('Message deleted', toastId, () => {
    if (undone) return;
    undone = true;
    // Restore in original position
    S.messages.splice(idx, 0, stashed, ...threadStash);
    saveState();
    renderPageContent();
    toast('Message restored ↩️');
  });
}

let _undoToastTimer = null;
function showUndoToast(label, id, onUndo) {
  const existing = document.getElementById('toast-' + id);
  if (existing) existing.remove();
  clearTimeout(_undoToastTimer);

  const el = document.createElement('div');
  el.className = 'toast toast-undo';
  el.id = 'toast-' + id;
  el.innerHTML = `
    <span class="ms sm">delete</span>
    <span style="flex:1">${escHtml(label)}</span>
    <button class="toast-undo-btn" onclick="this.closest('.toast-undo')._undoCallback()">Undo</button>`;
  el._undoCallback = () => { el.remove(); onUndo(); };
  document.getElementById('toasts')?.appendChild(el);

  _undoToastTimer = setTimeout(() => {
    if (el.parentElement) el.remove();
  }, 5000);
}

function handleMsgFile(input, channelId) {
  const f = input.files[0];
  if (!f) return;
  input.value = '';

  const MAX_SIZE = 10 * 1024 * 1024; // 10MB
  if (f.size > MAX_SIZE) {
    toast('File too large (max 10MB)', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const attachment = { name: f.name, type: f.type, size: f.size, dataUrl: e.target.result };
    sendMessageWithAttachment(channelId, attachment);
  };
  reader.readAsDataURL(f);
}

function sendMessageWithAttachment(channelId, attachment) {
  const input = document.getElementById(`msg-input-${channelId}`);
  const content = (input?.value || S.msgInput[channelId] || '').trim();

  const replyToId = S._replyToMsgId;
  S._replyToMsgId = null;
  document.querySelector('.reply-banner')?.remove();

  const msg = {
    id: uid(), channelId, userId: S.currentUser.id,
    content, attachment, timestamp: Date.now(),
    reactions: {}, replyTo: replyToId || null,
    edited: false, readBy: [S.currentUser.id], _read: true, _optimistic: true
  };
  S.messages.push(msg);
  if (input) input.value = '';
  S.msgInput[channelId] = '';
  saveState();
  renderPageContent();
  setTimeout(() => { const feed = document.getElementById('msg-feed'); if (feed) feed.scrollTop = feed.scrollHeight; }, 50);

  if (isFirestoreEnabled()) {
    fsSendMessage(channelId, content, replyToId, attachment).catch(err => {
      console.warn('Firestore send failed:', err);
    });
  }
  if (content) notifyMentions(channelId, content);
  toast('File sent 📎', 'success', 1500);
}

// ── Link Unfurl ─────────────────────────────
const _linkCache = {};
const URL_REGEX = /https?:\/\/[^\s<>"]+[^\s<>".,:;!?)]/g;

function extractFirstUrl(text) {
  const m = text.match(URL_REGEX);
  return m ? m[0] : null;
}

async function fetchLinkPreview(url, msgId) {
  if (_linkCache[url] !== undefined) {
    if (_linkCache[url] && msgId) applyLinkPreview(msgId, _linkCache[url]);
    return;
  }
  _linkCache[url] = null; // mark pending

  try {
    // Use allorigins.win CORS proxy to fetch OG tags
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(5000) });
    if (!res.ok) return;
    const data = await res.json();
    const html = data.contents || '';

    const getTag = (prop) => {
      const m = html.match(new RegExp('<meta[^>]+(?:property|name)=["\']' + prop.replace(/:/g,'[:/]') + '["\'][^>]+content=["\']([^"\']+)["\']', 'i'))
        || html.match(new RegExp('<meta[^>]+content=["\']([^"\']+)["\'][^>]+(?:property|name)=["\']' + prop.replace(/:/g,'[:/]') + '["\']', 'i'));
      return m ? m[1] : null;
    };

    const titleEl = html.match(/<title[^>]*>([^<]+)<\/title>/i);
    const preview = {
      url,
      title: getTag('og:title') || (titleEl ? titleEl[1].trim() : null),
      description: getTag('og:description') || getTag('description'),
      image: getTag('og:image'),
      domain: new URL(url).hostname.replace('www.', '')
    };

    if (!preview.title) return;
    _linkCache[url] = preview;
    if (msgId) applyLinkPreview(msgId, preview);
  } catch(e) {
    // Silently fail
  }
}

function applyLinkPreview(msgId, preview) {
  const m = S.messages.find(x => x.id === msgId);
  if (!m) return;
  m.linkPreview = preview;
  // Patch the DOM without full re-render
  const wrap = document.getElementById(`msgwrap-${msgId}`);
  if (wrap) {
    const existing = wrap.querySelector('.msg-link-preview');
    if (existing) existing.remove();
    const previewHtml = renderLinkPreview(preview);
    if (previewHtml) {
      const temp = document.createElement('div');
      temp.innerHTML = previewHtml;
      const bubble = wrap.querySelector('.msg-bubble');
      if (bubble) bubble.insertAdjacentElement('afterend', temp.firstElementChild);
    }
  }
}

function triggerLinkUnfurl(msg) {
  if (msg.linkPreview || msg.attachment) return;
  const url = extractFirstUrl(msg.content || '');
  if (!url) return;
  // Delay slightly so message renders first
  setTimeout(() => fetchLinkPreview(url, msg.id), 300);
}

// FIREBASE FUNCTIONS
// ═══════════════════════════
function loadFirebaseConfig() {
  try { return JSON.parse(localStorage.getItem('blurrd_firebase') || '{}'); } catch(e) { return {}; }
}

function saveFirebaseConfig(cfg) {
  localStorage.setItem('blurrd_firebase', JSON.stringify(cfg));
}

function updateFirebaseConfig() {
  const keys = ['apiKey','authDomain','projectId','messagingSenderId','appId','vapidKey','serverKey'];
  const cfg = {};
  keys.forEach(k => { const el = document.getElementById('fcm-'+k); if (el) cfg[k] = el.value.trim(); });
  saveFirebaseConfig(cfg);
}

async function connectFirebase() {
  const cfg = loadFirebaseConfig();
  const required = ['apiKey','projectId','messagingSenderId','appId'];
  if (required.some(k => !cfg[k])) {
    toast('Please fill in all required Firebase config fields', 'error');
    return;
  }
  if (!cfg.vapidKey) {
    toast('VAPID key is required for push notifications', 'error');
    return;
  }
  try {
    toast('Connecting to Firebase…');
    // Dynamically load Firebase SDK
    await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js');

    // Init or get existing app
    if (typeof firebase === 'undefined') throw new Error('Firebase SDK failed to load');
    let app;
    try { app = firebase.app(); } catch(e) {
      app = firebase.initializeApp({
        apiKey: cfg.apiKey, authDomain: cfg.authDomain,
        projectId: cfg.projectId, messagingSenderId: cfg.messagingSenderId, appId: cfg.appId
      });
    }

    const messaging = firebase.messaging();

    // Request notification permission
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') throw new Error('Notification permission denied');

    // Register service worker
    let swReg;
    try {
      swReg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
    } catch(e) {
      // Fallback: try to use existing SW or create an inline one
      swReg = await navigator.serviceWorker.ready;
    }

    // Get FCM token
    const token = await messaging.getToken({ vapidKey: cfg.vapidKey, serviceWorkerRegistration: swReg });
    window._fcmToken = token;
    window._fcmMessaging = messaging;

    // Handle foreground messages
    messaging.onMessage(payload => {
      const { title, body } = payload.notification || {};
      if (title) {
        addNotification({ type: 'message', text: `${title}: ${body}` });
        toast(`🔔 ${title}: ${body}`);
      }
    });

    saveState();
    // Sync config to integrations store so Firestore section can read it
    setIntegration('firebase', cfg);
    toast('Firebase connected! Push notifications active ⛳');
    renderPageContent();
  } catch(e) {
    console.error('Firebase init error:', e);
    toast(`Firebase error: ${e.message}`, 'error');
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function sendFCMPush(targetToken, title, body, data = {}) {
  const cfg = loadFirebaseConfig();
  if (!cfg.serverKey || !targetToken) return;
  try {
    await fetch('https://fcm.googleapis.com/fcm/send', {
      method: 'POST',
      headers: { 'Authorization': `key=${cfg.serverKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: targetToken,
        notification: { title, body, icon: '/icon-192.png', click_action: '/' },
        data: { ...data, url: window.location.href }
      })
    });
  } catch(e) { console.warn('FCM send error:', e); }
}

async function testPushNotification() {
  if (!window._fcmToken) {
    toast('Connect Firebase first', 'error');
    return;
  }
  const cfg = loadFirebaseConfig();
  if (!cfg.serverKey) {
    toast('Add Server Key to send pushes', 'error');
    return;
  }
  await sendFCMPush(window._fcmToken, 'BLURRD Links ⛳', 'Test notification — push is working!', { type: 'test' });
  toast('Test push sent! Check your notifications.');
}

function copyFCMToken() {
  if (!window._fcmToken) return;
  navigator.clipboard.writeText(window._fcmToken).then(() => toast('Token copied to clipboard'));
}

function downloadSWFile() {
  const cfg = loadFirebaseConfig();
  const swContent = `/* firebase-messaging-sw.js — BLURRD Links Push Notifications
   Host this file at the ROOT of your domain (same level as index.html)
   e.g. https://yourdomain.com/firebase-messaging-sw.js
*/
importScripts('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js');
importScripts('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js');

firebase.initializeApp({
  apiKey: "${cfg.apiKey || 'YOUR_API_KEY'}",
  authDomain: "${cfg.authDomain || 'YOUR_PROJECT.firebaseapp.com'}",
  projectId: "${cfg.projectId || 'YOUR_PROJECT_ID'}",
  messagingSenderId: "${cfg.messagingSenderId || 'YOUR_SENDER_ID'}",
  appId: "${cfg.appId || 'YOUR_APP_ID'}"
});

const messaging = firebase.messaging();

// Handle background messages
messaging.onBackgroundMessage(payload => {
  const { title = 'BLURRD Links', body = 'You have a new notification' } = payload.notification || {};
  self.registration.showNotification(title, {
    body,
    icon: payload.notification?.icon || '/icon-192.png',
    badge: '/badge-72.png',
    data: payload.data || {},
    actions: [
      { action: 'open', title: 'Open App' },
      { action: 'snooze', title: 'Snooze 15 min' }
    ],
    requireInteraction: false,
    tag: payload.data?.tag || 'blurrd-notif'
  });
});

// Notification click handler with snooze support
self.addEventListener('notificationclick', e => {
  e.notification.close();
  if (e.action === 'snooze') {
    // Reschedule via background sync or just re-show after 15 min
    e.waitUntil(
      new Promise(resolve => {
        setTimeout(() => {
          self.registration.showNotification(e.notification.title, {
            body: '[Snoozed] ' + e.notification.body,
            icon: e.notification.icon
          });
          resolve();
        }, 15 * 60 * 1000);
      })
    );
    return;
  }
  // Open or focus the app
  e.waitUntil(
    clients.matchAll({ type: 'window', includeUncontrolled: true }).then(windowClients => {
      for (const client of windowClients) {
        if (client.url.includes(self.location.origin) && 'focus' in client) {
          return client.focus();
        }
      }
      return clients.openWindow(e.notification.data?.url || '/');
    })
  );
});

self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
`;

  const blob = new Blob([swContent], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'firebase-messaging-sw.js'; a.click();
  URL.revokeObjectURL(url);
  toast('firebase-messaging-sw.js downloaded — host it at your domain root');
}

function saveNewUser() {
  const name = document.getElementById('new-user-name')?.value?.trim();
  if (!name) { toast('Please enter a name', 'error'); return; }
  const email = document.getElementById('new-user-email')?.value?.trim() || '';
  const sendInvite = document.getElementById('new-user-send-invite')?.checked !== false;

  // Generate invite token
  const inviteToken = uid() + uid();
  const u = {
    id: uid(), name, email, role: _newUserRole || 'member',
    color: _newUserColor || COLORS[0].value,
    initials: initials(name), online: false,
    inviteToken, invitePending: true
  };
  S.users.push(u);

  closeModal();

  if (sendInvite && email) {

function saveShopifyConfig() {
  const storeUrl = document.getElementById('shopify-store-url')?.value?.trim().replace(/\/$/, '');
  const token = document.getElementById('shopify-token')?.value?.trim();
  if (!storeUrl) { toast('Enter your Shopify store URL', 'error'); return; }
  setIntegration('shopify', { storeUrl, token });
  renderPageContent();
  toast('Shopify connected! 🛍️');
}

function testShopifyConnection() {
  const cfg = getIntegration('shopify');
  if (!cfg.storeUrl) { toast('Save your config first', 'error'); return; }
  const url = `${cfg.storeUrl}/admin/api/2024-01/shop.json`;
  fetch(url, { headers: { 'X-Shopify-Access-Token': cfg.token, 'Content-Type': 'application/json' } })
    .then(r => r.json())
    .then(d => { if (d.shop) toast(`Connected to: ${d.shop.name} ✅`); else toast('Connected but no shop data returned', 'error'); })
    .catch(() => toast('Connection failed — check your store URL and token', 'error'));
}

function saveDigestConfig() {
  const email = document.getElementById('digest-email')?.value?.trim();
  const daily = document.getElementById('digest-daily')?.checked;
  const weekly = document.getElementById('digest-weekly')?.checked;
  setIntegration('digest', { email, daily, weekly });
}

function sendDigestEmail() {
  saveDigestConfig();
  const cfg = getIntegration('digest');
  const to = cfg.email || '';
  const subject = encodeURIComponent(`BLURRD Links Digest — ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}`);
  const body = encodeURIComponent(digestToText());
  window.open(`mailto:${to}?subject=${subject}&body=${body}`, '_blank');
}

function copyDigestText() {
  const text = digestToText();
  navigator.clipboard?.writeText(text).then(() => toast('Digest copied to clipboard!')).catch(() => toast('Copy failed — check clipboard permissions', 'error'));
}

function createTaskFromEmailUI() {
  const subject = document.getElementById('email-subject')?.value?.trim();
  const body = document.getElementById('email-body')?.value?.trim();
  if (!subject) { toast('Enter the email subject', 'error'); return; }
  const t = createTaskFromEmail(subject, body);
  if (t) {
    toast('✅ Task created from email!');
    setTimeout(() => { navigate('tasks'); }, 400);
  }
}

function addTag() {
  const name = document.getElementById('new-tag-name')?.value?.trim();
  const color = document.getElementById('new-tag-color')?.value || '#0057B8';
  if (!name) { toast('Enter a label name', 'error'); return; }
  if (S.tags.find(t => t.name.toLowerCase() === name.toLowerCase())) { toast('Label already exists', 'error'); return; }
  S.tags.push({ id: uid(), name, color });
  saveState();
  renderPageContent();
  toast(`Label "${name}" created`);
}

function deleteTag(tagId) {
  if (!confirm('Delete this label? It will be removed from all tasks.')) return;
  S.tags = S.tags.filter(t => t.id !== tagId);
  // Remove from all tasks
  S.tasks.forEach(t => { if (t.tags) t.tags = t.tags.filter(id => id !== tagId); });
  saveState();
  renderPageContent();
  toast('Label deleted');
}

                style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s"
                class="label-color-swatch"></div>`).join('')}
            </div>
            <input type="color" id="ql-color" value="${colors[0]}" style="width:0;height:0;opacity:0;position:absolute" />
            <button class="btn filled ripple" onclick="quickCreateLabel()" style="padding:10px 20px">
              <span class="ms sm">add</span> Create
            </button>
          </div>
        </div>

        <!-- Existing labels -->
        <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--c-on-surf-var);text-transform:uppercase;letter-spacing:.5px">
          ${S.tags.length} Label${S.tags.length !== 1 ? 's' : ''}
        </div>
        ${S.tags.length === 0 ? `<div style="text-align:center;padding:24px;color:var(--c-on-surf-var);font-size:14px">No labels yet — create one above.</div>` :
          S.tags.map(tag => {
            const taskCount = S.tasks.filter(t => t.tags?.includes(tag.id)).length;
            return `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r-lg);margin-bottom:6px;background:var(--c-surf1);border:1px solid var(--c-outline-var)">
              <div style="width:16px;height:16px;border-radius:50%;background:${tag.color};flex-shrink:0"></div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:500;font-size:14px">${escHtml(tag.name)}</div>
                <div style="font-size:12px;color:var(--c-on-surf-var)">${taskCount} task${taskCount !== 1 ? 's' : ''}</div>
              </div>
              <input type="color" value="${tag.color}" style="width:28px;height:28px;border:none;border-radius:50%;cursor:pointer;padding:0;background:none"
                onchange="updateTagColor('${tag.id}',this.value)" title="Change color" />
              ${canEdit() ? `<div class="icon-btn ripple" onclick="deleteTag('${tag.id}')" title="Delete label">
                <span class="ms sm" style="color:var(--c-error)">delete</span>
              </div>` : ''}
            </div>`;
          }).join('')}
      </div>
    </div>
  </div>`;
}

let _selectedLabelColor = '#0057B8';
function selectLabelColor(color) {
  _selectedLabelColor = color;
  document.querySelectorAll('.label-color-swatch').forEach(el => {
    el.style.borderColor = 'transparent';
    el.style.transform = 'scale(1)';
  });
  const el = document.getElementById('lc-' + color.slice(1));
  if (el) { el.style.borderColor = '#fff'; el.style.transform = 'scale(1.2)'; el.style.boxShadow = `0 0 0 2px ${color}`; }
  const colorInput = document.getElementById('ql-color');
  if (colorInput) colorInput.value = color;
}

function quickCreateLabel() {
  const name = document.getElementById('ql-name')?.value?.trim();
  const colorInput = document.getElementById('ql-color');
  const color = colorInput?.value || _selectedLabelColor || '#0057B8';
  if (!name) { toast('Enter a label name', 'error'); return; }
  if (S.tags.find(t => t.name.toLowerCase() === name.toLowerCase())) { toast('Label already exists', 'error'); return; }
  S.tags.push({ id: uid(), name, color });
  saveState();
  toast(`Label "${name}" created ✅`);
  S.modal = 'labels'; // re-render same modal
  render();
}

function updateTagColor(tagId, color) {
  const tag = S.tags.find(t => t.id === tagId);
  if (tag) { tag.color = color; saveState(); }
}

function openBoardManager() {
  S.modal = 'boards';
  render();
}

function renderBoardManagerModal() {
  return `
  <div class="modal-overlay" onclick="closeModal()">
    <div class="modal-card" style="max-width:500px;width:100%" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title"><span class="ms">view_kanban</span> Manage Boards</div>
        <div class="icon-btn ripple" onclick="closeModal()"><span class="ms">close</span></div>
      </div>
      <div class="modal-body" style="max-height:60vh;overflow-y:auto">

        ${canEdit() ? `
        <!-- Create board -->
        <div style="padding:16px;background:var(--c-surf2);border-radius:var(--r-xl);margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--c-on-surf-var);text-transform:uppercase;letter-spacing:.5px">New Board</div>
          <div style="display:flex;gap:10px;align-items:center">
            <input id="new-board-name" type="text" placeholder="Board name…" maxlength="48"
              style="flex:1;padding:10px 14px;border-radius:var(--r-lg);border:1.5px solid var(--c-outline-var);background:var(--c-surface);font-size:14px;font-family:var(--font-ui);color:var(--c-on-surface);outline:none"
              onfocus="this.style.borderColor='var(--c-primary)'" onblur="this.style.borderColor='var(--c-outline-var)'"
              onkeydown="if(event.key==='Enter')createBoard()" />
            <button class="btn filled ripple" onclick="createBoard()" style="padding:10px 20px">
              <span class="ms sm">add</span> Create
            </button>
          </div>
        </div>` : ''}

        <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--c-on-surf-var);text-transform:uppercase;letter-spacing:.5px">
          ${S.boards.length} Board${S.boards.length !== 1 ? 's' : ''}
        </div>
        ${S.boards.map(b => {
          const taskCount = S.tasks.filter(t => t.boardId === b.id || (!t.boardId && b.id === 'board1')).length;
          const isActive = S.selectedBoardId === b.id;
          return `
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r-lg);margin-bottom:8px;background:var(--c-surf1);border:${isActive ? '2px solid var(--c-primary)' : '1px solid var(--c-outline-var)'}">
            <span class="ms" style="color:${isActive ? 'var(--c-primary)' : 'var(--c-on-surf-var)'}">view_kanban</span>
            <div style="flex:1;min-width:0">
              <div style="font-weight:${isActive ? 700 : 500};font-size:14px">${escHtml(b.name)} ${isActive ? '<span style="font-size:11px;color:var(--c-primary)">● Active</span>' : ''}</div>
              <div style="font-size:12px;color:var(--c-on-surf-var)">${taskCount} task${taskCount !== 1 ? 's' : ''}</div>
            </div>
            <button class="btn btn-tonal btn-sm ripple" onclick="switchBoard('${b.id}')">
              ${isActive ? 'Active' : 'Switch'}
            </button>
            ${canEdit() && S.boards.length > 1 ? `<div class="icon-btn ripple" onclick="deleteBoard('${b.id}')"><span class="ms sm" style="color:var(--c-error)">delete</span></div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function createBoard() {
  const name = document.getElementById('new-board-name')?.value?.trim();
  if (!name) { toast('Enter a board name', 'error'); return; }
  const newBoard = { id: uid(), name, description: '' };
  S.boards.push(newBoard);
  S.selectedBoardId = newBoard.id;
  saveState();
  toast(`Board "${name}" created`);
  S.modal = 'boards';
  render();
}

function switchBoard(boardId) {
  S.selectedBoardId = boardId;
  saveState();
  S.modal = null;
  navigate('kanban');
}

function deleteBoard(boardId) {
  if (S.boards.length <= 1) { toast('Cannot delete the last board', 'error'); return; }
  if (!confirm('Delete this board? Tasks on it will move to the main board.')) return;
  // Move tasks to board1
  S.tasks.forEach(t => { if (t.boardId === boardId) t.boardId = 'board1'; });
  S.boards = S.boards.filter(b => b.id !== boardId);
  if (S.selectedBoardId === boardId) S.selectedBoardId = S.boards[0].id;
  saveState();
  toast('Board deleted');
  S.modal = 'boards';
  render();
}

function renderHomePage() {
  const myId = S.currentUser?.id;
  const now2 = Date.now();
  const today = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(now2 + 86400000).toISOString().split('T')[0];

  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const firstName = S.currentUser?.name?.split(' ')[0] || 'there';

  const allMyTasks = S.tasks.filter(t => t.assignees?.includes(myId));
  const overdueTasks = allMyTasks.filter(t => t.status !== 'done' && t.dueDate && t.dueDate < today);
  const todayTasks = allMyTasks.filter(t => t.status !== 'done' && t.dueDate === today);
  const urgentTasks = allMyTasks.filter(t => t.status !== 'done' && (t.priority === 'urgent' || t.priority === 'high') && t.status !== 'blocked').slice(0,5);
  const doneMine = allMyTasks.filter(t => t.status === 'done').length;
  const blockedTasks = allMyTasks.filter(t => t.status === 'blocked');

  // Recent messages — last 3 across all channels
  const recentMsgs = [...S.messages]
    .filter(m => m.userId !== myId)
    .sort((a,b) => b.timestamp - a.timestamp)
    .slice(0,3);

  // Focus list = overdue + today + urgent (deduplicated)
  const seen = new Set();
  const focusList = [...overdueTasks, ...todayTasks, ...urgentTasks].filter(t => {
    if (seen.has(t.id)) return false;
    seen.add(t.id);
    return true;
  }).slice(0,8);

  const subgreeting = focusList.length === 0
    ? "You're all clear — no urgent tasks today. ⛳"
    : `${overdueTasks.length > 0 ? overdueTasks.length + ' overdue · ' : ''}${todayTasks.length} due today · ${urgentTasks.length} urgent`;

  function homeTaskCard(t) {
    const isOverdueTask = t.dueDate && t.dueDate < today && t.status !== 'done';
    const isTodayTask = t.dueDate === today;
    const borderClass = isOverdueTask ? 'urgent-border' : isTodayTask ? 'today-border' : '';
    const assignees = (t.assignees || []).slice(0,3).map(uid => {
      const u = getUser(uid);
      return u ? `<div class="avatar" style="width:20px;height:20px;font-size:9px;background:${u.color||userColor(u.name)};flex-shrink:0">${escHtml(u.initials||initials(u.name))}</div>` : '';
    }).join('');

    return `
    <div class="home-task-card ${borderClass} ripple" onclick="openTaskModal('${t.id}')">
      <span class="ms home-task-card-icon" style="color:${{todo:'#78909C',in_progress:'#FF9800',blocked:'#BA1A1A',review:'#0057B8',done:'#4CAF50'}[t.status]}">${STATUS_ICONS[t.status]}</span>
      <div style="flex:1;min-width:0">
        <div class="home-task-card-title">${escHtml(t.title)}</div>
        <div class="home-task-card-meta">
          ${isOverdueTask ? `<span style="color:var(--c-error);font-weight:600">Overdue · </span>` : isTodayTask ? `<span style="color:#B45309;font-weight:600">Due today · </span>` : ''}
          ${STATUS_LABELS[t.status]} · ${PRIORITY_LABELS[t.priority]}
        </div>
      </div>
      <div style="display:flex;gap:-4px;flex-shrink:0">${assignees}</div>
      <span class="ms home-task-card-chevron">chevron_right</span>
    </div>`;
  }

  const avatarHtml = S.currentUser.avatar
    ? `<div class="avatar sm" style="background:${S.currentUser.color||userColor(S.currentUser.name)}"><img src="${escHtml(S.currentUser.avatar)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none'"></div>`
    : `<div class="avatar sm" style="background:${S.currentUser.color||userColor(S.currentUser.name)}">${escHtml(S.currentUser.initials||initials(S.currentUser.name))}</div>`;

  return `
  <div class="page-home" id="page-home">

    <!-- Omnibox Search Bar -->
    <div class="home-omnibox-wrap" id="home-omnibox-wrap">
      <div class="home-omnibox${S.searchQuery ? ' focused' : ''}" id="home-omnibox" onclick="focusOmnibox()">
        <span class="ms home-omnibox-icon">search</span>
        <input type="text" id="home-search-input" placeholder="Search tasks, messages, files…"
          value="${escHtml(S.searchQuery)}"
          oninput="onSearch(this.value);renderOmniboxResults(this.value)"
          onfocus="document.getElementById('home-omnibox').classList.add('focused')"
          onblur="setTimeout(()=>{document.getElementById('home-omnibox')?.classList.remove('focused');hideOmniboxResults()},200)"
          autocomplete="off" />
        ${S.searchQuery ? `<div class="icon-btn ripple" onclick="clearSearch()" style="padding:0"><span class="ms sm">close</span></div>` : ''}
        <div class="home-omnibox-avatar">${avatarHtml}</div>
      </div>
      <div id="omnibox-results-dropdown"></div>
    </div>

    <!-- Greeting -->
    <div class="home-greeting-section">
      <div class="home-greeting">${greeting}, ${escHtml(firstName)} 👋</div>
      <div class="home-subgreeting">${subgreeting}</div>
    </div>

    <!-- Stats chips row -->
    <div class="home-stats-row">
      <div class="home-stat-chip urgent ripple" onclick="navigate('mytasks')">
        <span class="ms" style="color:var(--c-error)">warning</span>
        <div><div class="home-stat-chip-count" style="color:var(--c-error)">${overdueTasks.length}</div><div class="home-stat-chip-label">Overdue</div></div>
      </div>
      <div class="home-stat-chip today ripple" onclick="navigate('mytasks')">
        <span class="ms" style="color:#B45309">today</span>
        <div><div class="home-stat-chip-count" style="color:#B45309">${todayTasks.length}</div><div class="home-stat-chip-label">Due Today</div></div>
      </div>
      ${blockedTasks.length > 0 ? `
      <div class="home-stat-chip ripple" onclick="navigate('tasks')" style="background:#FFF0F0;border-color:#FFCDD2">
        <span class="ms" style="color:#BA1A1A">block</span>
        <div><div class="home-stat-chip-count" style="color:#BA1A1A">${blockedTasks.length}</div><div class="home-stat-chip-label">Blocked</div></div>
      </div>` : ''}
      <div class="home-stat-chip done ripple" onclick="navigate('mytasks')">
