<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0057B8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#001D36" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BLURRD Links">
<meta name="description" content="Team task management and communication by BLURRD">
<title>BLURRD Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;500;700&family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,1,0" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   MATERIAL DESIGN 3 EXPRESSIVE — BLURRD LINKS
═══════════════════════════════════════════════ */

/* Light theme tokens */
:root {
  --font-display: 'Google Sans Display', 'Google Sans', sans-serif;
  --font-ui: 'Google Sans', sans-serif;
  --font-body: 'Roboto Flex', 'Google Sans', sans-serif;
  --font-mono: 'Roboto Mono', monospace;

  /* Shape */
  --r-xs: 4px; --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
  --r-xl: 24px; --r-2xl: 28px; --r-3xl: 36px; --r-full: 9999px;

  /* Elevation */
  --el1: 0 1px 2px rgba(0,0,0,.12),0 1px 3px 1px rgba(0,0,0,.07);
  --el2: 0 1px 2px rgba(0,0,0,.12),0 2px 6px 2px rgba(0,0,0,.07);
  --el3: 0 4px 8px 3px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.12);

  /* Durations */
  --dur-fast: 120ms; --dur-med: 250ms; --dur-slow: 400ms;
  --ease-out: cubic-bezier(0.05,0.7,0.1,1);
  --ease-in: cubic-bezier(0.3,0,1,1);
  --ease-std: cubic-bezier(0.2,0,0,1);
}

[data-theme="light"], :root[data-resolved="light"] {
  --c-primary: #0057B8;
  --c-on-primary: #fff;
  --c-primary-cont: #D7E3FF;
  --c-on-primary-cont: #001946;
  --c-secondary: #545F71;
  --c-on-secondary: #fff;
  --c-secondary-cont: #D8E3F8;
  --c-on-secondary-cont: #111C2B;
  --c-tertiary: #6D5677;
  --c-on-tertiary: #fff;
  --c-tertiary-cont: #F6D9FF;
  --c-error: #BA1A1A;
  --c-on-error: #fff;
  --c-error-cont: #FFDAD6;
  --c-surface: #F8F9FF;
  --c-surface-dim: #D8DAE5;
  --c-surface-bright: #F8F9FF;
  --c-surf1: #ECF0FC;
  --c-surf2: #E5EAF9;
  --c-surf3: #DDE4F7;
  --c-surf4: #DBE2F5;
  --c-surf5: #D6DDF3;
  --c-on-surface: #191C22;
  --c-on-surf-var: #42474E;
  --c-outline: #72777F;
  --c-outline-var: #C2C7CF;
  --c-inv-surface: #2E3136;
  --c-inv-on-surface: #EFF0F7;
  --c-inv-primary: #ADC6FF;
  --c-scrim: rgba(0,0,0,.32);
  --c-shadow: rgba(0,0,0,1);
  --bg-nav: rgba(232,236,251,0.92);
  --bg-modal: rgba(0,0,0,0.4);
}

[data-theme="dark"], :root[data-resolved="dark"] {
  --c-primary: #ADC6FF;
  --c-on-primary: #002E6A;
  --c-primary-cont: #00429A;
  --c-on-primary-cont: #D7E3FF;
  --c-secondary: #BBC7DB;
  --c-on-secondary: #253141;
  --c-secondary-cont: #3C4758;
  --c-on-secondary-cont: #D8E3F8;
  --c-tertiary: #DABDE5;
  --c-on-tertiary: #3D2947;
  --c-tertiary-cont: #553F5F;
  --c-error: #FFB4AB;
  --c-on-error: #690005;
  --c-error-cont: #93000A;
  --c-surface: #111318;
  --c-surface-dim: #111318;
  --c-surface-bright: #37393E;
  --c-surf1: #191C22;
  --c-surf2: #1E2128;
  --c-surf3: #23262D;
  --c-surf4: #242730;
  --c-surf5: #272A32;
  --c-on-surface: #E1E2E9;
  --c-on-surf-var: #C3C6CF;
  --c-outline: #8D9199;
  --c-outline-var: #43474E;
  --c-inv-surface: #E1E2E9;
  --c-inv-on-surface: #2E3136;
  --c-inv-primary: #0057B8;
  --c-scrim: rgba(0,0,0,.6);
  --c-shadow: rgba(0,0,0,1);
  --bg-nav: rgba(25,28,34,0.92);
  --bg-modal: rgba(0,0,0,0.6);
}

/* ── Base Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--c-surface);
  color: var(--c-on-surface);
  height: 100%;
  overflow: hidden;
  transition: background var(--dur-med) var(--ease-std), color var(--dur-med) var(--ease-std);
}
#app { height: 100%; display: flex; flex-direction: column; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input, textarea, select { font: inherit; color: inherit; background: none; border: none; outline: none; }
a { color: var(--c-primary); text-decoration: none; }
ul, ol { list-style: none; }
img { max-width: 100%; display: block; }
.ms { font-family: 'Material Symbols Rounded'; font-size: 24px; font-weight: 400;
  font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none;
  display: inline-flex; align-items: center; justify-content: center;
  white-space: nowrap; word-wrap: normal; direction: ltr;
  -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased; user-select: none; flex-shrink: 0; }
.ms.filled { font-variation-settings: 'FILL' 1; }
.ms.sm { font-size: 18px; } .ms.lg { font-size: 32px; } .ms.xl { font-size: 48px; }

/* ── Typography ── */
.display-lg { font-family: var(--font-display); font-size: 57px; font-weight: 400; line-height: 64px; letter-spacing: -.25px; }
.display-md { font-family: var(--font-display); font-size: 45px; font-weight: 400; line-height: 52px; }
.display-sm { font-family: var(--font-display); font-size: 36px; font-weight: 400; line-height: 44px; }
.headline-lg { font-family: var(--font-display); font-size: 32px; font-weight: 400; line-height: 40px; }
.headline-md { font-family: var(--font-display); font-size: 28px; font-weight: 400; line-height: 36px; }
.headline-sm { font-family: var(--font-display); font-size: 24px; font-weight: 400; line-height: 32px; }
.title-lg { font-family: var(--font-ui); font-size: 22px; font-weight: 400; line-height: 28px; }
.title-md { font-family: var(--font-ui); font-size: 16px; font-weight: 500; line-height: 24px; letter-spacing: .15px; }
.title-sm { font-family: var(--font-ui); font-size: 14px; font-weight: 500; line-height: 20px; letter-spacing: .1px; }
.label-lg { font-family: var(--font-ui); font-size: 14px; font-weight: 500; line-height: 20px; letter-spacing: .1px; }
.label-md { font-family: var(--font-ui); font-size: 12px; font-weight: 500; line-height: 16px; letter-spacing: .5px; }
.label-sm { font-family: var(--font-ui); font-size: 11px; font-weight: 500; line-height: 16px; letter-spacing: .5px; }
.body-lg { font-size: 16px; line-height: 24px; letter-spacing: .5px; }
.body-md { font-size: 14px; line-height: 20px; letter-spacing: .25px; }
.body-sm { font-size: 12px; line-height: 16px; letter-spacing: .4px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-outline-var); border-radius: var(--r-full); border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--c-outline); background-clip: padding-box; }

/* ── Ripple ── */
.ripple { position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
.ripple::after { content: ''; position: absolute; inset: 0; background: currentColor; opacity: 0; border-radius: inherit; transition: opacity var(--dur-fast); }
.ripple:hover::after { opacity: .08; }
.ripple:active::after { opacity: .12; }

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
.login-screen {
  height: 100%; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--c-primary-cont) 0%, var(--c-tertiary-cont) 100%);
  padding: 24px;
}
.login-card {
  background: var(--c-surface); border-radius: var(--r-3xl); padding: 48px 40px;
  box-shadow: var(--el3); max-width: 480px; width: 100%;
  animation: slideUp var(--dur-slow) var(--ease-out);
}
.login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.login-logo-mark {
  width: 48px; height: 48px; border-radius: var(--r-xl);
  background: var(--c-primary); display: flex; align-items: center; justify-content: center;
  color: var(--c-on-primary);
}
.login-logo-mark .ms { font-size: 28px; }
.login-logo-text { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--c-primary); letter-spacing: -0.5px; }
.login-logo-sub { font-size: 13px; color: var(--c-on-surf-var); letter-spacing: .5px; text-transform: uppercase; font-weight: 500; }
.login-tagline { font-family: var(--font-body); font-size: 15px; color: var(--c-on-surf-var); margin: 16px 0 32px; line-height: 1.5; }
.login-label { font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--c-on-surf-var); margin-bottom: 12px; }
.login-users { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; max-height: 280px; overflow-y: auto; }
.login-user-btn {
  display: flex; align-items: center; gap: 14px; padding: 14px 16px;
  background: var(--c-surf1); border-radius: var(--r-xl); cursor: pointer;
  transition: background var(--dur-fast), transform var(--dur-fast);
  border: 1.5px solid transparent;
}
.login-user-btn:hover { background: var(--c-surf2); border-color: var(--c-outline-var); transform: translateX(2px); }
.login-user-btn:active { transform: scale(.98); }
.login-user-info { flex: 1; text-align: left; }
.login-user-name { font-family: var(--font-ui); font-size: 15px; font-weight: 500; }
.login-user-role { font-size: 12px; color: var(--c-on-surf-var); margin-top: 2px; text-transform: capitalize; }
.login-add-btn {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border: 1.5px dashed var(--c-outline-var); border-radius: var(--r-xl);
  cursor: pointer; color: var(--c-primary); font-family: var(--font-ui); font-size: 14px; font-weight: 500;
  transition: all var(--dur-fast);
}
.login-add-btn:hover { background: var(--c-primary-cont); border-color: var(--c-primary); border-style: solid; }

/* ══════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════ */
.app-layout { display: flex; height: 100%; overflow: hidden; }

/* ── Navigation Rail / Drawer ── */
.nav-rail {
  width: 80px; height: 100%; display: flex; flex-direction: column;
  align-items: center; padding: 12px 0; gap: 4px;
  background: var(--bg-nav); backdrop-filter: blur(20px) saturate(180%);
  border-right: 1px solid var(--c-outline-var);
  transition: width var(--dur-med) var(--ease-std);
  flex-shrink: 0; z-index: 10;
  overflow: hidden;
}
.nav-rail.expanded { width: 256px; align-items: stretch; padding: 12px 8px; }
.nav-logo {
  display: flex; align-items: center; gap: 10px; padding: 12px 8px;
  margin-bottom: 8px; flex-shrink: 0;
}
.nav-logo-mark {
  width: 40px; height: 40px; border-radius: var(--r-lg); flex-shrink: 0;
  background: var(--c-primary); display: flex; align-items: center; justify-content: center;
  color: var(--c-on-primary);
}
.nav-logo-mark .ms { font-size: 22px; }
.nav-logo-text { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--c-primary); white-space: nowrap; overflow: hidden; }
.nav-logo-sub { font-size: 10px; color: var(--c-on-surf-var); letter-spacing: .8px; text-transform: uppercase; white-space: nowrap; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 8px;
  border-radius: var(--r-xl); cursor: pointer; color: var(--c-on-surf-var);
  transition: all var(--dur-fast); position: relative; white-space: nowrap;
  min-height: 56px; width: 100%;
  justify-content: center;
}
.nav-rail.expanded .nav-item { justify-content: flex-start; padding: 12px 16px; }
.nav-item:hover { background: var(--c-surf2); color: var(--c-on-surface); }
.nav-item.active { background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.nav-item .ms { font-size: 22px; flex-shrink: 0; }
.nav-item-label { font-family: var(--font-ui); font-size: 14px; font-weight: 500; display: none; }
.nav-rail.expanded .nav-item-label { display: block; }
.nav-badge {
  background: var(--c-error); color: var(--c-on-error); border-radius: var(--r-full);
  font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center; padding: 0 4px;
  position: absolute; top: 8px; right: 8px;
}
.nav-rail.expanded .nav-badge { position: static; margin-left: auto; }
.nav-divider { height: 1px; background: var(--c-outline-var); margin: 8px 0; width: 100%; }
.nav-spacer { flex: 1; }
.nav-user {
  display: flex; align-items: center; gap: 10px; padding: 10px 8px;
  cursor: pointer; border-radius: var(--r-xl);
  transition: background var(--dur-fast);
  width: 100%;
}
.nav-user:hover { background: var(--c-surf2); }
.nav-user-info { overflow: hidden; display: none; }
.nav-rail.expanded .nav-user-info { display: block; }
.nav-user-name { font-size: 13px; font-weight: 500; font-family: var(--font-ui); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-user-role { font-size: 11px; color: var(--c-on-surf-var); text-transform: capitalize; }
.nav-toggle {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: var(--r-full); cursor: pointer;
  transition: background var(--dur-fast); color: var(--c-on-surf-var);
  margin: 4px auto;
}
.nav-rail.expanded .nav-toggle { margin: 4px 0 4px auto; }
.nav-toggle:hover { background: var(--c-surf2); }

/* ── Main Content ── */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── Top Bar ── */
.topbar {
  display: flex; align-items: center; gap: 8px; padding: 12px 20px; height: 64px;
  background: var(--c-surface); border-bottom: 1px solid var(--c-outline-var);
  flex-shrink: 0; z-index: 5;
}
.topbar-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; flex: 1; }
.topbar-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--c-surf1); border-radius: var(--r-full);
  padding: 8px 16px; border: 1.5px solid transparent;
  transition: all var(--dur-fast); min-width: 0;
}
.topbar-search:focus-within { background: var(--c-surface); border-color: var(--c-primary); }
.topbar-search input { font-size: 14px; width: 0; transition: width var(--dur-med) var(--ease-std); min-width: 0; }
.topbar-search.open input { width: 180px; }
.topbar-search .ms { color: var(--c-on-surf-var); font-size: 20px; cursor: pointer; flex-shrink: 0; }
.topbar-search:focus-within .ms { color: var(--c-primary); }
.icon-btn {
  width: 40px; height: 40px; border-radius: var(--r-full); display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  color: var(--c-on-surf-var); transition: background var(--dur-fast);
  position: relative;
}
.icon-btn:hover { background: var(--c-surf2); }
.icon-btn .nav-badge { top: 4px; right: 4px; }

/* ── Page Content ── */
.page-content { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }

/* ══════════════════════════════════════
   COMMON COMPONENTS
══════════════════════════════════════ */

/* Avatar */
.avatar {
  width: 40px; height: 40px; border-radius: var(--r-full); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-ui); font-size: 14px; font-weight: 600;
  color: #fff; background: var(--c-primary); overflow: hidden; user-select: none;
}
.avatar.sm { width: 28px; height: 28px; font-size: 11px; }
.avatar.lg { width: 56px; height: 56px; font-size: 20px; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 24px; border-radius: var(--r-full); font-family: var(--font-ui);
  font-size: 14px; font-weight: 500; letter-spacing: .1px; cursor: pointer;
  transition: all var(--dur-fast); white-space: nowrap;
  border: none; position: relative; overflow: hidden;
}
.btn:active { transform: scale(.97); }
.btn-filled { background: var(--c-primary); color: var(--c-on-primary); box-shadow: var(--el1); }
.btn-filled:hover { box-shadow: var(--el2); filter: brightness(1.05); }
.btn-tonal { background: var(--c-secondary-cont); color: var(--c-on-secondary-cont); }
.btn-tonal:hover { filter: brightness(.96); }
.btn-outlined { border: 1.5px solid var(--c-outline); color: var(--c-primary); padding: 9px 23px; }
.btn-outlined:hover { background: var(--c-primary-cont); }
.btn-text { color: var(--c-primary); padding: 10px 12px; }
.btn-text:hover { background: var(--c-primary-cont); }
.btn-error { background: var(--c-error); color: var(--c-on-error); }
.btn-sm { padding: 6px 16px; font-size: 13px; }
.btn .ms { font-size: 18px; }

/* FAB */
.fab {
  position: fixed; bottom: 28px; right: 24px; z-index: 20;
  background: var(--c-primary-cont); color: var(--c-on-primary-cont);
  border-radius: var(--r-xl); padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-ui); font-size: 14px; font-weight: 500;
  box-shadow: var(--el3); cursor: pointer;
  transition: all var(--dur-med) var(--ease-out);
}
.fab:hover { box-shadow: var(--el3), 0 8px 20px rgba(0,87,184,.2); transform: translateY(-2px); }
.fab:active { transform: scale(.97); }
.fab .ms { font-size: 24px; }

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: var(--r-full); font-size: 13px; font-weight: 500;
  font-family: var(--font-ui); background: var(--c-surf2);
  color: var(--c-on-surface); border: 1px solid var(--c-outline-var);
  cursor: pointer; transition: all var(--dur-fast); white-space: nowrap;
}
.chip.active { background: var(--c-secondary-cont); color: var(--c-on-secondary-cont); border-color: transparent; }
.chip:hover { background: var(--c-surf3); }
.chip .ms { font-size: 16px; }
.chip-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* Card */
.card {
  background: var(--c-surf1); border-radius: var(--r-xl);
  border: 1px solid var(--c-outline-var); overflow: hidden;
}
.card:hover { box-shadow: var(--el1); }
.card.elevated { box-shadow: var(--el1); background: var(--c-surface); }

/* Input Field */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: var(--c-on-surf-var); letter-spacing: .5px; }
.field-input {
  background: var(--c-surf1); border-radius: var(--r-lg); padding: 12px 16px;
  border: 1.5px solid var(--c-outline-var); font-size: 14px;
  transition: all var(--dur-fast); display: flex; align-items: center; gap: 10px;
}
.field-input:focus-within { border-color: var(--c-primary); background: var(--c-surface); }
.field-input input, .field-input textarea { flex: 1; resize: none; background: none; }
.field-input textarea { min-height: 80px; resize: vertical; }

/* Badge */
.badge {
  background: var(--c-primary-cont); color: var(--c-on-primary-cont);
  border-radius: var(--r-full); padding: 2px 8px; font-size: 11px; font-weight: 600;
  font-family: var(--font-ui); white-space: nowrap;
}
.badge.error { background: var(--c-error-cont); color: var(--c-error); }
.badge.success { background: #C8F5D0; color: #1A5C2A; }
.badge.warn { background: #FFF0CC; color: #7A4F00; }

/* Priority dot */
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.prio-low { background: #4CAF50; }
.prio-medium { background: #FF9800; }
.prio-high { background: #F44336; }
.prio-urgent { background: #9C27B0; box-shadow: 0 0 0 3px rgba(156,39,176,.2); }

/* Divider */
.divider { height: 1px; background: var(--c-outline-var); margin: 8px 0; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 64px 24px; text-align: center; gap: 16px; color: var(--c-on-surf-var);
}
.empty-state .ms { font-size: 56px; opacity: .4; }
.empty-state h3 { font-family: var(--font-display); font-size: 20px; color: var(--c-on-surface); }
.empty-state p { font-size: 14px; max-width: 280px; line-height: 1.6; }

/* ══════════════════════════════════════
   MODAL / DIALOG
══════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0; background: var(--bg-modal);
  backdrop-filter: blur(4px); z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn var(--dur-med) var(--ease-out);
}
@media (min-width: 600px) {
  .modal-backdrop { align-items: center; }
}
.modal {
  background: var(--c-surface); border-radius: var(--r-3xl) var(--r-3xl) 0 0;
  padding: 32px 28px 40px; width: 100%; max-width: 600px; max-height: 92vh;
  overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
  animation: slideUp var(--dur-slow) var(--ease-out);
  position: relative;
}
@media (min-width: 600px) {
  .modal { border-radius: var(--r-3xl); max-height: 88vh; }
}
.modal-handle {
  width: 32px; height: 4px; background: var(--c-outline-var);
  border-radius: var(--r-full); margin: 0 auto -12px;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
.modal-close {
  width: 40px; height: 40px; border-radius: var(--r-full);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--c-on-surf-var); transition: background var(--dur-fast);
}
.modal-close:hover { background: var(--c-surf2); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

/* ══════════════════════════════════════
   TASKS PAGE
══════════════════════════════════════ */
.page-tasks { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.task-filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-card {
  background: var(--c-surface); border-radius: var(--r-xl);
  border: 1px solid var(--c-outline-var); padding: 16px 18px;
  display: flex; align-items: center; gap: 14px; cursor: pointer;
  transition: all var(--dur-fast);
}
.task-card:hover { box-shadow: var(--el2); border-color: var(--c-primary); transform: translateY(-1px); }
.task-card.done { opacity: .6; }
.task-card.done .task-title { text-decoration: line-through; }
.task-card-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.task-check {
  width: 22px; height: 22px; border-radius: var(--r-sm); flex-shrink: 0;
  border: 2px solid var(--c-outline); display: flex; align-items: center; justify-content: center;
  transition: all var(--dur-fast); cursor: pointer;
}
.task-check:hover { border-color: var(--c-primary); background: var(--c-primary-cont); }
.task-check.checked { background: var(--c-primary); border-color: var(--c-primary); }
.task-check.checked .ms { color: var(--c-on-primary); font-size: 16px; }
.task-meta { flex: 1; min-width: 0; }
.task-title { font-family: var(--font-ui); font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-sub { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.task-due { font-size: 12px; color: var(--c-on-surf-var); display: flex; align-items: center; gap: 4px; }
.task-due.overdue { color: var(--c-error); font-weight: 500; }
.task-due .ms { font-size: 14px; }
.task-assignees { display: flex; margin-left: 4px; }
.task-assignees .avatar { margin-left: -8px; border: 2px solid var(--c-surface); width: 24px; height: 24px; font-size: 10px; }
.task-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.task-attach-count { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--c-on-surf-var); }
.task-attach-count .ms { font-size: 15px; }
.task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity var(--dur-fast); }
.task-card:hover .task-actions { opacity: 1; }

/* Task Detail Modal extras */
.task-section { display: flex; flex-direction: column; gap: 8px; }
.task-section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--c-on-surf-var); }
.assignee-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.assignee-chip {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 4px;
  background: var(--c-surf1); border-radius: var(--r-full); font-size: 13px;
  border: 1px solid var(--c-outline-var);
}
.attachments-list { display: flex; flex-direction: column; gap: 6px; }
.attachment-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--c-surf1); border-radius: var(--r-lg); cursor: pointer;
  transition: background var(--dur-fast);
}
.attachment-item:hover { background: var(--c-surf2); }
.attachment-item .ms { font-size: 20px; color: var(--c-primary); }
.attachment-name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attachment-size { font-size: 12px; color: var(--c-on-surf-var); }
.attach-drop {
  border: 2px dashed var(--c-outline-var); border-radius: var(--r-lg);
  padding: 24px; text-align: center; cursor: pointer; transition: all var(--dur-fast);
  color: var(--c-on-surf-var);
}
.attach-drop:hover { border-color: var(--c-primary); background: var(--c-primary-cont); color: var(--c-primary); }
.attach-drop.dragging { border-color: var(--c-primary); background: var(--c-primary-cont); }
.comments-list { display: flex; flex-direction: column; gap: 12px; max-height: 200px; overflow-y: auto; }
.comment-item { display: flex; gap: 10px; }
.comment-body { flex: 1; background: var(--c-surf1); border-radius: 0 var(--r-lg) var(--r-lg) var(--r-lg); padding: 10px 14px; }
.comment-author { font-size: 13px; font-weight: 500; font-family: var(--font-ui); }
.comment-time { font-size: 11px; color: var(--c-on-surf-var); }
.comment-text { font-size: 14px; margin-top: 4px; line-height: 1.5; }
.comment-input-row { display: flex; gap: 10px; align-items: flex-end; }
.comment-input {
  flex: 1; background: var(--c-surf1); border-radius: var(--r-lg); padding: 10px 14px;
  border: 1.5px solid var(--c-outline-var); font-size: 14px; resize: none; min-height: 44px;
  transition: border-color var(--dur-fast);
}
.comment-input:focus { border-color: var(--c-primary); }

/* Status select */
.status-select {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.status-btn {
  flex: 1; padding: 10px 8px; border-radius: var(--r-lg); font-size: 13px;
  font-family: var(--font-ui); font-weight: 500; text-align: center; cursor: pointer;
  border: 2px solid var(--c-outline-var); transition: all var(--dur-fast); min-width: 80px;
}
.status-btn.active { border-color: transparent; }
.status-btn[data-status="todo"].active { background: var(--c-secondary-cont); color: var(--c-on-secondary-cont); }
.status-btn[data-status="in_progress"].active { background: #FFF0CC; color: #7A4F00; }
.status-btn[data-status="review"].active { background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.status-btn[data-status="done"].active { background: #C8F5D0; color: #1A5C2A; }

/* ══════════════════════════════════════
   KANBAN PAGE
══════════════════════════════════════ */
.page-kanban { padding: 24px; height: 100%; display: flex; flex-direction: column; gap: 16px; }
.kanban-board { display: flex; gap: 16px; flex: 1; overflow-x: auto; padding-bottom: 24px; }
.kanban-col {
  background: var(--c-surf1); border-radius: var(--r-xl); padding: 16px;
  min-width: 280px; max-width: 320px; flex: 1; display: flex; flex-direction: column; gap: 12px;
  border: 1px solid var(--c-outline-var);
}
.kanban-col-header { display: flex; align-items: center; gap: 8px; padding-bottom: 4px; }
.kanban-col-title { font-family: var(--font-ui); font-weight: 600; font-size: 14px; flex: 1; }
.kanban-col-count {
  background: var(--c-outline-var); color: var(--c-on-surf-var);
  border-radius: var(--r-full); font-size: 12px; font-weight: 600;
  min-width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; padding: 0 6px;
}
.kanban-col-dot { width: 10px; height: 10px; border-radius: 50%; }
.kanban-cards { display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 60px; }
.kanban-card {
  background: var(--c-surface); border-radius: var(--r-lg); padding: 14px;
  border: 1px solid var(--c-outline-var); cursor: grab;
  transition: all var(--dur-fast); display: flex; flex-direction: column; gap: 8px;
}
.kanban-card:hover { box-shadow: var(--el2); transform: translateY(-1px); border-color: var(--c-primary); }
.kanban-card.dragging { opacity: .5; transform: rotate(2deg) scale(.97); cursor: grabbing; }
.kanban-card.drag-over { border-color: var(--c-primary); border-style: dashed; background: var(--c-primary-cont); }
.kanban-col.drag-over-col { background: var(--c-surf2); border-color: var(--c-primary); border-style: dashed; }
.kanban-card-title { font-family: var(--font-ui); font-size: 14px; font-weight: 500; line-height: 1.4; }
.kanban-card-footer { display: flex; align-items: center; gap: 6px; }
.kanban-card-footer .task-assignees { margin-left: 0; }
.kanban-add-btn {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border-radius: var(--r-lg); color: var(--c-primary); font-size: 13px; font-family: var(--font-ui); font-weight: 500;
  cursor: pointer; transition: background var(--dur-fast); border: 1.5px dashed var(--c-outline-var); justify-content: center;
}
.kanban-add-btn:hover { background: var(--c-primary-cont); border-style: solid; border-color: var(--c-primary); }

/* ══════════════════════════════════════
   CALENDAR PAGE
══════════════════════════════════════ */
.page-calendar { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.cal-header { display: flex; align-items: center; gap: 12px; }
.cal-nav-btn {
  width: 36px; height: 36px; border-radius: var(--r-full); display: flex;
  align-items: center; justify-content: center; cursor: pointer; transition: background var(--dur-fast);
  color: var(--c-on-surf-var);
}
.cal-nav-btn:hover { background: var(--c-surf2); }
.cal-month-year { font-family: var(--font-display); font-size: 20px; font-weight: 500; flex: 1; }
.cal-grid { background: var(--c-surface); border-radius: var(--r-xl); border: 1px solid var(--c-outline-var); overflow: hidden; }
.cal-day-labels { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day-label {
  padding: 12px 0; text-align: center; font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px; color: var(--c-on-surf-var);
  border-bottom: 1px solid var(--c-outline-var);
}
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day {
  min-height: 80px; padding: 8px; border-right: 1px solid var(--c-outline-var);
  border-bottom: 1px solid var(--c-outline-var); cursor: pointer;
  transition: background var(--dur-fast); position: relative;
}
.cal-day:hover { background: var(--c-surf1); }
.cal-day.other-month { opacity: .4; }
.cal-day.today .cal-day-num {
  background: var(--c-primary); color: var(--c-on-primary);
  border-radius: var(--r-full); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
}
.cal-day.selected { background: var(--c-primary-cont); }
.cal-day-num { font-size: 13px; font-weight: 500; font-family: var(--font-ui); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.cal-task-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
.cal-task-dot {
  padding: 1px 6px; border-radius: var(--r-full); font-size: 10px; font-weight: 500;
  background: var(--c-secondary-cont); color: var(--c-on-secondary-cont);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  font-family: var(--font-ui);
}
.cal-task-dot.overdue { background: var(--c-error-cont); color: var(--c-error); }
.cal-selected-tasks { background: var(--c-surface); border-radius: var(--r-xl); border: 1px solid var(--c-outline-var); padding: 20px; }
.cal-selected-header { font-family: var(--font-display); font-size: 16px; font-weight: 500; margin-bottom: 12px; }

/* ══════════════════════════════════════
   MESSAGES PAGE
══════════════════════════════════════ */
.page-messages { display: flex; height: 100%; overflow: hidden; }

/* Channels sidebar */
.msg-sidebar {
  width: 260px; flex-shrink: 0; display: flex; flex-direction: column;
  border-right: 1px solid var(--c-outline-var); overflow-y: auto;
  background: var(--bg-nav); backdrop-filter: blur(8px);
}
.msg-sidebar-section { padding: 16px 12px 8px; }
.msg-sidebar-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  color: var(--c-on-surf-var); padding: 0 4px; margin-bottom: 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.msg-channel-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: var(--r-lg); cursor: pointer; transition: background var(--dur-fast);
  color: var(--c-on-surf-var); font-family: var(--font-ui); font-size: 14px;
}
.msg-channel-item:hover { background: var(--c-surf2); color: var(--c-on-surface); }
.msg-channel-item.active { background: var(--c-primary-cont); color: var(--c-on-primary-cont); font-weight: 500; }
.msg-channel-item .ms { font-size: 18px; }
.msg-channel-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.msg-unread {
  background: var(--c-primary); color: var(--c-on-primary);
  border-radius: var(--r-full); font-size: 10px; font-weight: 700;
  min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0 4px;
}

/* Message area */
.msg-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.msg-header {
  padding: 12px 20px; border-bottom: 1px solid var(--c-outline-var);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.msg-header-name { font-family: var(--font-ui); font-size: 16px; font-weight: 600; flex: 1; }
.msg-header-desc { font-size: 13px; color: var(--c-on-surf-var); }
.msg-feed { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }
.msg-day-divider {
  display: flex; align-items: center; gap: 12px; padding: 8px 0; margin: 8px 0;
}
.msg-day-divider::before, .msg-day-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--c-outline-var);
}
.msg-day-text { font-size: 12px; color: var(--c-on-surf-var); font-family: var(--font-ui); font-weight: 500; white-space: nowrap; }
.msg-group { display: flex; gap: 12px; padding: 4px 0; }
.msg-group.mine { flex-direction: row-reverse; }
.msg-group-avatar { margin-top: 4px; flex-shrink: 0; }
.msg-group-content { display: flex; flex-direction: column; gap: 2px; max-width: 70%; }
.msg-group.mine .msg-group-content { align-items: flex-end; }
.msg-sender { font-size: 13px; font-weight: 500; font-family: var(--font-ui); margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
.msg-time-label { font-size: 11px; color: var(--c-on-surf-var); font-weight: 400; }
.msg-bubble {
  background: var(--c-surf2); border-radius: var(--r-lg) var(--r-lg) var(--r-lg) 4px;
  padding: 10px 14px; font-size: 14px; line-height: 1.6;
  max-width: 100%; word-break: break-word; position: relative;
  cursor: default; transition: background var(--dur-fast);
}
.msg-bubble:hover { background: var(--c-surf3); }
.msg-group.mine .msg-bubble { background: var(--c-primary-cont); border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg); }
.msg-bubble .mention { color: var(--c-primary); font-weight: 500; cursor: pointer; }
.msg-bubble .mention:hover { text-decoration: underline; }
.msg-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.msg-reaction {
  display: flex; align-items: center; gap: 4px; padding: 2px 8px;
  background: var(--c-surf1); border: 1px solid var(--c-outline-var);
  border-radius: var(--r-full); font-size: 13px; cursor: pointer;
  transition: all var(--dur-fast);
}
.msg-reaction:hover { background: var(--c-primary-cont); border-color: var(--c-primary); }
.msg-reaction.mine { background: var(--c-primary-cont); border-color: var(--c-primary); }
.msg-reaction-count { font-size: 12px; font-family: var(--font-ui); font-weight: 500; }
.msg-actions {
  display: flex; gap: 2px; opacity: 0; transition: opacity var(--dur-fast);
  margin-top: 4px;
}
.msg-group:hover .msg-actions { opacity: 1; }
.msg-action-btn {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: var(--r-md); cursor: pointer;
  background: var(--c-surf1); border: 1px solid var(--c-outline-var);
  color: var(--c-on-surf-var); font-size: 15px; transition: all var(--dur-fast);
}
.msg-action-btn:hover { background: var(--c-surf3); color: var(--c-primary); }
.msg-thread-count {
  font-size: 12px; color: var(--c-primary); font-family: var(--font-ui); font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 4px; margin-top: 2px;
}
.msg-thread-count:hover { text-decoration: underline; }
.msg-thread-count .ms { font-size: 14px; }

/* Message input */
.msg-input-area { padding: 12px 16px; border-top: 1px solid var(--c-outline-var); flex-shrink: 0; }
.msg-input-wrap {
  background: var(--c-surf1); border-radius: var(--r-xl); padding: 8px 8px 8px 16px;
  border: 1.5px solid var(--c-outline-var); transition: border-color var(--dur-fast);
  display: flex; flex-direction: column; gap: 8px;
}
.msg-input-wrap:focus-within { border-color: var(--c-primary); background: var(--c-surface); }
.msg-input-toolbar { display: flex; align-items: center; gap: 4px; }
.msg-input-field {
  font-size: 14px; width: 100%; min-height: 40px; max-height: 120px; resize: none;
  line-height: 1.5; padding: 4px 0;
}
.msg-input-field::placeholder { color: var(--c-on-surf-var); opacity: .7; }
.msg-input-bottom { display: flex; align-items: center; justify-content: space-between; }
.msg-input-tools { display: flex; gap: 4px; }
.msg-input-tool {
  width: 32px; height: 32px; border-radius: var(--r-md); display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  color: var(--c-on-surf-var); transition: all var(--dur-fast); font-size: 18px;
}
.msg-input-tool:hover { background: var(--c-surf2); color: var(--c-primary); }
.msg-send-btn {
  width: 36px; height: 36px; border-radius: var(--r-full); background: var(--c-primary);
  color: var(--c-on-primary); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all var(--dur-fast); flex-shrink: 0;
}
.msg-send-btn:hover { transform: scale(1.08); box-shadow: var(--el2); }
.msg-send-btn:disabled { opacity: .4; cursor: default; transform: none; }
.msg-send-btn .ms { font-size: 18px; }

/* Mention autocomplete */
.mention-popup {
  position: absolute; bottom: calc(100% + 8px); left: 16px;
  background: var(--c-surface); border-radius: var(--r-xl); box-shadow: var(--el3);
  border: 1px solid var(--c-outline-var); overflow: hidden; min-width: 200px;
  z-index: 50;
}
.mention-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  cursor: pointer; transition: background var(--dur-fast);
}
.mention-item:hover, .mention-item.selected { background: var(--c-primary-cont); }
.mention-item-name { font-size: 14px; font-weight: 500; font-family: var(--font-ui); }

/* Thread panel */
.msg-thread-panel {
  width: 340px; flex-shrink: 0; border-left: 1px solid var(--c-outline-var);
  display: flex; flex-direction: column; overflow: hidden;
  animation: slideInRight var(--dur-med) var(--ease-out);
}
.msg-thread-header {
  padding: 14px 16px; border-bottom: 1px solid var(--c-outline-var);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.msg-thread-title { font-family: var(--font-ui); font-size: 16px; font-weight: 600; flex: 1; }
.msg-thread-feed { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg-thread-root {
  background: var(--c-surf1); border-radius: var(--r-xl); padding: 14px;
  border-left: 3px solid var(--c-primary);
}
.msg-thread-input { padding: 12px 16px; border-top: 1px solid var(--c-outline-var); }

/* Emoji picker */
.emoji-picker {
  position: absolute; bottom: calc(100% + 8px); right: 0;
  background: var(--c-surface); border-radius: var(--r-xl); box-shadow: var(--el3);
  border: 1px solid var(--c-outline-var); padding: 8px 12px;
  display: flex; gap: 4px; z-index: 50;
}
.emoji-opt {
  width: 36px; height: 36px; border-radius: var(--r-md); display: flex;
  align-items: center; justify-content: center; font-size: 20px; cursor: pointer;
  transition: background var(--dur-fast);
}
.emoji-opt:hover { background: var(--c-surf2); transform: scale(1.2); }

/* ══════════════════════════════════════
   ADMIN PAGE
══════════════════════════════════════ */
.page-admin { padding: 24px; max-width: 800px; display: flex; flex-direction: column; gap: 24px; }
.admin-section { background: var(--c-surface); border-radius: var(--r-xl); border: 1px solid var(--c-outline-var); overflow: hidden; }
.admin-section-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--c-outline-var);
  display: flex; align-items: center; gap: 12px;
}
.admin-section-header .ms { color: var(--c-primary); font-size: 22px; }
.admin-section-title { font-family: var(--font-display); font-size: 18px; font-weight: 500; }
.admin-section-body { padding: 20px 24px; }
.user-table { display: flex; flex-direction: column; gap: 8px; }
.user-row {
  display: flex; align-items: center; gap: 14px; padding: 12px 16px;
  background: var(--c-surf1); border-radius: var(--r-lg); border: 1px solid var(--c-outline-var);
}
.user-row-info { flex: 1; min-width: 0; }
.user-row-name { font-size: 15px; font-weight: 500; font-family: var(--font-ui); }
.user-row-email { font-size: 12px; color: var(--c-on-surf-var); margin-top: 2px; }
.user-row-role { display: flex; gap: 4px; }
.role-badge {
  padding: 3px 10px; border-radius: var(--r-full); font-size: 12px; font-weight: 600;
  font-family: var(--font-ui); letter-spacing: .3px;
}
.role-admin { background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.role-manager { background: var(--c-secondary-cont); color: var(--c-on-secondary-cont); }
.role-member { background: var(--c-surf3); color: var(--c-on-surf-var); }
.theme-controls { display: flex; flex-direction: column; gap: 20px; }
.color-row { display: flex; gap: 10px; flex-wrap: wrap; }
.color-swatch {
  width: 40px; height: 40px; border-radius: var(--r-full); cursor: pointer;
  border: 3px solid transparent; transition: all var(--dur-fast); flex-shrink: 0;
}
.color-swatch.active { border-color: var(--c-on-surface); transform: scale(1.15); box-shadow: var(--el2); }
.color-swatch:hover { transform: scale(1.1); }
.font-row { display: flex; gap: 8px; flex-wrap: wrap; }
.font-chip {
  padding: 8px 16px; border-radius: var(--r-full); border: 1.5px solid var(--c-outline-var);
  font-size: 14px; cursor: pointer; transition: all var(--dur-fast); background: var(--c-surf1);
}
.font-chip.active { background: var(--c-primary-cont); color: var(--c-on-primary-cont); border-color: var(--c-primary); }
.theme-mode-row { display: flex; gap: 8px; }
.theme-mode-btn {
  flex: 1; padding: 12px; border-radius: var(--r-lg); border: 1.5px solid var(--c-outline-var);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; transition: all var(--dur-fast); background: var(--c-surf1);
  font-size: 13px; font-family: var(--font-ui); font-weight: 500;
}
.theme-mode-btn .ms { font-size: 24px; color: var(--c-on-surf-var); }
.theme-mode-btn.active { background: var(--c-primary-cont); color: var(--c-on-primary-cont); border-color: var(--c-primary); }
.theme-mode-btn.active .ms { color: var(--c-on-primary-cont); }
.notif-section { display: flex; align-items: center; gap: 16px; padding: 14px 16px;
  background: var(--c-surf1); border-radius: var(--r-lg); border: 1px solid var(--c-outline-var); }
.notif-section-info { flex: 1; }
.notif-section-title { font-size: 14px; font-weight: 500; font-family: var(--font-ui); }
.notif-section-sub { font-size: 12px; color: var(--c-on-surf-var); margin-top: 2px; }

/* ══════════════════════════════════════
   NOTIFICATION CENTER
══════════════════════════════════════ */
.notif-panel {
  position: fixed; top: 64px; right: 16px; width: 360px; max-height: 480px;
  background: var(--c-surface); border-radius: var(--r-2xl); box-shadow: var(--el3);
  border: 1px solid var(--c-outline-var); overflow: hidden; z-index: 50;
  display: flex; flex-direction: column;
  animation: slideDown var(--dur-med) var(--ease-out);
}
.notif-panel-header { padding: 16px 20px; border-bottom: 1px solid var(--c-outline-var); display: flex; align-items: center; }
.notif-panel-title { font-family: var(--font-ui); font-size: 16px; font-weight: 600; flex: 1; }
.notif-list { flex: 1; overflow-y: auto; }
.notif-item {
  display: flex; gap: 12px; padding: 14px 20px; cursor: pointer;
  border-bottom: 1px solid var(--c-outline-var); transition: background var(--dur-fast);
}
.notif-item:hover { background: var(--c-surf1); }
.notif-item.unread { background: var(--c-primary-cont); }
.notif-item.unread:hover { background: var(--c-surf2); }
.notif-body { flex: 1; }
.notif-text { font-size: 13px; line-height: 1.5; }
.notif-time { font-size: 11px; color: var(--c-on-surf-var); margin-top: 3px; }
.notif-icon .ms { font-size: 22px; color: var(--c-primary); }
.snooze-popup {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--c-surface); border-radius: var(--r-xl); box-shadow: var(--el3);
  border: 1px solid var(--c-outline-var); overflow: hidden; min-width: 180px; z-index: 60;
}
.snooze-item {
  padding: 12px 16px; cursor: pointer; font-size: 14px; font-family: var(--font-ui);
  transition: background var(--dur-fast); display: flex; align-items: center; gap: 10px;
}
.snooze-item:hover { background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.snooze-item .ms { font-size: 18px; }

/* ══════════════════════════════════════
   TASK REFERENCE IN MESSAGES
══════════════════════════════════════ */
.msg-task-ref {
  display: flex; align-items: center; gap: 10px;
  background: var(--c-surf1); border: 1px solid var(--c-outline-var);
  border-left: 3px solid var(--c-primary); border-radius: var(--r-lg);
  padding: 10px 14px; cursor: pointer; margin: 6px 0;
  transition: all var(--dur-fast); max-width: 360px;
}
.msg-task-ref:hover { background: var(--c-primary-cont); border-left-color: var(--c-primary); box-shadow: var(--el1); }
.msg-task-ref-icon { flex-shrink: 0; }
.msg-task-ref-icon .ms { color: var(--c-primary); font-size: 20px; }
.msg-task-ref-body { flex: 1; min-width: 0; }
.msg-task-ref-title { font-size: 13px; font-weight: 500; font-family: var(--font-ui); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-task-ref-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.msg-task-ref-meta .badge { font-size: 10px; padding: 1px 6px; }
.msg-task-ref-meta .priority-dot { width: 7px; height: 7px; }
.msg-task-ref-due { font-size: 11px; color: var(--c-on-surf-var); display: flex; align-items: center; gap: 3px; }
.msg-task-ref-due .ms { font-size: 12px; }
.msg-task-ref-due.overdue { color: var(--c-error); }
.msg-group.mine .msg-task-ref { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.2); }
.msg-group.mine .msg-task-ref:hover { background: rgba(255,255,255,.2); }

/* Task Picker Popup */
.task-picker-popup {
  position: absolute; bottom: calc(100% + 8px); left: 16px; right: 16px;
  background: var(--c-surface); border-radius: var(--r-xl); box-shadow: var(--el3);
  border: 1px solid var(--c-outline-var); overflow: hidden; z-index: 50;
  animation: slideUp var(--dur-fast) var(--ease-out);
  max-height: 280px; overflow-y: auto;
}
.task-picker-header {
  padding: 10px 16px; border-bottom: 1px solid var(--c-outline-var);
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
  color: var(--c-on-surf-var); position: sticky; top: 0; background: var(--c-surface);
  display: flex; align-items: center; gap: 6px;
}
.task-picker-header .ms { font-size: 14px; color: var(--c-primary); }
.task-picker-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  cursor: pointer; transition: background var(--dur-fast);
}
.task-picker-item:hover, .task-picker-item.selected { background: var(--c-primary-cont); color: var(--c-on-primary-cont); }
.task-picker-item:hover .task-picker-status, .task-picker-item.selected .task-picker-status { opacity: .8; }
.task-picker-title { flex: 1; font-size: 13px; font-weight: 500; font-family: var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-picker-status { font-size: 11px; color: var(--c-on-surf-var); font-family: var(--font-ui); flex-shrink: 0; }

/* Firebase Admin Section extras */
.firebase-status {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-radius: var(--r-lg); font-size: 13px; font-family: var(--font-ui);
}
.firebase-status.connected { background: #C8F5D0; color: #1A5C2A; }
.firebase-status.disconnected { background: var(--c-surf2); color: var(--c-on-surf-var); }
.firebase-status.error { background: var(--c-error-cont); color: var(--c-error); }
.firebase-status .ms { font-size: 18px; }
.fcm-token-box {
  background: var(--c-surf1); border-radius: var(--r-lg); padding: 12px 14px;
  font-family: var(--font-mono); font-size: 11px; word-break: break-all;
  border: 1px solid var(--c-outline-var); line-height: 1.6; color: var(--c-on-surf-var);
  max-height: 80px; overflow-y: auto;
}
.config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .config-grid { grid-template-columns: 1fr; } }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast-container {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none;
}
.toast {
  background: var(--c-inv-surface); color: var(--c-inv-on-surface);
  border-radius: var(--r-full); padding: 12px 24px; font-size: 14px; font-family: var(--font-ui);
  box-shadow: var(--el3); pointer-events: auto; display: flex; align-items: center; gap: 10px;
  animation: slideUp var(--dur-med) var(--ease-out);
  max-width: 400px; text-align: center;
}
.toast.exiting { animation: slideDown var(--dur-fast) var(--ease-in) forwards; }
.toast .ms { font-size: 18px; }
.toast-action { color: var(--c-inv-primary); font-weight: 600; cursor: pointer; margin-left: 4px; }

/* ══════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════ */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideDown {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(16px); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(24px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
.spin { animation: spin 1s linear infinite; }
.pulse { animation: pulse 1.5s ease-in-out infinite; }

/* ── Scrollbar in messages feed ── */
.msg-feed, .msg-thread-feed { scrollbar-width: thin; scrollbar-color: var(--c-outline-var) transparent; }

/* ── User select none for UI ── */
.nav-item, .btn, .chip, .icon-btn, .task-card, .kanban-card { user-select: none; }

/* ══════════════════════════════════════
   MATERIAL DESIGN 3 — MOBILE NATIVE
   Google Material Expressive
══════════════════════════════════════ */

/* ── MD3 Bottom Navigation Bar ── */
.mobile-nav-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  height: 80px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: var(--bg-nav);
  backdrop-filter: blur(24px) saturate(200%);
  border-top: 1px solid var(--c-outline-var);
  box-shadow: 0 -2px 12px rgba(0,0,0,.08);
}
.mobile-nav-inner {
  display: flex; height: 80px; align-items: center;
}
.mobile-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 10px 4px 8px; cursor: pointer; position: relative;
  -webkit-tap-highlight-color: transparent; min-width: 0;
}
.mobile-nav-item .ms { font-size: 24px; color: var(--c-on-surf-var); transition: color var(--dur-fast), transform var(--dur-fast) var(--ease-out); }
.mobile-nav-item .mobile-nav-label { font-family: var(--font-ui); font-size: 11px; font-weight: 500; color: var(--c-on-surf-var); white-space: nowrap; letter-spacing: .3px; transition: color var(--dur-fast); }
.mobile-nav-item.active .ms { color: var(--c-on-primary-cont); }
.mobile-nav-item.active .mobile-nav-label { color: var(--c-on-primary-cont); font-weight: 700; }
/* MD3 indicator pill */
.mobile-nav-indicator {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 64px; height: 32px; border-radius: var(--r-full);
  background: transparent; transition: background var(--dur-fast) var(--ease-out);
}
.mobile-nav-item.active .mobile-nav-indicator { background: var(--c-primary-cont); }
.mobile-nav-badge {
  position: absolute; top: 4px; right: calc(50% - 20px);
  background: var(--c-error); color: var(--c-on-error);
  border-radius: var(--r-full); font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  padding: 0 3px; border: 1.5px solid var(--c-surface);
}

/* ── MD3 Navigation Drawer (bottom sheet "More") ── */
.nav-drawer-scrim {
  position: fixed; inset: 0; background: var(--bg-modal); z-index: 90;
  animation: fadeIn var(--dur-med) ease; backdrop-filter: blur(2px);
}
.nav-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 95;
  background: var(--c-surface);
  border-radius: var(--r-3xl) var(--r-3xl) 0 0;
  padding: 8px 0 calc(32px + env(safe-area-inset-bottom, 0px));
  box-shadow: var(--el3);
  animation: slideUp var(--dur-med) var(--ease-out);
  max-height: 85vh; overflow-y: auto;
}
.nav-drawer-handle {
  width: 40px; height: 4px; background: var(--c-outline-var);
  border-radius: var(--r-full); margin: 8px auto 16px;
}
.nav-drawer-header {
  padding: 4px 24px 12px; display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--c-outline-var); margin-bottom: 8px;
}
.nav-drawer-logo-mark {
  width: 40px; height: 40px; border-radius: var(--r-lg);
  background: var(--c-primary); display: flex; align-items: center; justify-content: center; color: var(--c-on-primary);
}
.nav-drawer-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--c-primary); }
.nav-drawer-sub { font-size: 11px; color: var(--c-on-surf-var); text-transform: uppercase; letter-spacing: .6px; }
.nav-drawer-item {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px; cursor: pointer; color: var(--c-on-surface);
  transition: background var(--dur-fast); -webkit-tap-highlight-color: transparent;
  position: relative;
}
.nav-drawer-item:hover, .nav-drawer-item:active { background: var(--c-surf1); }
.nav-drawer-item.active { color: var(--c-on-primary-cont); }
.nav-drawer-item.active::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--c-primary); border-radius: 0 var(--r-full) var(--r-full) 0;
}
.nav-drawer-item .ms { font-size: 22px; color: var(--c-on-surf-var); flex-shrink: 0; }
.nav-drawer-item.active .ms { color: var(--c-primary); }
.nav-drawer-item-text { font-family: var(--font-ui); font-size: 15px; font-weight: 500; flex: 1; }
.nav-drawer-badge { background: var(--c-error); color: var(--c-on-error); border-radius: var(--r-full); font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.nav-drawer-divider { height: 1px; background: var(--c-outline-var); margin: 8px 24px; }
.nav-drawer-section-label { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--c-on-surf-var); padding: 8px 24px 4px; }

/* ── MD3 Mobile Topbar ── */
.mobile-topbar {
  display: none; position: sticky; top: 0; z-index: 20;
  height: 56px; padding: 0 4px 0 8px;
  align-items: center; gap: 4px;
  background: var(--c-surface);
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.mobile-topbar.scrolled { border-color: var(--c-outline-var); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.mobile-topbar-title { font-family: var(--font-display); font-size: 22px; font-weight: 500; flex: 1; padding-left: 8px; color: var(--c-on-surface); }
.mobile-search-overlay {
  display: flex; position: fixed; inset: 0; z-index: 80;
  background: var(--c-surface);
  flex-direction: column; gap: 0; padding-top: 12px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  animation: slideUp var(--dur-med) var(--ease-out);
}
.mobile-search-bar {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border-bottom: 1px solid var(--c-outline-var); flex-shrink: 0;
}
.mobile-search-bar input {
  flex: 1; font-size: 17px; font-family: var(--font-ui); background: none; border: none; outline: none; color: var(--c-on-surface); padding: 8px 4px;
}
.mobile-search-results { flex: 1; overflow-y: auto; padding: 8px 16px; }
.mobile-search-result-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 8px;
  border-radius: var(--r-lg); cursor: pointer; transition: background var(--dur-fast);
}
.mobile-search-result-item:hover, .mobile-search-result-item:active { background: var(--c-surf1); }

/* ── MD3 Bottom Sheet (Full-width modal) ── */
.md3-sheet-overlay {
  position: fixed; inset: 0; z-index: 100; background: var(--bg-modal);
  backdrop-filter: blur(4px);
  display: flex; flex-direction: column; justify-content: flex-end;
  animation: fadeIn var(--dur-fast) ease;
}
.md3-sheet {
  background: var(--c-surface);
  border-radius: var(--r-3xl) var(--r-3xl) 0 0;
  width: 100%;
  max-height: 96vh; overflow-y: auto;
  padding: 0 0 calc(24px + env(safe-area-inset-bottom, 0px));
  animation: slideUp var(--dur-med) var(--ease-out);
  overscroll-behavior: contain;
}
.md3-sheet-handle {
  width: 40px; height: 4px; background: var(--c-outline-var);
  border-radius: var(--r-full); margin: 12px auto 0;
}
.md3-sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px 8px;
}
.md3-sheet-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; }
.md3-sheet-close { width: 40px; height: 40px; border-radius: var(--r-full); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background var(--dur-fast); }
.md3-sheet-close:hover { background: var(--c-surf2); }
.md3-sheet-body { padding: 8px 24px 16px; display: flex; flex-direction: column; gap: 16px; }

/* ── MD3 Page transitions ── */
@keyframes pageEnter {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page-enter { animation: pageEnter var(--dur-med) var(--ease-out); }

/* ── MD3 FAB (Extended + Compact) ── */
.fab {
  position: fixed; right: 20px; bottom: 24px;
  background: var(--c-primary-cont); color: var(--c-on-primary-cont);
  border-radius: var(--r-2xl); padding: 14px 20px;
  box-shadow: var(--el3); display: flex; align-items: center; gap: 10px;
  font-family: var(--font-ui); font-size: 15px; font-weight: 600;
  cursor: pointer; z-index: 30; transition: all var(--dur-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}
.fab:hover { box-shadow: var(--el3), 0 0 0 4px var(--c-primary-cont); transform: scale(1.02); }
.fab:active { transform: scale(0.97); }
.fab .ms { font-size: 22px; }

/* ── Swipe-to-dismiss hint on task cards ── */
.task-card {
  transition: all var(--dur-fast), transform .15s ease;
}
.task-card:active { transform: scale(0.985); }

/* ── MD3 Chip improvements ── */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: var(--r-full);
  font-family: var(--font-ui); font-size: 13px; font-weight: 500;
  background: var(--c-surf2); color: var(--c-on-surf-var);
  cursor: pointer; border: 1px solid transparent;
  transition: all var(--dur-fast); white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  min-height: 32px;
}
.chip:hover { background: var(--c-surf3); }
.chip.active { background: var(--c-primary-cont); color: var(--c-on-primary-cont); border-color: var(--c-primary); font-weight: 600; }

/* ── MD3 Button overrides ── */
.btn-filled, .btn.btn-filled { min-height: 40px; }
.btn-sm { min-height: 36px; }

/* ── MD3 Avatar with online indicator ── */
.avatar-online::after {
  content: ''; position: absolute; bottom: 0; right: 0;
  width: 10px; height: 10px; border-radius: 50%; background: #22C55E;
  border: 2px solid var(--c-surface);
}
.avatar { position: relative; }

/* ══════════════════════════════════════
   RESPONSIVE — MD3 BREAKPOINTS
══════════════════════════════════════ */

/* Tablet: 601–840px */
@media (max-width: 840px) {
  .nav-rail { width: 72px; }
  .msg-sidebar { width: 200px; }
  .msg-thread-panel { display: none; }
  .page-tasks, .page-admin, .page-changelog, .page-integrations { padding: 16px; }
  .kanban-col { min-width: 220px; }
  .page-mytasks, .page-accountability { padding: 16px; }
  .integration-grid { grid-template-columns: 1fr 1fr; }
}

/* Mobile: ≤600px — full MD3 mobile layout */
@media (max-width: 600px) {
  /* Hide desktop nav */
  .nav-rail { display: none !important; }

  /* Show mobile nav */
  .mobile-nav-bar { display: block; }
  .mobile-topbar { display: flex; }

  /* Hide desktop topbar */
  .topbar { display: none; }

  /* Page content needs bottom nav padding */
  .page-content {
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  }

  /* FAB above bottom nav */
  .fab {
    bottom: calc(88px + env(safe-area-inset-bottom, 0px));
    right: 16px; padding: 14px 16px; border-radius: var(--r-2xl);
  }

  /* Task page */
  .page-tasks { padding: 12px 12px 0; gap: 12px; }
  .task-filters { gap: 6px; padding-bottom: 4px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 6px; }
  .task-filters::-webkit-scrollbar { display: none; }
  .task-card { padding: 14px 14px; }
  .task-title { font-size: 15px; white-space: normal; line-height: 1.4; }
  .task-actions { opacity: 1; } /* Always visible on mobile */

  /* Kanban */
  .page-kanban { padding: 0 12px 0; }
  .kanban-board { gap: 10px; padding: 12px 0 20px; }
  .kanban-col { min-width: 260px; max-width: 82vw; }

  /* Calendar */
  .page-calendar { padding: 12px; }

  /* Messages — single pane */
  .msg-layout { flex-direction: column; }
  .msg-sidebar { display: none; width: 100%; height: 100%; position: absolute; inset: 0; z-index: 10; background: var(--c-surface); }
  .msg-sidebar.mobile-visible { display: flex; flex-direction: column; }
  .msg-main { flex: 1; display: flex; flex-direction: column; }
  .msg-thread-panel { display: none !important; }

  /* Admin */
  .page-admin { padding: 12px 12px 0; }
  .config-grid { grid-template-columns: 1fr; }
  .accountability-grid { grid-template-columns: 1fr; }

  /* Modals become full bottom sheets */
  .modal {
    border-radius: var(--r-3xl) var(--r-3xl) 0 0;
    max-height: 95vh;
    padding: 8px 20px calc(24px + env(safe-area-inset-bottom, 0px));
  }
  .modal-actions { flex-wrap: wrap; }
  .modal-actions .btn { flex: 1; justify-content: center; min-height: 44px; }

  /* Status select wraps */
  .status-select { grid-template-columns: 1fr 1fr; }

  /* Fields */
  .field-input { min-height: 44px; }
  .field-input input, .field-input select { font-size: 16px; } /* prevent iOS zoom */

  /* Chips on mobile */
  .chip { min-height: 36px; padding: 6px 12px; font-size: 13px; }

  /* Charts / page variants */
  .page-mytasks, .page-accountability { padding: 12px 12px 0; gap: 14px; }
  .mytasks-hero { padding: 20px; border-radius: var(--r-2xl); }
  .accountability-leaderboard { padding: 16px; }
  .page-integrations, .page-changelog { padding: 12px 12px 0; }

  /* Notif panel full screen */
  .notif-panel {
    position: fixed; inset: 0; right: 0; top: 0; bottom: 0;
    width: 100% !important; max-width: 100% !important;
    border-radius: 0; z-index: 60;
    border-left: none; border-top: 1px solid var(--c-outline-var);
  }
  /* Bottom bar inside notif panel */
  .notif-panel::before { content: ''; display: block; height: env(safe-area-inset-top, 0); }

  /* What's New overlay */
  .whats-new-overlay { padding: 0; align-items: flex-end; }
  .whats-new-card { border-radius: var(--r-3xl) var(--r-3xl) 0 0; max-width: 100%; }

  /* Profile modal */
  .modal-sheet { max-width: 100% !important; }

  /* Integrations */
  .integration-card-header { padding: 14px 16px; gap: 10px; }
  .integration-body { padding: 0 16px 16px; }
  .integration-grid { grid-template-columns: 1fr; }
  .integration-info-box { font-size: 12px; }
  .cal-export-row { flex-direction: column; }
  .cal-btn { width: 100%; justify-content: center; padding: 12px; }

  /* Toast */
  .toast-container { bottom: calc(96px + env(safe-area-inset-bottom, 0px)); width: calc(100% - 32px); }
  .toast { border-radius: var(--r-xl); width: 100%; justify-content: center; }
}

/* ── Safe area handling ── */
@supports (padding: env(safe-area-inset-bottom)) {
  .mobile-nav-bar { padding-bottom: env(safe-area-inset-bottom); height: calc(64px + env(safe-area-inset-bottom)); }
  .mobile-nav-inner { height: 64px; margin-bottom: env(safe-area-inset-bottom); }
}

/* ── iOS momentum scroll ── */
.page-content, .msg-feed, .task-list, .comments-list {
  -webkit-overflow-scrolling: touch;
}

/* ── Landscape phone ── */
@media (max-width: 900px) and (orientation: landscape) {
  .mobile-nav-bar { height: 52px; }
  .mobile-nav-inner { height: 52px; }
  .mobile-nav-item { padding: 6px 4px; }
  .mobile-nav-label { display: none; }
}

/* ══════════════════════════════════════
   INTEGRATIONS PAGE
══════════════════════════════════════ */
.page-integrations { padding: 24px; max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

/* ══════════════════════════════════════

/* ══════════════════════════════════════

══════════════════════════════════════ */

.digest-section-title { font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--c-on-surf-var); margin-bottom: 8px; }
.digest-task-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--c-outline-var); font-size: 13px; }

/* ══════════════════════════════════════

══════════════════════════════════════ */

.cal-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--r-full); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity var(--dur-fast); }

.cal-btn.outlook { background: #0078D4; color: #fff; }

/* ══════════════════════════════════════
   SUBTASKS / CHECKLIST
══════════════════════════════════════ */
.subtask-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.subtask-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;

}
.subtask-item:hover { background: var(--c-surf2); }
.subtask-check {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--c-outline);
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
  transition: all var(--dur-fast);
}
.subtask-check.done { background: var(--c-primary); border-color: var(--c-primary); color: var(--c-on-primary); }
.subtask-check.done::after { content: '✓'; font-size: 11px; font-weight: 700; }
.subtask-text { flex: 1; font-size: 14px; }
.subtask-text.done { text-decoration: line-through; color: var(--c-on-surf-var); }
.subtask-del { opacity: 0; transition: opacity var(--dur-fast); }
.subtask-item:hover .subtask-del { opacity: 1; }
.subtask-add-row { display: flex; gap: 8px; margin-top: 8px; }
.subtask-progress { height: 6px; background: var(--c-outline-var); border-radius: var(--r-full); overflow: hidden; margin-top: 8px; }
.subtask-progress-fill { height: 100%; background: var(--c-primary); border-radius: var(--r-full); transition: width .4s var(--ease-out); }
.subtask-progress-label { font-size: 11px; color: var(--c-on-surf-var); margin-top: 4px; }

/* ══════════════════════════════════════

══════════════════════════════════════ */

}

}

.tag-chip.selected { box-shadow: 0 0 0 2px var(--c-on-surface); }
.tag-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

/* ══════════════════════════════════════

══════════════════════════════════════ */

}

/* ══════════════════════════════════════

══════════════════════════════════════ */

.activity-text strong { font-weight: 600; }

/* ══════════════════════════════════════
   MY TASKS PAGE
══════════════════════════════════════ */
.page-mytasks { padding: 24px; max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

/* ══════════════════════════════════════
   ACCOUNTABILITY PAGE
══════════════════════════════════════ */

.accountability-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--c-on-surf-var); margin-bottom: 6px; }
