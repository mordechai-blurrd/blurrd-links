  const avatarUrl = document.getElementById('avatar-url-input')?.value?.trim() || '';
  const password = document.getElementById('profile-password')?.value || '';
  u.name = name;
  u.initials = initials(name);
  u.avatar = avatarUrl || null;
  u.password = password;
  const idx = S.users.findIndex(x => x.id === u.id);
  if (idx !== -1) S.users[idx] = { ...S.users[idx], ...u };
  S.currentUser = S.users[idx] || u;

  render();
  toast('Profile updated! ⛳');
}

function renderSnoozeMenu(nid) {
  return `<div class="snooze-popup">
    <div class="snooze-item" onclick="snoozeNotif('${nid}',15)"><span class="ms">schedule</span>Snooze 15 min</div>
    <div class="snooze-item" onclick="snoozeNotif('${nid}',60)"><span class="ms">schedule</span>Snooze 1 hour</div>
    <div class="snooze-item" onclick="snoozeNotif('${nid}',1440)"><span class="ms">today</span>Snooze until tomorrow</div>

function clickNotif(id) {
  const n = S.notifications.find(x => x.id === id);
  if (!n) return;
  n.read = true;
  saveState();
  if (n.page) { S.page = n.page; if (n.channelId) S.selectedChannelId = n.channelId; }
  S.notifPanelOpen = false;
  render();
}

function markAllNotifRead() {
  S.notifications.forEach(n => n.read = true);
  saveState();
  render();
}

function openSnooze(e, nid) {
  e.stopPropagation();
  S.snoozeTarget = S.snoozeTarget === nid ? null : nid;
  render();
}

function snoozeNotif(nid, minutes) {
  const n = S.notifications.find(x => x.id === nid);
  if (!n) return;
  n.read = true;
  S.snoozeTarget = null;
  saveState();
  const ms = minutes * 60 * 1000;
  setTimeout(() => {
    n.read = false;
    n.time = Date.now();
    n.text = `[Snoozed] ${n.text}`;
    saveState();
    sendBrowserNotif('BLURRD Links', n.text, nid);
    render();
  }, ms);
  render();
  toast(`Snoozed for ${minutes < 60 ? minutes + ' min' : minutes === 60 ? '1 hour' : 'tomorrow'}`);
}

function dismissNotif(nid) {
  S.notifications = S.notifications.filter(n => n.id !== nid);
  S.snoozeTarget = null;
  saveState();
  render();
}

function toast(msg, type = 'default') {
  const tc = document.getElementById('toasts');
  if (!tc) return;
  const icons = { default:'check_circle', error:'error', info:'info' };
  const id = uid();
  const el = document.createElement('div');
  el.className = 'toast';
  el.id = 'toast_' + id;
  el.innerHTML = `<span class="ms sm">${icons[type]||'check_circle'}</span>${escHtml(msg)}`;
  tc.appendChild(el);
  setTimeout(() => {
    el.classList.add('exiting');
    setTimeout(() => el.remove(), 200);
  }, 3000);
}

// ═══════════════════════════
// BROWSER NOTIFICATIONS
// ═══════════════════════════
function requestNotifPermission() {
  if (!('Notification' in window)) return;
  Notification.requestPermission();
}

function sendBrowserNotif(title, body, tag = 'blurrd') {
  if (Notification.permission !== 'granted') return;
  const n = new Notification(title, {
    body, tag,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><rect width="48" height="48" rx="12" fill="%230057B8"/><text x="24" y="32" font-size="24" text-anchor="middle" fill="white">⛳</text></svg>'
  });
  n.onclick = () => { window.focus(); n.close(); };
}

function scheduleTaskNotification(task) {
  if (!task?.dueDate) return;
  const due = new Date(task.dueDate + 'T09:00:00').getTime();
  const dayBefore = due - 86400000;
  const now = Date.now();
  if (dayBefore > now) {
    const delay = dayBefore - now;
    setTimeout(() => {
      sendBrowserNotif('Task Due Tomorrow', `"${task.title}" is due tomorrow`, task.id);
      addNotification({ type:'task', text:`"${task.title}" is due tomorrow`, page:'tasks', taskId: task.id });
    }, Math.min(delay, 2147483647));
  }
}

function addNotification(data) {
  S.notifications.unshift({ id: uid(), ...data, time: Date.now(), read: false });
  saveState();
  render();
}

    onclick="openTaskModal('${t.id}')">
    <div style="display:flex;align-items:flex-start;gap:8px">
      <span class="priority-dot ${getPriorityClass(t.priority)}" style="margin-top:6px;flex-shrink:0"></span>
      <div class="kanban-card-title">${escHtml(t.title)}</div>
    </div>
    ${t.dueDate ? `<div class="task-due${overdue?' overdue':''}" style="font-size:12px;display:flex;align-items:center;gap:4px">
      <span class="ms" style="font-size:14px">schedule</span>${overdue ? 'Overdue' : formatDateShort(t.dueDate)}
    </div>` : ''}
    <div class="kanban-card-footer">
      <div class="task-assignees">
        ${t.assignees.slice(0,3).map(id => renderAvatar(id,'sm')).join('')}
        ${t.assignees.length > 3 ? `<div class="avatar sm" style="background:var(--c-outline)">+${t.assignees.length-3}</div>` : ''}
      </div>
      ${t.comments.length ? `<span class="task-attach-count" style="margin-left:auto"><span class="ms" style="font-size:14px">chat_bubble</span>${t.comments.length}</span>` : ''}
      ${t.attachments.length ? `<span class="task-attach-count"><span class="ms" style="font-size:14px">attach_file</span>${t.attachments.length}</span>` : ''}
    </div>
  </div>`;
}

let _dragTaskId = null;
let _dragOriginStatus = null;

function kanbanDragStart(e, taskId) {
  _dragTaskId = taskId;
  const t = getTask(taskId);
  _dragOriginStatus = t?.status;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => document.getElementById('kcard-'+taskId)?.classList.add('dragging'), 10);
}

function kanbanDragEnd(e) {
  document.querySelectorAll('.kanban-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.kanban-col.drag-over-col').forEach(el => el.classList.remove('drag-over-col'));
  _dragTaskId = null;
}

function kanbanDragOver(e, status) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.kanban-col').forEach(el => el.classList.remove('drag-over-col'));
  e.currentTarget.classList.add('drag-over-col');
}

function kanbanDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over-col');
  }
}

function kanbanDrop(e, status) {
  e.preventDefault();
  if (!_dragTaskId) return;
  const t = getTask(_dragTaskId);
  if (t && t.status !== status) {
    const prevStatus = t.status;
    t.status = status;
    t.updatedAt = Date.now();
    saveState();
    renderPageContent();
    toast(`Moved to ${STATUS_LABELS[status]}`);
    if (status === 'done' && prevStatus !== 'done') setTimeout(() => golfCelebrate('task'), 300);
  } else {
    document.querySelectorAll('.kanban-col.drag-over-col').forEach(el => el.classList.remove('drag-over-col'));
  }
}

function openTaskModalWithStatus(status) {
  S.modal = { type: 'task', taskId: null, defaultStatus: status };
  S.editingTaskId = null;
  render();
}

// CALENDAR PAGE
// ═══════════════════════════
function renderCalendarPage() {
  const d = S.calDate;
  const year = d.getFullYear(), month = d.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];
  const monthName = d.toLocaleDateString('en-US', { month:'long', year:'numeric' });

  // Build grid cells
  let cells = [];
  // Previous month padding
  const prevDays = new Date(year, month, 0).getDate();
  for (let i = firstDay-1; i >= 0; i--) cells.push({ day: prevDays-i, other: true, date: null });
  // Current month
  for (let i = 1; i <= daysInMonth; i++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    cells.push({ day: i, other: false, date: dateStr, isToday: dateStr === today, selected: S.calSelectedDate === dateStr });
  }
  // Next month padding
  const remaining = 42 - cells.length;
  for (let i = 1; i <= remaining; i++) cells.push({ day: i, other: true, date: null });

  const tasksByDate = {};
  S.tasks.filter(t => t.dueDate).forEach(t => {
    if (!tasksByDate[t.dueDate]) tasksByDate[t.dueDate] = [];
    tasksByDate[t.dueDate].push(t);
  });

  const selectedTasks = S.calSelectedDate ? (tasksByDate[S.calSelectedDate] || []) : [];

  return `
  <div class="page-calendar">
    <div class="cal-header">
      <div class="cal-nav-btn ripple" onclick="calPrevMonth()"><span class="ms">chevron_left</span></div>
      <div class="cal-month-year">${monthName}</div>
      <div class="cal-nav-btn ripple" onclick="calNextMonth()"><span class="ms">chevron_right</span></div>
      <button class="btn btn-tonal btn-sm ripple" onclick="calGoToday()">Today</button>
    </div>

    <div class="cal-grid">
      <div class="cal-day-labels">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-day-label">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
        ${cells.map(cell => {
          const tasks = cell.date ? (tasksByDate[cell.date] || []) : [];
          return `<div class="cal-day${cell.other?' other-month':''}${cell.isToday?' today':''}${cell.selected?' selected':''}"
            ${cell.date ? `onclick="calSelectDate('${cell.date}')"` : ''}>
            <div class="cal-day-num">${cell.day}</div>
            <div class="cal-task-dots">
              ${tasks.slice(0,3).map(t => `<div class="cal-task-dot${isOverdue(t.dueDate) && t.status!=='done'?' overdue':''}">${escHtml(t.title.slice(0,12))}${t.title.length>12?'…':''}</div>`).join('')}
              ${tasks.length > 3 ? `<div class="cal-task-dot">+${tasks.length-3} more</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${S.calSelectedDate ? `
    <div class="cal-selected-tasks">
      <div class="cal-selected-header">
        Tasks for ${formatDate(S.calSelectedDate)} (${selectedTasks.length})
      </div>
      ${selectedTasks.length === 0 ?
        `<div style="font-size:14px;color:var(--c-on-surf-var)">No tasks due on this date.</div>` :
        `<div class="task-list">${selectedTasks.map(t => renderTaskCard(t)).join('')}</div>`}
    </div>` : ''}
  </div>

  <div class="fab ripple" onclick="openTaskModal(null)">
    <span class="ms">add</span> New Task
  </div>`;
}

function calPrevMonth() {
  S.calDate = new Date(S.calDate.getFullYear(), S.calDate.getMonth()-1, 1);
  renderPageContent();
}
function calNextMonth() {
  S.calDate = new Date(S.calDate.getFullYear(), S.calDate.getMonth()+1, 1);
  renderPageContent();
}
function calGoToday() {
  S.calDate = new Date();
  S.calSelectedDate = new Date().toISOString().split('T')[0];
  renderPageContent();
}
function calSelectDate(date) {
  S.calSelectedDate = S.calSelectedDate === date ? null : date;
  renderPageContent();
}

function renderMessagesPage() {

        </div>`).join('')}

  </div>`;

function renderMsgMain(ch) {
  const msgs = S.messages.filter(m => m.channelId === ch.id && !m.threadId);
  // Mark as read
  S.messages.filter(m => m.channelId === ch.id).forEach(m => m._read = true);

  // Group messages by day, then by sender (consecutive)
  const groups = [];
  let lastDay = null, lastUserId = null, lastGroup = null;
  msgs.forEach(m => {
    const day = new Date(m.timestamp).toDateString();
    if (day !== lastDay) {
      groups.push({ type:'day', label: formatDayLabel(m.timestamp) });
      lastDay = day; lastUserId = null; lastGroup = null;
    }
    const isMine = m.userId === S.currentUser.id;
    if (m.userId !== lastUserId) {
      lastGroup = { type:'group', userId: m.userId, isMine, msgs: [] };
      groups.push(lastGroup);
      lastUserId = m.userId;
    }
    lastGroup.msgs.push(m);
  });

  return `
  <div class="msg-main">
    <div class="msg-header">
      <span class="ms sm" style="color:var(--c-primary)">${ch.type==='dm'?'person':'tag'}</span>
      <div>
        <div class="msg-header-name">${escHtml(ch.name)}</div>
        ${ch.description ? `<div class="msg-header-desc">${escHtml(ch.description)}</div>` : ''}
      </div>
    </div>
    <div class="msg-feed" id="msg-feed">
      ${groups.map(g => g.type === 'day' ?
        `<div class="msg-day-divider"><span class="msg-day-text">${g.label}</span></div>` :
        renderMsgGroup(g)
      ).join('')}
    </div>
    ${renderMsgInput(ch.id)}
  </div>`;
}

function formatDayLabel(ts) {
  const d = new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (d >= today) return 'Today';
  if (d >= yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

function renderMsgGroup(g) {
  const u = getUser(g.userId);
  return `
  <div class="msg-group${g.isMine?' mine':''}">
    <div class="msg-group-avatar">${g.isMine ? '' : renderAvatar(g.userId)}</div>
    <div class="msg-group-content">
      ${!g.isMine ? `<div class="msg-sender">${escHtml(u?.name||'?')}<span class="msg-time-label">${formatTime(g.msgs[0].timestamp)}</span></div>` : ''}
      ${g.msgs.map(m => renderMsgBubble(m, g.isMine)).join('')}
    </div>
    ${g.isMine ? `<div class="msg-group-avatar">${renderAvatar(g.userId)}</div>` : ''}
  </div>`;
}

function renderMsgBubble(m, isMine) {
  const threadReplies = S.messages.filter(r => r.threadId === m.id);
  const reactions = m.reactions || {};
  const emojiHtml = Object.entries(reactions).filter(([,ids]) => ids.length).map(([emoji, ids]) =>
    `<div class="msg-reaction${ids.includes(S.currentUser.id)?' mine':''} ripple" onclick="toggleReaction('${m.id}','${emoji}')" title="${ids.map(id=>getUser(id)?.name).join(', ')}">${emoji}<span class="msg-reaction-count">${ids.length}</span></div>`
  ).join('');

  return `
  <div style="display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'}">
    ${isMine ? `<div class="msg-time-label" style="margin-bottom:2px">${formatTime(m.timestamp)}</div>` : ''}
    <div class="msg-bubble" id="msg-${m.id}">${parseMessageContent(m.content)}${m.edited?'<span style="font-size:11px;opacity:.6;margin-left:6px">(edited)</span>':''}</div>
    ${emojiHtml ? `<div class="msg-reactions">${emojiHtml}</div>` : ''}
    ${threadReplies.length ? `<div class="msg-thread-count" onclick="openThread('${m.id}')"><span class="ms">forum</span>${threadReplies.length} ${threadReplies.length===1?'reply':'replies'}</div>` : ''}
    <div class="msg-actions">
      <div class="msg-action-btn ripple" onclick="openEmojiPicker('${m.id}')" title="React">😊</div>
      <div class="msg-action-btn ripple" onclick="openThread('${m.id}')" title="Reply in thread"><span class="ms sm">reply</span></div>
      ${isMine ? `<div class="msg-action-btn ripple" onclick="deleteMessage('${m.id}')" title="Delete"><span class="ms sm" style="color:var(--c-error)">delete</span></div>` : ''}
    </div>
  </div>`;
}

function renderMsgInput(channelId) {
  const val = S.msgInput[channelId] || '';

  const placeholder = ch?.type === 'dm' ? `Message ${ch.name}` : `Message #${ch?.name||'channel'} — use @ to mention, # to link a task`;

  <div class="msg-input-area" style="position:relative">
    ${S.mentionQuery !== null ? renderMentionPopup() : ''}

      <textarea class="msg-input-field" id="msg-input-${channelId}" placeholder="${escHtml(placeholder)}"
        onkeydown="msgKeyDown(event,'${channelId}')"
        oninput="msgInput(event,'${channelId}')"
        onblur="closeAllPopups()">${escHtml(val)}</textarea>
      <div class="msg-input-bottom">
        <div class="msg-input-tools">

          </div>
          <div class="msg-input-tool ripple" onclick="insertAtMention('${channelId}')" title="Mention someone (@)">
            <span class="ms sm">alternate_email</span>
          </div>
          <div class="msg-input-tool ripple" onclick="insertTaskTrigger('${channelId}')" title="Link a task (#)">
            <span class="ms sm">task_alt</span>
          </div>
          <input type="file" id="msg-file-${channelId}" style="display:none" onchange="handleMsgFile(this,'${channelId}')" />
        </div>
        <button class="msg-send-btn ripple" onclick="sendMessage('${channelId}')" ${!val.trim()?'disabled':''}>
          <span class="ms">send</span>
        </button>
      </div>
    </div>
  </div>`;
}

function renderMentionPopup() {
  const q = (S.mentionQuery || '').toLowerCase();
  const filtered = S.users.filter(u => u.name.toLowerCase().includes(q) && u.id !== S.currentUser.id);
  if (!filtered.length) return '';
  return `<div class="mention-popup">
    ${filtered.map((u, i) => `
      <div class="mention-item${i===S.mentionIndex?' selected':''} ripple" onmousedown="insertMention('${u.id}')">
        <div class="avatar sm" style="background:${u.color||userColor(u.name)}">${escHtml(u.initials||initials(u.name))}</div>
        <div class="mention-item-name">${escHtml(u.name)}</div>
      </div>`).join('')}
  </div>`;
}

function renderEmojiPicker() {
  return `<div class="emoji-picker" id="emoji-picker" style="bottom:calc(100% + 8px);right:80px">
    ${EMOJIS.map(e => `<div class="emoji-opt" onmousedown="addReaction('${S.emojiTarget}','${e}')">${e}</div>`).join('')}
  </div>`;
}

function renderTaskPicker() {
  const q = (S.taskPickerQuery || '').toLowerCase();
  const filtered = S.tasks
    .filter(t => t.status !== 'done' && (t.title.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q)))
    .slice(0, 7);
  const all = q === '' ? S.tasks.slice(0, 7) : filtered;

  return `<div class="task-picker-popup" id="task-picker">
    <div class="task-picker-header"><span class="ms">task_alt</span> Link a Task${q ? ` — "${escHtml(q)}"` : ' — type to search'}</div>
    ${all.length === 0 ? `<div style="padding:14px 16px;font-size:13px;color:var(--c-on-surf-var)">No tasks found</div>` :
      all.map((t, i) => `
        <div class="task-picker-item${i===S.taskPickerIndex?' selected':''}" onmousedown="insertTaskRef('${t.id}')">
          <span class="priority-dot ${getPriorityClass(t.priority)}" style="flex-shrink:0"></span>
          <div class="task-picker-title">${escHtml(t.title)}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <span class="task-picker-status">${STATUS_LABELS[t.status]}</span>
            ${t.dueDate ? `<span style="font-size:11px;color:var(--c-on-surf-var)">${formatDateShort(t.dueDate)}</span>` : ''}
          </div>
        </div>`).join('')}
  </div>`;
}

function selectChannel(channelId) {
  S.selectedChannelId = channelId;
  S.activeThreadMsgId = null;
  S.notifPanelOpen = false;
  saveState();
  render();
  // Scroll to bottom
  setTimeout(() => {
    const feed = document.getElementById('msg-feed');
    if (feed) feed.scrollTop = feed.scrollHeight;
  }, 50);
}

function msgInput(e, channelId) {
  const val = e.target.value;
  S.msgInput[channelId] = val;
  const sendBtn = e.target.closest('.msg-input-area')?.querySelector('.msg-send-btn');
  if (sendBtn) sendBtn.disabled = !val.trim();

  const cursor = e.target.selectionStart;
  const textBefore = val.slice(0, cursor);

  // @mention detection
  const atMatch = textBefore.match(/@([\w ]*)$/);
  if (atMatch) {
    S.mentionQuery = atMatch[1];
    S.mentionIndex = 0;
    S.taskPickerQuery = null;
    const inputArea = e.target.closest('.msg-input-area');
    if (inputArea) {
      document.getElementById('task-picker')?.remove();
      const existing = inputArea.querySelector('.mention-popup');
      if (!existing) inputArea.insertAdjacentHTML('afterbegin', renderMentionPopup());
      else existing.outerHTML = renderMentionPopup();
    }
    return;
  }
  S.mentionQuery = null;
  document.querySelector('.mention-popup')?.remove();

  // # task picker detection (match # at word boundary)
  const hashMatch = textBefore.match(/#([\w ]*)$/);
  if (hashMatch) {
    S.taskPickerQuery = hashMatch[1];
    S.taskPickerIndex = 0;
    const inputArea = e.target.closest('.msg-input-area');
    if (inputArea) {
      const existing = document.getElementById('task-picker');
      const newEl = document.createElement('div');
      newEl.innerHTML = renderTaskPicker();
      if (!existing) inputArea.insertAdjacentHTML('afterbegin', renderTaskPicker());
      else existing.outerHTML = renderTaskPicker();
    }
    return;
  }
  S.taskPickerQuery = null;
  document.getElementById('task-picker')?.remove();
}

function msgKeyDown(e, channelId) {
  // Handle @mention navigation
  if (S.mentionQuery !== null) {
    const filtered = S.users.filter(u => u.name.toLowerCase().includes(S.mentionQuery.toLowerCase()) && u.id !== S.currentUser.id);
    if (filtered.length) {
      if (e.key === 'ArrowDown') { e.preventDefault(); S.mentionIndex = (S.mentionIndex+1) % filtered.length; document.querySelector('.mention-popup')?.replaceWith(htmlToEl(renderMentionPopup())); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); S.mentionIndex = (S.mentionIndex-1+filtered.length) % filtered.length; document.querySelector('.mention-popup')?.replaceWith(htmlToEl(renderMentionPopup())); return; }
      if ((e.key === 'Enter' || e.key === 'Tab') && filtered.length) { e.preventDefault(); insertMention(filtered[S.mentionIndex]?.id); return; }
    }
    if (e.key === 'Escape') { S.mentionQuery = null; document.querySelector('.mention-popup')?.remove(); return; }
  }
  // Handle # task picker navigation
  if (S.taskPickerQuery !== null) {
    const q = S.taskPickerQuery.toLowerCase();
    const filtered = S.tasks.filter(t => t.status !== 'done' && (q === '' || t.title.toLowerCase().includes(q))).slice(0, 7);
    if (filtered.length) {
      if (e.key === 'ArrowDown') { e.preventDefault(); S.taskPickerIndex = (S.taskPickerIndex+1) % filtered.length; document.getElementById('task-picker')?.replaceWith(htmlToEl(renderTaskPicker())); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); S.taskPickerIndex = (S.taskPickerIndex-1+filtered.length) % filtered.length; document.getElementById('task-picker')?.replaceWith(htmlToEl(renderTaskPicker())); return; }
      if ((e.key === 'Enter' || e.key === 'Tab') && filtered.length) { e.preventDefault(); insertTaskRef(filtered[S.taskPickerIndex]?.id); return; }
    }
    if (e.key === 'Escape') { S.taskPickerQuery = null; document.getElementById('task-picker')?.remove(); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(channelId);
  }
}

function htmlToEl(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstChild;
}

function insertMention(userId) {
  const u = getUser(userId);
  if (!u) return;
  S.mentionQuery = null;
  document.querySelector('.mention-popup')?.remove();
  const input = document.querySelector('[id^="msg-input-"]');
  if (!input) return;
  const val = input.value;
  const cursor = input.selectionStart;
  const textBefore = val.slice(0, cursor);
  const textAfter = val.slice(cursor);
  const replaced = textBefore.replace(/@[\w ]*$/, `@${u.name} `);
  input.value = replaced + textAfter;
  S.msgInput[S.selectedChannelId] = input.value;
  input.focus();
}

function insertAtMention(channelId) {
  const input = document.getElementById('msg-input-'+channelId);
  if (!input) return;
  input.value += '@';
  input.dispatchEvent(new Event('input'));
  input.focus();
}

function insertTaskTrigger(channelId) {
  const input = document.getElementById('msg-input-'+channelId);
  if (!input) return;
  input.value += '#';
  input.dispatchEvent(new Event('input'));
  input.focus();
}

function insertTaskRef(taskId) {
  if (!taskId) return;
  const t = getTask(taskId);
  if (!t) return;
  S.taskPickerQuery = null;
  document.getElementById('task-picker')?.remove();
  const input = document.querySelector('[id^="msg-input-"]');
  if (!input) return;
  const val = input.value;
  const cursor = input.selectionStart;
  const textBefore = val.slice(0, cursor);
  const textAfter = val.slice(cursor);
  // Replace the #query trigger with the task token
  const replaced = textBefore.replace(/#[\w ]*$/, `[task:${t.id}] `);
  input.value = replaced + textAfter;
  S.msgInput[S.selectedChannelId] = input.value;
  // Enable send
  const sendBtn = input.closest('.msg-input-area')?.querySelector('.msg-send-btn');
  if (sendBtn) sendBtn.disabled = !input.value.trim();
  input.focus();
  input.selectionStart = input.selectionEnd = replaced.length;
}

function insertEmoji(channelId) {
  const emojis = ['😊','🎉','👍','🙏','💪','🚀','⛳','🏌️'];
  const e = emojis[Math.floor(Math.random()*emojis.length)];
  const input = document.getElementById('msg-input-'+channelId);
  if (input) { input.value += e; S.msgInput[channelId] = input.value; }
}

function closeMentionPopup() {
  setTimeout(() => { S.mentionQuery = null; document.querySelector('.mention-popup')?.remove(); }, 150);
}

function closeAllPopups() {
  setTimeout(() => {
    S.mentionQuery = null;
    S.taskPickerQuery = null;
    document.querySelector('.mention-popup')?.remove();
    document.getElementById('task-picker')?.remove();
  }, 150);
}

function sendMessage(channelId) {
  const input = document.getElementById('msg-input-'+channelId);
  const content = (input?.value || S.msgInput[channelId] || '').trim();
  if (!content) return;
  const msg = {
    id: uid(), channelId, userId: S.currentUser.id,
    content, timestamp: Date.now(), reactions: {}, threadId: null, edited: false, _read: true
  };
  S.messages.push(msg);
  S.msgInput[channelId] = '';
  if (input) input.value = '';
  saveState();
  // Detect task refs and log them
  const taskRefs = [...content.matchAll(/\[task:([a-z0-9]+)\]/gi)].map(m => m[1]);
  if (taskRefs.length) {
    taskRefs.forEach(tid => {
      const t = getTask(tid);
      if (t) addInAppNotif(`${S.currentUser.name} linked task "${t.title}" in #${getChannel(channelId)?.name}`, 'task', channelId);
    });
  }

  // Notify mentioned users (in-app + browser + FCM)
  const mentionedNames = [...content.matchAll(/@([\w]+(?:\s[\w]+)?)/g)].map(m => m[1]);
  mentionedNames.forEach(name => {
    const u = S.users.find(u => u.name.toLowerCase().startsWith(name.toLowerCase()) && u.id !== S.currentUser.id);
    if (u) {
      const notifText = `${S.currentUser.name} mentioned you in #${getChannel(channelId)?.name}`;
      addInAppNotif(notifText, 'mention', channelId);
      sendBrowserNotif(`${S.currentUser.name} mentioned you`, content, 'mention-'+u.id);
      // FCM push — sends to the current device token (in a real app, you'd look up the user's token from DB)
      if (window._fcmToken) {
        sendFCMPush(window._fcmToken, `${S.currentUser.name} mentioned you`, content.slice(0,100), { type:'mention', channelId });
      }
    }
  });
  // Re-render messages area only
  const feed = document.getElementById('msg-feed');
  const inputArea = document.querySelector('.msg-input-area');
  if (feed) {
    feed.insertAdjacentHTML('beforeend', (() => {
      const isMine = true;
      return `<div class="msg-group mine">
        <div class="msg-group-avatar">${renderAvatar(S.currentUser.id)}</div>
        <div class="msg-group-content" style="align-items:flex-end">
          <div style="display:flex;flex-direction:column;align-items:flex-end">
            <div class="msg-time-label" style="margin-bottom:2px">${formatTime(msg.timestamp)}</div>
            <div class="msg-bubble" id="msg-${msg.id}" style="border-radius:var(--r-lg) var(--r-lg) 4px var(--r-lg)">${parseMessageContent(msg.content)}</div>
          </div>
        </div>
      </div>`;
    })());
    feed.scrollTop = feed.scrollHeight;
  }
  if (inputArea) {
    const sendBtn = inputArea.querySelector('.msg-send-btn');
    if (sendBtn) sendBtn.disabled = true;
  }
}

  S.notifications.unshift({ id: uid(), type, text, time: Date.now(), read: false, page: 'messages', channelId });

function threadKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendThreadReply();
  }
}

function sendThreadReply() {
  const content = S.threadInput.trim();
  if (!content || !S.activeThreadMsgId) return;
  const reply = {
    id: uid(), channelId: S.selectedChannelId, userId: S.currentUser.id,
    content, timestamp: Date.now(), reactions: {}, threadId: S.activeThreadMsgId, edited: false, _read: true
  };
  S.messages.push(reply);
  S.threadInput = '';
  saveState();
  render();
  toast('Reply sent');
}

function toggleReaction(msgId, emoji) {
  const m = S.messages.find(x => x.id === msgId);
  if (!m) return;
  if (!m.reactions[emoji]) m.reactions[emoji] = [];
  const idx = m.reactions[emoji].indexOf(S.currentUser.id);
  if (idx >= 0) m.reactions[emoji].splice(idx, 1);
  else m.reactions[emoji].push(S.currentUser.id);
  saveState();
  renderPageContent();
}

function openEmojiPicker(msgId) {
  S.emojiTarget = S.emojiTarget === msgId ? null : msgId;
  renderPageContent();
}

function addReaction(msgId, emoji) {
  S.emojiTarget = null;
  toggleReaction(msgId, emoji);
}

function deleteMessage(msgId) {
  if (!confirm('Delete this message?')) return;
  S.messages = S.messages.filter(m => m.id !== msgId && m.threadId !== msgId);
  saveState();
  renderPageContent();
}

function openAddChannelPrompt() {
  const name = prompt('New channel name:');
  if (!name?.trim()) return;
  const ch = {
    id: 'ch-' + uid(), name: name.trim().toLowerCase().replace(/\s+/g,'-'),
    description: '', type: 'channel', members: S.users.map(u => u.id)
  };
  S.channels.push(ch);
  S.selectedChannelId = ch.id;
  saveState();
  render();
  toast(`#${ch.name} created`);
}

function handleMsgFile(input, channelId) {
  const f = input.files[0];
  if (!f) return;
  const content = `📎 Attached: ${f.name} (${formatSize(f.size)})`;
  S.msgInput[channelId] = content;
  sendMessage(channelId);
}

function resetApp() {

}

// ═══════════════════════════
// FIREBASE FUNCTIONS
// ═══════════════════════════
function loadFirebaseConfig() {
  try { return JSON.parse(localStorage.getItem('blurrd_firebase') || '{}'); } catch(e) { return {}; }
}

function saveFirebaseConfig(cfg) {
  localStorage.setItem('blurrd_firebase', JSON.stringify(cfg));
}

function updateFirebaseConfig() {
  const keys = ['apiKey','authDomain','projectId','messagingSenderId','appId','vapidKey','serverKey'];
  const cfg = {};
  keys.forEach(k => { const el = document.getElementById('fcm-'+k); if (el) cfg[k] = el.value.trim(); });
  saveFirebaseConfig(cfg);
}

async function connectFirebase() {
  const cfg = loadFirebaseConfig();
  const required = ['apiKey','projectId','messagingSenderId','appId'];
  if (required.some(k => !cfg[k])) {
    toast('Please fill in all required Firebase config fields', 'error');
    return;
  }
  if (!cfg.vapidKey) {
    toast('VAPID key is required for push notifications', 'error');
    return;
  }
  try {
    toast('Connecting to Firebase…');
    // Dynamically load Firebase SDK
    await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js');

    // Init or get existing app
    if (typeof firebase === 'undefined') throw new Error('Firebase SDK failed to load');
    let app;
    try { app = firebase.app(); } catch(e) {
      app = firebase.initializeApp({
        apiKey: cfg.apiKey, authDomain: cfg.authDomain,
        projectId: cfg.projectId, messagingSenderId: cfg.messagingSenderId, appId: cfg.appId
      });
    }

    const messaging = firebase.messaging();

    // Request notification permission
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') throw new Error('Notification permission denied');

    // Register service worker
    let swReg;
    try {
      swReg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
    } catch(e) {
      // Fallback: try to use existing SW or create an inline one
      swReg = await navigator.serviceWorker.ready;
    }

    // Get FCM token
    const token = await messaging.getToken({ vapidKey: cfg.vapidKey, serviceWorkerRegistration: swReg });
    window._fcmToken = token;
    window._fcmMessaging = messaging;

    // Handle foreground messages
    messaging.onMessage(payload => {
      const { title, body } = payload.notification || {};
      if (title) {
        addNotification({ type: 'message', text: `${title}: ${body}` });
        toast(`🔔 ${title}: ${body}`);
      }
    });

    saveState();
    toast('Firebase connected! Push notifications active ⛳');
    renderPageContent();
  } catch(e) {
    console.error('Firebase init error:', e);
    toast(`Firebase error: ${e.message}`, 'error');
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function sendFCMPush(targetToken, title, body, data = {}) {
  const cfg = loadFirebaseConfig();
  if (!cfg.serverKey || !targetToken) return;
  try {
    await fetch('https://fcm.googleapis.com/fcm/send', {
      method: 'POST',
      headers: { 'Authorization': `key=${cfg.serverKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: targetToken,
        notification: { title, body, icon: '/icon-192.png', click_action: '/' },
        data: { ...data, url: window.location.href }
      })
    });
  } catch(e) { console.warn('FCM send error:', e); }
}

async function testPushNotification() {
  if (!window._fcmToken) {
    toast('Connect Firebase first', 'error');
    return;
  }
  const cfg = loadFirebaseConfig();
  if (!cfg.serverKey) {
    toast('Add Server Key to send pushes', 'error');
    return;
  }
  await sendFCMPush(window._fcmToken, 'BLURRD Links ⛳', 'Test notification — push is working!', { type: 'test' });
  toast('Test push sent! Check your notifications.');
}

function copyFCMToken() {
  if (!window._fcmToken) return;
  navigator.clipboard.writeText(window._fcmToken).then(() => toast('Token copied to clipboard'));
}

function downloadSWFile() {
  const cfg = loadFirebaseConfig();
  const swContent = `/* firebase-messaging-sw.js — BLURRD Links Push Notifications
   Host this file at the ROOT of your domain (same level as index.html)
   e.g. https://yourdomain.com/firebase-messaging-sw.js
*/
importScripts('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js');
importScripts('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js');

firebase.initializeApp({
  apiKey: "${cfg.apiKey || 'YOUR_API_KEY'}",
  authDomain: "${cfg.authDomain || 'YOUR_PROJECT.firebaseapp.com'}",
  projectId: "${cfg.projectId || 'YOUR_PROJECT_ID'}",
  messagingSenderId: "${cfg.messagingSenderId || 'YOUR_SENDER_ID'}",
  appId: "${cfg.appId || 'YOUR_APP_ID'}"
});

const messaging = firebase.messaging();

// Handle background messages
messaging.onBackgroundMessage(payload => {
  const { title = 'BLURRD Links', body = 'You have a new notification' } = payload.notification || {};
  self.registration.showNotification(title, {
    body,
    icon: payload.notification?.icon || '/icon-192.png',
    badge: '/badge-72.png',
    data: payload.data || {},
    actions: [
      { action: 'open', title: 'Open App' },
      { action: 'snooze', title: 'Snooze 15 min' }
    ],
    requireInteraction: false,
    tag: payload.data?.tag || 'blurrd-notif'
  });
});

// Notification click handler with snooze support
self.addEventListener('notificationclick', e => {
  e.notification.close();
  if (e.action === 'snooze') {
    // Reschedule via background sync or just re-show after 15 min
    e.waitUntil(
      new Promise(resolve => {
        setTimeout(() => {
          self.registration.showNotification(e.notification.title, {
            body: '[Snoozed] ' + e.notification.body,
            icon: e.notification.icon
          });
          resolve();
        }, 15 * 60 * 1000);
      })
    );
    return;
  }
  // Open or focus the app
  e.waitUntil(
    clients.matchAll({ type: 'window', includeUncontrolled: true }).then(windowClients => {
      for (const client of windowClients) {
        if (client.url.includes(self.location.origin) && 'focus' in client) {
          return client.focus();
        }
      }
      return clients.openWindow(e.notification.data?.url || '/');
    })
  );
});

self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
`;

  const blob = new Blob([swContent], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'firebase-messaging-sw.js'; a.click();
  URL.revokeObjectURL(url);
  toast('firebase-messaging-sw.js downloaded — host it at your domain root');
}

function renderMyTasksPage() {
  const uid = S.currentUser?.id;
  const myTasks = S.tasks.filter(t => t.assignees?.includes(uid) && t.status !== 'done');

  const today = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];

  const overdue = myTasks.filter(t => t.dueDate && t.dueDate < today);
  const dueToday = myTasks.filter(t => t.dueDate === today);
  const dueTomorrow = myTasks.filter(t => t.dueDate === tomorrow);
  const upcoming = myTasks.filter(t => t.dueDate && t.dueDate > tomorrow);
  const noDate = myTasks.filter(t => !t.dueDate);

  const totalMine = S.tasks.filter(t => t.assignees?.includes(uid)).length;
  const doneMine = S.tasks.filter(t => t.assignees?.includes(uid) && t.status === 'done').length;
  const pct = totalMine > 0 ? Math.round((doneMine / totalMine) * 100) : 0;

  function group(label, tasks, cls = '', icon = 'schedule') {
    if (!tasks.length) return '';
    return `
    <div class="mytasks-group">
      <div class="mytasks-group-label ${cls}">
        <span class="ms">${icon}</span> ${label}
        <span style="background:var(--c-surf2);border-radius:var(--r-full);padding:1px 8px;font-size:11px">${tasks.length}</span>
      </div>
      ${tasks.map(t => renderMyTaskRow(t)).join('')}
    </div>`;
  }

  return `
  <div class="page-mytasks">
    <!-- Hero card -->
    <div class="mytasks-hero">
      <div class="mytasks-hero-golf">⛳</div>
      <div class="avatar" style="background:rgba(255,255,255,.25);color:#fff;flex-shrink:0">
        ${S.currentUser.avatar
          ? `<img src="${escHtml(S.currentUser.avatar)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
          : escHtml(S.currentUser.initials || initials(S.currentUser.name))}
      </div>
      <div>
        <h2>${escHtml(S.currentUser.name.split(' ')[0])}'s Tasks</h2>
        <p>${myTasks.length} open · ${doneMine}/${totalMine} complete (${pct}%)</p>
      </div>
    </div>

    ${overdue.length + dueToday.length + dueTomorrow.length + upcoming.length + noDate.length === 0 ? `
      <div class="mytasks-empty">
        <span class="ms">golf_course</span>
        <div class="headline-sm" style="margin-bottom:8px">Hole in one! 🏆</div>
        <div class="body-md" style="color:var(--c-on-surf-var)">No open tasks assigned to you right now.</div>
      </div>
    ` : `
      ${group('Overdue', overdue, 'overdue', 'warning')}
      ${group('Due Today', dueToday, 'today', 'today')}
      ${group('Due Tomorrow', dueTomorrow, '', 'event')}
      ${group('Upcoming', upcoming, 'upcoming', 'calendar_month')}
      ${group('No Due Date', noDate, '', 'radio_button_unchecked')}
    `}
  </div>`;
}

function renderMyTaskRow(t) {
  const overdue = isOverdue(t.dueDate) && t.status !== 'done';
  const today = isDueToday(t.dueDate);
  return `
  <div class="task-card ripple" onclick="openTaskModal('${t.id}')" style="margin-bottom:8px">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <span class="priority-dot ${getPriorityClass(t.priority)}" style="margin-top:6px;flex-shrink:0"></span>
      <div style="flex:1;min-width:0">

function renderWhatsNewModal() {
  const latest = CHANGELOG[0];
  const newItems = latest.items.filter(i => i.type === 'new').slice(0, 5);
  function featureIcon(text) {
    if (text.toLowerCase().includes('task')) return 'task_alt';
    if (text.toLowerCase().includes('message')) return 'forum';
    if (text.toLowerCase().includes('memory') || text.toLowerCase().includes('data')) return 'save';
    if (text.toLowerCase().includes('profile') || text.toLowerCase().includes('avatar')) return 'person';
    if (text.toLowerCase().includes('password')) return 'lock';
    if (text.toLowerCase().includes('golf') || text.toLowerCase().includes('animation')) return 'sports_golf';
    if (text.toLowerCase().includes('changelog')) return 'history';
    if (text.toLowerCase().includes('accountability')) return 'leaderboard';
    return 'new_releases';
  }
  return `
  <div class="whats-new-card" onclick="event.stopPropagation()">
    <div class="whats-new-header">
      <div class="whats-new-golf-bg">⛳</div>
      <div class="whats-new-badge"><span class="ms sm">new_releases</span> Version ${latest.version}</div>
      <h2>What's New in BLURRD Links</h2>
      <p>${latest.date} — here's what landed in this update</p>
    </div>
    <div class="whats-new-body">
      <div class="whats-new-features">
        ${newItems.map(item => `
          <div class="whats-new-feature">
            <div class="whats-new-feature-icon"><span class="ms">${featureIcon(item.text)}</span></div>
            <div>
              <div class="whats-new-feature-title">${escHtml(item.text.split(' — ')[0] || item.text.slice(0,40))}</div>
              <div class="whats-new-feature-desc">${escHtml(item.text)}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="whats-new-footer">
        <button class="btn btn-text btn-sm ripple" onclick="closeWhatsNew();navigate('changelog')">See full changelog</button>
        <button class="btn btn-filled btn-sm ripple" onclick="closeWhatsNew()">Let's go! ⛳</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════
// GOLF ANIMATIONS & EFFECTS
// ═══════════════════════════
const GOLF_ACHIEVEMENTS = [
  { icon: '⛳', title: 'Hole in One!', text: 'Task completed — straight in the cup!' },
  { icon: '🏌️', title: 'Birdie!', text: 'Under par — one task down!' },
  { icon: '🦅', title: 'Eagle!', text: 'Outstanding! Task crushed.' },
  { icon: '🏆', title: 'Ace!', text: 'Perfect shot — task done!' },
  { icon: '🎯', title: 'On the Green!', text: 'Task marked complete!' },
];

function golfCelebrate(type = 'task') {
  if (type === 'task') {
    const ach = GOLF_ACHIEVEMENTS[Math.floor(Math.random() * GOLF_ACHIEVEMENTS.length)];
    showGolfAchievement(ach);
    spawnGolfConfetti();
  }
}

function showGolfAchievement(ach) {
  // Remove any existing
  document.querySelectorAll('.golf-achievement').forEach(el => el.remove());
  const el = document.createElement('div');
  el.className = 'golf-achievement';
  el.innerHTML = `
    <div class="golf-achievement-icon">${ach.icon}</div>
    <div>
      <div class="golf-achievement-title">${ach.title}</div>
      <div class="golf-achievement-text">${ach.text}</div>
    </div>
    <button class="icon-btn" onclick="this.parentElement.remove()" style="color:rgba(255,255,255,.7)"><span class="ms sm">close</span></button>`;
  document.body.appendChild(el);
  setTimeout(() => {
    el.classList.add('hiding');
    setTimeout(() => el.remove(), 400);
  }, 3500);
}

function spawnGolfConfetti() {
  const colors = ['#0057B8','#4CAF50','#FF9800','#E91E63','#9C27B0','#F59E0B','#fff'];
  const shapes = ['⛳','🏌️','⚪','🟢','🔵'];
  for (let i = 0; i < 28; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'golf-confetti-piece';
      const useEmoji = Math.random() > 0.7;
      if (useEmoji) {
        el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
        el.style.cssText = `left:${10 + Math.random() * 80}%;top:-20px;font-size:${14+Math.random()*12}px;background:none;width:auto;height:auto;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
      } else {
        el.style.cssText = `left:${10 + Math.random() * 80}%;top:-20px;background:${colors[Math.floor(Math.random() * colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
      }
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 50);
  }
}

// Hook into task status changes to trigger golf celebration
const _origSaveTask = typeof saveTask !== 'undefined' ? saveTask : null;

// ═══════════════════════════
// PWA + INSTALL
// ═══════════════════════════
let _deferredInstall = null;

function setupPWA() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredInstall = e;
    const btn = document.getElementById('install-btn');
    const status = document.getElementById('install-status');
    if (btn) btn.style.display = 'flex';
    if (status) status.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => {
    toast('BLURRD Links installed! ⛳');
    _deferredInstall = null;
  });
}

function triggerInstall() {
  if (!_deferredInstall) { toast('Host the app to enable installation', 'info'); return; }
  _deferredInstall.prompt();
  _deferredInstall.userChoice.then(r => {
    if (r.outcome === 'accepted') toast('Installing BLURRD Links… ⛳');
    _deferredInstall = null;
  });
}

// ═══════════════════════════
// INIT
// ═══════════════════════════
loadState();
applyTheme(S.theme);

// Watch system color scheme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (S.theme.mode === 'auto') applyTheme(S.theme);
});

render();
setupPWA();
requestNotifPermission();

// Scroll to bottom of messages on load
setTimeout(() => {
  const feed = document.getElementById('msg-feed');
  if (feed) feed.scrollTop = feed.scrollHeight;
}, 100);

// Close notification panel on outside click
document.addEventListener('click', e => {
  if (S.notifPanelOpen && !e.target.closest('#notif-panel') && !e.target.closest('.icon-btn[onclick*="toggleNotifPanel"]')) {
    S.notifPanelOpen = false;
    const panel = document.getElementById('notif-panel');
    if (panel) panel.remove();
  }
  if (S.emojiTarget && !e.target.closest('#emoji-picker') && !e.target.closest('.msg-action-btn')) {
    S.emojiTarget = null;
  }
  if (S.snoozeTarget && !e.target.closest('.snooze-popup') && !e.target.closest('.icon-btn[onclick*="openSnooze"]')) {
    S.snoozeTarget = null;
  }
});

</script>
</body>
